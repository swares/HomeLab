---
# vault-restore.yml — Restore Vault onto a freshly flashed rpi5.
#
# Prerequisites (do these before running):
#   1. Flash Raspberry Pi OS Bookworm Lite 64-bit to new SD card
#   2. Boot rpi5, confirm SSH works: ssh swares@192.168.1.128
#   3. Run bootstrap first (SSH key + sudo):
#        ansible-playbook -i inventory/hosts.yml playbooks/bootstrap.yml \
#          --limit rpi5 -k -K --vault-password-file .vault_pass
#   4. Confirm backup exists on H4:
#        ls -lh /mnt/cold-8t/backups/vault-backup-*.tar.gz
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/vault-restore.yml \
#     --vault-password-file .vault_pass
#
# After the play completes:
#   - Vault will be SEALED (correct — raft state is restored, keys are yours)
#   - SSH to rpi5 and run `vault operator unseal` three times with your key shares
#   - Populate /etc/vault.d/unseal-keys for auto-unseal on future reboots

- name: Restore Vault on fresh rpi5
  hosts: rpi5
  become: true
  vars:
    vault_backup_src: /mnt/cold-8t/backups/vault-backup-20260627.tar.gz
    vault_data_dir: /opt/vault/data
    vault_config_dir: /etc/vault.d
    vault_unseal_keys_file: /etc/vault.d/unseal-keys

  tasks:

    # ── 1. Install Vault ────────────────────────────────────────────────────
    - name: Remove stale HashiCorp keyring if present
      ansible.builtin.file:
        path: /usr/share/keyrings/hashicorp.asc
        state: absent

    - name: HashiCorp APT key
      ansible.builtin.shell:
        cmd: >
          curl -fsSL https://apt.releases.hashicorp.com/gpg |
          gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

    - name: HashiCorp APT repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/hashicorp.list
        content: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main\n"
        mode: "0644"

    - name: Install Vault
      ansible.builtin.apt:
        name: vault
        update_cache: true
        state: present

    - name: Stop Vault before restore
      ansible.builtin.systemd:
        name: vault
        state: stopped
      failed_when: false   # may not be running yet on fresh install

    # ── 2. Restore raft data ────────────────────────────────────────────────
    - name: Copy Vault backup from H4 to rpi5
      ansible.builtin.copy:
        src: "{{ vault_backup_src }}"
        dest: /tmp/vault-backup.tar.gz
        mode: "0600"

    - name: Wipe existing data dir
      ansible.builtin.file:
        path: "{{ vault_data_dir }}"
        state: absent

    - name: Recreate data dir
      ansible.builtin.file:
        path: "{{ vault_data_dir }}"
        state: directory
        owner: vault
        group: vault
        mode: "0750"

    - name: Extract backup (restores opt/vault/data/*)
      ansible.builtin.unarchive:
        src: /tmp/vault-backup.tar.gz
        dest: /
        remote_src: true
        extra_opts: ['--same-owner']

    - name: Ensure data dir ownership is correct
      ansible.builtin.file:
        path: "{{ vault_data_dir }}"
        owner: vault
        group: vault
        recurse: true

    # ── 3. Config ───────────────────────────────────────────────────────────
    - name: Vault config
      ansible.builtin.template:
        src: ../templates/vault.hcl.j2
        dest: "{{ vault_config_dir }}/vault.hcl"
        mode: "0640"

    # ── 4. Auto-unseal service ──────────────────────────────────────────────
    - name: Deploy vault-unseal script
      ansible.builtin.template:
        src: ../templates/vault-unseal.sh.j2
        dest: /usr/local/bin/vault-unseal.sh
        owner: root
        group: root
        mode: "0700"

    - name: Deploy vault-unseal systemd service
      ansible.builtin.template:
        src: ../templates/vault-unseal.service.j2
        dest: /etc/systemd/system/vault-unseal.service
        owner: root
        group: root
        mode: "0644"

    - name: Create unseal-keys file with strict permissions (populate manually)
      ansible.builtin.file:
        path: "{{ vault_unseal_keys_file }}"
        state: touch
        owner: root
        group: root
        mode: "0400"
        modification_time: preserve
        access_time: preserve

    # ── 5. Start Vault ──────────────────────────────────────────────────────
    - name: Enable and start Vault
      ansible.builtin.systemd:
        name: vault
        enabled: true
        state: started
        daemon_reload: true

    - name: Enable vault-unseal service (disabled until keys file is populated)
      ansible.builtin.systemd:
        name: vault-unseal
        enabled: true
        daemon_reload: true

    - name: Wait for Vault API to respond
      ansible.builtin.uri:
        url: http://127.0.0.1:8200/v1/sys/seal-status
        method: GET
        status_code: [200]
        validate_certs: false
      register: vault_status
      retries: 12
      delay: 5
      until: vault_status.status == 200

    # ── 6. Report ───────────────────────────────────────────────────────────
    - name: Show Vault seal status
      ansible.builtin.debug:
        msg:
          - "Vault is running. Sealed: {{ vault_status.json.sealed }}"
          - "Version: {{ vault_status.json.version }}"

    - name: Next steps
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Vault data restored. Manual steps required:"
          - ""
          - "1. SSH to rpi5:"
          - "     ssh swares@192.168.1.128"
          - "     export VAULT_ADDR=http://127.0.0.1:8200"
          - ""
          - "2. Unseal (enter 3 key shares when prompted):"
          - "     vault operator unseal   # 1/3"
          - "     vault operator unseal   # 2/3"
          - "     vault operator unseal   # 3/3"
          - ""
          - "3. Verify secrets intact:"
          - "     vault kv get secret/lab/immich"
          - "     vault kv get secret/lab/grafana"
          - ""
          - "4. Populate auto-unseal keys file (one key per line):"
          - "     sudo nano /etc/vault.d/unseal-keys"
          - "     sudo chmod 400 /etc/vault.d/unseal-keys"
          - "     sudo systemctl start vault-unseal  # test it"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
