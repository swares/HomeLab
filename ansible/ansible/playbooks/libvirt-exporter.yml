---
# Deploy prometheus-libvirt-exporter on KVM hypervisor hosts.
# Exposes VM state, CPU, memory, and disk metrics on port 9177.
#
# Run:
#   ansible-playbook -i inventory/hosts.yml playbooks/libvirt-exporter.yml
#
- name: Install and enable libvirt exporter on KVM hosts
  hosts: kvm_hosts
  become: true

  tasks:
    - name: Install prometheus-libvirt-exporter
      ansible.builtin.apt:
        name: prometheus-libvirt-exporter
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Enable and start libvirt exporter
      ansible.builtin.systemd:
        name: prometheus-libvirt-exporter
        enabled: true
        state: started
