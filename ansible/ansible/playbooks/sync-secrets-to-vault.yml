---
# Sync lab secrets into HashiCorp Vault.
# Run after any credential rotation to keep Vault as the authoritative store.
# Requires: VAULT_TOKEN env var set, Vault reachable at 192.168.1.128:8200.
#
# Run:
#   VAULT_TOKEN=<token> ansible-playbook \
#     -i inventory/hosts.yml playbooks/sync-secrets-to-vault.yml \
#     --vault-password-file .vault_pass
#
#   To also sync the swares password:
#   VAULT_TOKEN=<token> ansible-playbook \
#     -i inventory/hosts.yml playbooks/sync-secrets-to-vault.yml \
#     --vault-password-file .vault_pass \
#     -e "swares_password=<plaintext>"

- name: Sync secrets to HashiCorp Vault
  hosts: localhost
  gather_facts: false

  vars:
    vault_url: "http://192.168.1.128:8200"
    vault_token: "{{ lookup('env', 'VAULT_TOKEN') }}"
    swares_password: ""

  environment:
    VAULT_ADDR: "{{ vault_url }}"
    VAULT_TOKEN: "{{ vault_token }}"

  pre_tasks:
    - name: Verify VAULT_TOKEN is set
      ansible.builtin.assert:
        that: vault_token != ''
        fail_msg: "VAULT_TOKEN environment variable is not set."

    - name: Check Vault is reachable
      ansible.builtin.uri:
        url: "{{ vault_url }}/v1/sys/health"
        status_code: [200, 429]
        timeout: 5

  tasks:
    # ── restic password ────────────────────────────────────────────────────
    - name: Read restic password from H4
      ansible.builtin.slurp:
        src: /etc/restic/password
      register: restic_password_b64
      become: true

    - name: Sync restic password to Vault
      ansible.builtin.shell: |
        vault kv put secret/lab/restic \
          password={{ restic_password_b64.content | b64decode | trim | quote }}
      no_log: true
      changed_when: true

    # ── immich DB password ─────────────────────────────────────────────────
    - name: Read immich DB password from k8s
      ansible.builtin.command:
        cmd: kubectl get secret immich-secrets -n immich
          -o jsonpath='{.data.DB_PASSWORD}'
      register: immich_db_b64
      changed_when: false

    - name: Sync immich DB password to Vault
      ansible.builtin.shell: |
        vault kv put secret/lab/immich \
          DB_PASSWORD={{ immich_db_b64.stdout | b64decode | quote }}
      no_log: true
      changed_when: true

    # ── authelia secrets ───────────────────────────────────────────────────
    - name: Read authelia secrets from k8s
      ansible.builtin.command:
        cmd: kubectl get secret authelia-secrets -n authelia -o json
      register: authelia_raw
      changed_when: false

    - name: Parse authelia secrets
      when: authelia_raw is not skipped and authelia_raw.stdout is defined
      ansible.builtin.set_fact:
        ad: "{{ (authelia_raw.stdout | from_json).data }}"
      no_log: true

    - name: Sync authelia secrets to Vault
      ansible.builtin.shell: |
        vault kv put secret/lab/authelia \
          jwt_secret={{ ad.jwt_secret | b64decode | quote }} \
          session_secret={{ ad.session_secret | b64decode | quote }} \
          storage_encryption_key={{ ad.storage_encryption_key | b64decode | quote }} \
          oidc_hmac_secret={{ ad.oidc_hmac_secret | b64decode | quote }} \
          ldap_password={{ ad.ldap_password | b64decode | quote }} \
          immich_client_secret={{ ad.immich_client_secret | b64decode | quote }} \
          storage_pg_password={{ ad.storage_pg_password | b64decode | quote }}
      no_log: true
      changed_when: true

    # ── lldap secrets ──────────────────────────────────────────────────────
    - name: Read lldap config from ldap-1
      ansible.builtin.slurp:
        src: /opt/lldap/lldap_config.toml
      register: lldap_config_b64
      delegate_to: ldap-1
      become: true

    - name: Extract lldap jwt_secret
      ansible.builtin.set_fact:
        lldap_jwt: >-
          {{ (lldap_config_b64.content | b64decode)
             | regex_search('jwt_secret\s*=\s*"([^"]+)"', '\1') | first }}
      no_log: true

    - name: Extract lldap ldap_user_pass
      ansible.builtin.set_fact:
        lldap_pass: >-
          {{ (lldap_config_b64.content | b64decode)
             | regex_search('ldap_user_pass\s*=\s*"([^"]+)"', '\1') | first }}
      no_log: true

    - name: Sync lldap secrets to Vault
      ansible.builtin.shell: |
        vault kv put secret/lab/lldap \
          jwt_secret={{ lldap_jwt | quote }} \
          admin_password={{ lldap_pass | quote }}
      no_log: true
      changed_when: true

    # ── swares host password ───────────────────────────────────────────────
    - name: Sync swares password to Vault
      ansible.builtin.shell: |
        vault kv put secret/lab/hosts \
          swares_password={{ swares_password | quote }}
      when: swares_password != ''
      no_log: true
      changed_when: true

    - name: Warn if swares_password not provided
      ansible.builtin.debug:
        msg: >-
          WARNING: swares_password not provided via --extra-vars.
          secret/lab/hosts was NOT updated. Pass -e swares_password=<plaintext>
          to sync it.
      when: swares_password == ''

    # ── kvm_hosts sudo (become) password ──────────────────────────────────
    # ansible_become_password is already Ansible-Vault-encrypted in
    # group_vars/kvm_hosts/secrets.yml; this backs it up to HashiCorp Vault.
    # Uses kv patch so it merges with existing keys at secret/lab/hosts.
    - name: Sync kvm_hosts become password to Vault
      ansible.builtin.shell: |
        vault kv patch secret/lab/hosts \
          kvm_become_password={{ hostvars['n150-1']['ansible_become_password'] | quote }}
      no_log: true
      changed_when: true

    # ── ArgoCD deploy key ─────────────────────────────────────────────────
    # Private key used by ArgoCD to pull from GitHub. Regeneration requires
    # re-adding the public key to the repo's deploy keys in GitHub settings.
    - name: Read ArgoCD deploy key
      ansible.builtin.slurp:
        src: "{{ lookup('env', 'HOME') }}/.ssh/argocd-deploy-key"
      register: argocd_key_b64
      ignore_errors: true   # non-fatal if key has been moved

    - name: Sync ArgoCD deploy key to Vault
      ansible.builtin.shell: |
        vault kv put secret/lab/argocd \
          deploy_key={{ argocd_key_b64.content | b64decode | quote }}
      when: argocd_key_b64 is not failed
      no_log: true
      changed_when: true

    - name: Warn if ArgoCD deploy key not found
      ansible.builtin.debug:
        msg: "WARNING: ~/.ssh/argocd-deploy-key not found — secret/lab/argocd was NOT updated."
      when: argocd_key_b64 is failed

    # ── summary ────────────────────────────────────────────────────────────
    - name: Sync complete
      ansible.builtin.debug:
        msg: |
          Secrets synced to Vault:
            secret/lab/restic        ✓
            secret/lab/immich        ✓
            secret/lab/authelia      ✓
            secret/lab/lldap         ✓
            secret/lab/hosts         {{ '✓' if swares_password != '' else '⚠ skipped (no plaintext provided)' }}
            secret/lab/hosts (patch) ✓  kvm_become_password
            secret/lab/argocd        {{ '✓' if argocd_key_b64 is not failed else '⚠ key not found' }}
