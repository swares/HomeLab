---
# Daily Vault raft snapshot: rpi5 → H4 cold tier (/mnt/cold-8t/vault-snapshots/).
#
# Prerequisites (one-time, manual on rpi5):
#   vault policy write vault-snapshot (path sys/storage/raft/snapshot, read)
#   vault token create -display-name=vault-backup -period=87600h -policy=vault-snapshot
#   echo "<token>" | sudo tee /etc/vault.d/backup-token && sudo chmod 600 /etc/vault.d/backup-token
#
- name: Configure Vault raft snapshot backups
  hosts: vault
  become: true
  vars:
    vault_addr: "http://127.0.0.1:8200"
    vault_backup_token_file: /etc/vault.d/backup-token
    h4_host: "192.168.1.160"
    h4_user: "swares"
    snapshot_dest_path: "/mnt/cold-8t/vault-snapshots"
    snapshot_retain_days: 30
    ssh_key_path: /root/.ssh/vault-backup

  tasks:
    - name: Ensure snapshot destination directory exists on H4
      delegate_to: h4
      ansible.builtin.file:
        path: "{{ snapshot_dest_path }}"
        state: directory
        mode: "0750"
        owner: swares
        group: swares

    - name: Generate SSH keypair for vault-backup on rpi5
      ansible.builtin.shell:
        cmd: ssh-keygen -t ed25519 -f {{ ssh_key_path }} -N '' -C vault-backup@rpi5
        creates: "{{ ssh_key_path }}"

    - name: Read vault-backup public key
      ansible.builtin.slurp:
        src: "{{ ssh_key_path }}.pub"
      register: vault_backup_pubkey

    - name: Authorize vault-backup key on H4
      delegate_to: h4
      ansible.posix.authorized_key:
        user: "{{ h4_user }}"
        key: "{{ vault_backup_pubkey.content | b64decode | trim }}"
        comment: vault-backup@rpi5

    - name: Deploy vault snapshot script
      ansible.builtin.copy:
        dest: /usr/local/bin/vault-snapshot.sh
        mode: "0750"
        content: |
          #!/bin/bash
          set -euo pipefail
          export VAULT_ADDR="{{ vault_addr }}"
          export VAULT_TOKEN="$(cat {{ vault_backup_token_file }})"
          SNAP_DIR=/tmp/vault-snapshots
          mkdir -p "$SNAP_DIR"
          SNAP="$SNAP_DIR/vault-snap-$(date +%Y%m%d-%H%M%S).snap"
          vault operator raft snapshot save "$SNAP"
          rsync -az -e "ssh -i {{ ssh_key_path }} -o StrictHostKeyChecking=accept-new" \
            "$SNAP" "{{ h4_user }}@{{ h4_host }}:{{ snapshot_dest_path }}/"
          rm -f "$SNAP"
          ssh -i "{{ ssh_key_path }}" "{{ h4_user }}@{{ h4_host }}" \
            "find {{ snapshot_dest_path }} -name 'vault-snap-*.snap' -mtime +{{ snapshot_retain_days }} -delete"

    - name: Deploy backup-vault systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/backup-vault.service
        mode: "0644"
        content: |
          [Unit]
          Description=HashiCorp Vault raft snapshot to H4 cold tier
          After=network.target vault.service
          Requires=vault.service

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/vault-snapshot.sh
          StandardOutput=journal
          StandardError=journal

    - name: Deploy backup-vault systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/backup-vault.timer
        mode: "0644"
        content: |
          [Unit]
          Description=Daily HashiCorp Vault raft snapshot

          [Timer]
          OnCalendar=*-*-* 02:30:00
          RandomizedDelaySec=300
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start vault backup timer
      ansible.builtin.systemd:
        name: backup-vault.timer
        enabled: true
        state: started
