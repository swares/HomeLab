<svg viewBox="0 0 1240 760" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .bg{fill:#0d1117;} .panel{fill:#161b22;stroke:#2b3440;stroke-width:1.2;}
      .title{fill:#e6edf3;font-size:28px;font-weight:700;letter-spacing:1px;}
      .sub{fill:#8b949e;font-size:13px;} .name{fill:#e6edf3;font-size:14px;font-weight:700;}
      .spec{fill:#8b949e;font-size:11px;} .tag{fill:#6e7681;font-size:10px;letter-spacing:1px;}
      .gw{fill:#15111f;stroke:#a78bfa;stroke-width:2;}
      .npu{fill:#102a1c;stroke:#34d399;stroke-width:1.4;}
      .igpu{fill:#1f1605;stroke:#f59e0b;stroke-width:1.4;}
      .cloud{fill:#161b22;stroke:#3b82f6;stroke-width:1.4;stroke-dasharray:5 4;}
      .flow{stroke:#8b949e;stroke-width:1.6;fill:none;}
      .flbl{fill:#c9d1d9;font-size:11px;font-weight:700;}
      .lbl{fill:#8b949e;font-size:10px;}
    </style>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b949e"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1240" height="760"/>
  <text class="title" x="40" y="52">AI Inference Fabric</text>
  <text class="sub" x="42" y="74">One OpenAI-compatible endpoint · heterogeneous NPUs + iGPUs behind a gateway</text>

  <!-- consumers -->
  <g transform="translate(40,150)">
    <rect class="panel" x="0" y="0" width="190" height="120" rx="10"/>
    <text class="name" x="16" y="28">Cluster apps</text>
    <text class="spec" x="16" y="50">+ Claude / workflows</text>
    <text class="spec" x="16" y="70">+ Home Assistant</text>
    <text class="tag"  x="16" y="100">POST /v1/chat/…</text>
  </g>

  <!-- gateway -->
  <g transform="translate(300,140)">
    <rect class="gw" x="0" y="0" width="230" height="180" rx="12"/>
    <rect x="0" y="0" width="6" height="180" rx="3" fill="#a78bfa"/>
    <text class="name" x="20" y="30" fill="#c4b5fd">LiteLLM gateway</text>
    <text class="spec" x="20" y="54">in MicroShift (GitOps)</text>
    <text class="spec" x="20" y="74">• one /v1 endpoint</text>
    <text class="spec" x="20" y="94">• routes by model name</text>
    <text class="spec" x="20" y="114">• load-balance + failover</text>
    <text class="spec" x="20" y="134">• keys, logging, quotas</text>
    <text class="tag"  x="20" y="162">ai.apps.lab.home.arpa</text>
  </g>
  <path class="flow" d="M230 210 L300 210" marker-end="url(#a)"/>

  <!-- backends -->
  <!-- OPi #1 -->
  <g transform="translate(640,70)">
    <rect class="npu" x="0" y="0" width="250" height="86" rx="10"/><rect x="0" y="0" width="5" height="86" rx="2" fill="#34d399"/>
    <text class="name" x="16" y="26">OPi 5 Pro #1 · RKLLama</text>
    <text class="spec" x="16" y="46">RK3588S NPU 6 TOPS</text>
    <text class="tag"  x="16" y="70">chat · Qwen2.5-3B (.rkllm)</text>
  </g>
  <!-- OPi #2 -->
  <g transform="translate(640,168)">
    <rect class="npu" x="0" y="0" width="250" height="86" rx="10"/><rect x="0" y="0" width="5" height="86" rx="2" fill="#34d399"/>
    <text class="name" x="16" y="26">OPi 5 Pro #2 · RKLLama</text>
    <text class="spec" x="16" y="46">RK3588S NPU 6 TOPS</text>
    <text class="tag"  x="16" y="70">chat · Llama-3.2-3B (.rkllm)</text>
  </g>
  <!-- M5Stack -->
  <g transform="translate(640,266)">
    <rect class="npu" x="0" y="0" width="250" height="86" rx="10"/><rect x="0" y="0" width="5" height="86" rx="2" fill="#34d399"/>
    <text class="name" x="16" y="26">M5Stack LLM · framework</text>
    <text class="spec" x="16" y="46">AX630C NPU · /api/llm (HTTP)</text>
    <text class="tag"  x="16" y="70">edge / always-on · tiny model</text>
  </g>
  <!-- OpenVINO iGPU -->
  <g transform="translate(640,364)">
    <rect class="igpu" x="0" y="0" width="250" height="86" rx="10"/><rect x="0" y="0" width="5" height="86" rx="2" fill="#f59e0b"/>
    <text class="name" x="16" y="26">OpenVINO · Intel iGPU</text>
    <text class="spec" x="16" y="46">H4 N305 + N150 ×2 (no NPU)</text>
    <text class="tag"  x="16" y="70">embeddings · STT · OCR · vision</text>
  </g>
  <!-- Cloud -->
  <g transform="translate(640,462)">
    <rect class="cloud" x="0" y="0" width="250" height="76" rx="10"/>
    <text class="name" x="16" y="26" fill="#93c5fd">Cloud fallback (optional)</text>
    <text class="spec" x="16" y="46">big models when local won't fit</text>
    <text class="tag"  x="16" y="66">overflow only · keyed</text>
  </g>

  <!-- routed edges from gateway -->
  <path class="flow" d="M530 200 C 590 130, 600 113, 640 113" marker-end="url(#a)"/>
  <path class="flow" d="M530 215 C 590 210, 600 211, 640 211" marker-end="url(#a)"/>
  <path class="flow" d="M530 230 C 590 290, 600 309, 640 309" marker-end="url(#a)"/>
  <path class="flow" d="M530 250 C 590 380, 600 407, 640 407" marker-end="url(#a)"/>
  <path class="flow" d="M530 270 C 590 480, 600 500, 640 500" marker-end="url(#a)"/>

  <text class="flbl" x="548" y="120">chat</text>
  <text class="flbl" x="540" y="330">edge/voice</text>
  <text class="flbl" x="535" y="430">embeddings</text>
  <text class="flbl" x="548" y="520">overflow</text>

  <!-- footer notes -->
  <g transform="translate(40,600)">
    <text class="tag" x="0" y="0">WHY A GATEWAY</text>
    <text class="spec" x="0" y="22">NPUs are vendor-fragmented (Rockchip RKNN ≠ Axera ≠ Intel OpenVINO) — no single runtime.</text>
    <text class="spec" x="0" y="40">Each node serves its own HTTP API; LiteLLM unifies them behind one OpenAI-compatible URL.</text>
    <text class="spec" x="0" y="58">Backends register as ExternalName Services so in-cluster pods resolve them by DNS.</text>
    <text class="spec" x="0" y="76">Model conversion (HF → .rkllm) is done offline on the H4/x86 — RAM-hungry, not on the boards.</text>
    <text class="lbl"  x="0" y="104">Throughput is modest (few tok/s) — ideal for private, always-on, background/agentic tasks; not heavy interactive load.</text>
  </g>
</svg>
