<svg viewBox="0 0 1280 900" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .bg{fill:#0d1117;} .panel{fill:#161b22;stroke:#2b3440;stroke-width:1.2;}
      .title{fill:#e6edf3;font-size:28px;font-weight:700;letter-spacing:1px;}
      .sub{fill:#8b949e;font-size:13px;}
      .big{fill:#e6edf3;font-size:34px;font-weight:700;}
      .unit{fill:#8b949e;font-size:12px;}
      .cap{fill:#6e7681;font-size:10px;letter-spacing:2px;font-weight:700;}
      .tier{fill:#e6edf3;font-size:14px;font-weight:700;}
      .spec{fill:#8b949e;font-size:11px;}
      .hdr{fill:#6e7681;font-size:10px;letter-spacing:1px;font-weight:700;}
      .x86{fill:#ff6b6b;} .aiarm{fill:#34d399;} .agent{fill:#2dd4bf;} .infra{fill:#3b82f6;} .micro{fill:#8b949e;}
      .eu{fill:#f59e0b;} .npu{fill:#34d399;} .gpu{fill:#a78bfa;}
      .chip{fill:#1c2128;stroke:#30363d;stroke-width:1;}
      .ct{fill:#c9d1d9;font-size:11px;}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="900"/>
  <text class="title" x="40" y="50">Lab Capability Overview</text>
  <text class="sub" x="42" y="72">19 nodes across x86 virtualization, ARM AI, and a k3s agent pool — totals and how the silicon is classed</text>

  <!-- headline stat cards -->
  <g transform="translate(40,96)">
    <g><rect class="panel" x="0" y="0" width="228" height="92" rx="10"/>
      <text class="cap" x="16" y="26">NODES</text><text class="big" x="16" y="62">19</text>
      <text class="unit" x="70" y="62">physical units</text></g>
    <g transform="translate(243,0)"><rect class="panel" x="0" y="0" width="228" height="92" rx="10"/>
      <text class="cap" x="16" y="26">CPU CORES</text><text class="big" x="16" y="62">79</text>
      <text class="unit" x="62" y="62">20 x86 + 59 ARM</text></g>
    <g transform="translate(486,0)"><rect class="panel" x="0" y="0" width="228" height="92" rx="10"/>
      <text class="cap" x="16" y="26">RAM</text><text class="big" x="16" y="62">~182</text>
      <text class="unit" x="98" y="62">GB (112 + 70)</text></g>
    <g transform="translate(729,0)"><rect class="panel" x="0" y="0" width="228" height="92" rx="10"/>
      <text class="cap" x="16" y="26">INTEL iGPU</text><text class="big eu" x="16" y="62">104</text>
      <text class="unit" x="92" y="62">EU · OpenVINO</text></g>
    <g transform="translate(972,0)"><rect class="panel" x="0" y="0" width="228" height="92" rx="10"/>
      <text class="cap" x="16" y="26">NPU</text><text class="big npu" x="16" y="62">18</text>
      <text class="unit" x="62" y="62">TOPS · LLM/vision</text></g>
  </g>

  <!-- compute-by-tier chart -->
  <text class="cap" x="40" y="232">COMPUTE BY TIER  (bar = CPU cores)</text>
  <g transform="translate(40,248)">
    <line x1="250" y1="0" x2="250" y2="372" stroke="#21262d"/>
    <!-- columns header -->
    <text class="hdr" x="0" y="-2">TIER</text>
    <text class="hdr" x="262" y="-2">CORES</text>
    <text class="hdr" x="600" y="-2">RAM</text>
    <text class="hdr" x="720" y="-2">GPU</text>
    <text class="hdr" x="980" y="-2">NPU</text>

    <!-- row macro: each 70 tall -->
    <!-- 1 x86 -->
    <g transform="translate(0,16)">
      <rect class="x86" x="0" y="20" width="5" height="40" rx="2"/>
      <text class="tier" x="14" y="34">x86 · Proxmox</text>
      <text class="spec" x="14" y="52">VMs + containers · H4 + N150 ×3</text>
      <rect class="x86" x="262" y="22" width="267" height="20" rx="4" opacity="0.85"/>
      <text class="ct" x="536" y="37">20C / 20T</text>
      <text class="ct" x="600" y="37">112 GB</text>
      <rect class="chip" x="716" y="24" width="250" height="20" rx="6"/><text class="ct" x="724" y="38" fill="#f59e0b">104 EU iGPU (OpenVINO)</text>
      <text class="spec" x="980" y="38">—</text>
    </g>
    <!-- 2 ARM AI -->
    <g transform="translate(0,90)">
      <rect class="aiarm" x="0" y="20" width="5" height="40" rx="2"/>
      <text class="tier" x="14" y="34">ARM AI · bare-metal</text>
      <text class="spec" x="14" y="52">OPi 5 Pro ×2 (RK3588S)</text>
      <rect class="aiarm" x="262" y="22" width="213" height="20" rx="4" opacity="0.85"/>
      <text class="ct" x="482" y="37">16C</text>
      <text class="ct" x="600" y="37">32 GB</text>
      <rect class="chip" x="716" y="24" width="250" height="20" rx="6"/><text class="ct" x="724" y="38" fill="#a78bfa">Mali-G610 MP4 ×2</text>
      <rect class="chip" x="976" y="24" width="150" height="20" rx="6"/><text class="ct" x="984" y="38" fill="#34d399">12 TOPS</text>
    </g>
    <!-- 3 agents -->
    <g transform="translate(0,164)">
      <rect class="agent" x="0" y="20" width="5" height="40" rx="2"/>
      <text class="tier" x="14" y="34">ARM k3s agents</text>
      <text class="spec" x="14" y="52">OPi Zero 2W ×4 (H618, 4 GB)</text>
      <rect class="agent" x="262" y="22" width="213" height="20" rx="4" opacity="0.85"/>
      <text class="ct" x="482" y="37">16C</text>
      <text class="ct" x="600" y="37">16 GB</text>
      <rect class="chip" x="716" y="24" width="250" height="20" rx="6"/><text class="ct" x="724" y="38" fill="#a78bfa">Mali-G31 MP2 ×4 (light)</text>
      <text class="spec" x="980" y="38">—</text>
    </g>
    <!-- 4 infra -->
    <g transform="translate(0,238)">
      <rect class="infra" x="0" y="20" width="5" height="40" rx="2"/>
      <text class="tier" x="14" y="34">ARM infra / services</text>
      <text class="spec" x="14" y="52">RPi 5 · 4B · 3B ×2 · XU3</text>
      <rect class="infra" x="262" y="22" width="320" height="20" rx="4" opacity="0.85"/>
      <text class="ct" x="589" y="37">24C</text>
      <text class="ct" x="600" y="37" opacity="0">.</text>
      <text class="ct" x="630" y="37">20 GB</text>
      <rect class="chip" x="716" y="24" width="250" height="20" rx="6"/><text class="ct" x="724" y="38">VideoCore · Mali-T628</text>
      <text class="spec" x="980" y="38">—</text>
    </g>
    <!-- 5 micro/edge -->
    <g transform="translate(0,312)">
      <rect class="micro" x="0" y="20" width="5" height="40" rx="2"/>
      <text class="tier" x="14" y="34">Micro + edge</text>
      <text class="spec" x="14" y="52">RPi Zero W ×3 · M5Stack</text>
      <rect class="micro" x="262" y="22" width="40" height="20" rx="4" opacity="0.85"/>
      <text class="ct" x="309" y="37">3C +ESP32</text>
      <text class="ct" x="600" y="37">~1.5 GB</text>
      <text class="spec" x="724" y="38">—</text>
      <rect class="chip" x="976" y="24" width="150" height="20" rx="6"/><text class="ct" x="984" y="38" fill="#34d399">6 TOPS (M5)</text>
    </g>
  </g>

  <!-- accelerator interpretation footer -->
  <g transform="translate(40,672)">
    <rect class="panel" x="0" y="0" width="1160" height="170" rx="12"/>
    <text class="cap" x="20" y="30">WHAT THE ACCELERATORS ARE FOR</text>
    <g transform="translate(20,46)">
      <rect class="eu" x="0" y="0" width="5" height="100" rx="2"/>
      <text class="tier" x="14" y="18" fill="#f59e0b">104 Intel EU</text>
      <text class="spec" x="14" y="40">H4 (32) + N150 ×3 (24 ea).</text>
      <text class="spec" x="14" y="58">OpenVINO on the iGPUs:</text>
      <text class="spec" x="14" y="76">embeddings · Whisper STT ·</text>
      <text class="spec" x="14" y="94">OCR · vision. No LLM NPU.</text>
    </g>
    <g transform="translate(400,46)">
      <rect class="npu" x="0" y="0" width="5" height="100" rx="2"/>
      <text class="tier" x="14" y="18" fill="#34d399">18 TOPS NPU</text>
      <text class="spec" x="14" y="40">OPi 5 Pro ×2 (12) + M5Stack (6).</text>
      <text class="spec" x="14" y="58">Small-LLM chat (RKLLama) +</text>
      <text class="spec" x="14" y="76">vision + the edge escalation</text>
      <text class="spec" x="14" y="94">router. The local-AI tier.</text>
    </g>
    <g transform="translate(780,46)">
      <rect class="gpu" x="0" y="0" width="5" height="100" rx="2"/>
      <text class="tier" x="14" y="18" fill="#a78bfa">ARM Mali GPUs</text>
      <text class="spec" x="14" y="40">G610 MP4 ×2 + G31 MP2 ×4.</text>
      <text class="spec" x="14" y="58">Light OpenCL/Vulkan; minor</text>
      <text class="spec" x="14" y="76">next to the NPUs/iGPUs —</text>
      <text class="spec" x="14" y="94">display + occasional compute.</text>
    </g>
  </g>
  <text class="sub" x="40" y="868">Allocation note: the H4 (64 GB, 32 EU) is dedicated to NAS/AI, so the Proxmox cluster's usable x86 compute is the 3× N150 ≈ 12C / 48 GB / 72 EU.</text>
</svg>
