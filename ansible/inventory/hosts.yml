---
# Home lab inventory — 192.168.1.0/24 (confirmed live IPs updated 2026-06-25)
#
# SECURITY: rotate all plaintext credentials from the original mindmap.
# Use SSH keys + Ansible Vault for secrets.
#
# Confirmed from router DHCP (2026-06-25):
#   h4-core=.160(wired)  rpi5=.124(5G)       octopi=.148(wired)/.152(5G,avoid)
#   opi-zero2w-1=.184(5G) opi-zero2w-2=.188(5G) opi-zero2w-4=.99(5G)
#   opi5pro-1=.168(wired) n150-1=.10(wired)   n150-2=.171(wired)  n150-3/yikw=.176(5G)
#   xu3-1=.64(wired, active traffic)
# Still TBD: opi5pro-2, rpi4b, opi-zero2w-3, spare-pi
all:
  vars:
    ansible_user: swares
    lab_domain: lab.home.arpa
    lab_subnet: 192.168.1.0/24
    lab_gateway: 192.168.1.1

  children:
    # ---- Core: x86 NAS + k3s cluster ----
    microshift:          # group name kept for playbook compatibility; runs k3s now
      hosts:
        h4-core:
          ansible_host: 192.168.1.160    # Odroid-H4 Ultra, MAC 00:1E:06:45:99:E5, wired
          ansible_connection: local
          node_ip: 192.168.1.160
          boot_device: /dev/mmcblk0
          microshift_lvm_file: /mnt/nvme0n1p2/microshift-lvm.img
          microshift_lvm_size: 2000G
          microshift_loop_dev: /dev/loop100
          microshift_pv_device: /dev/loop100
          microshift_vg: vg_microshift
          nas_lv: lv_nas
          nas_mount: /srv/nas
          cold_primary_device: /dev/md1
          cold_primary_mount: /mnt/cold-8t
          cold_secondary_device: /dev/md0
          cold_secondary_mount: /mnt/cold-sec

    # ---- DNS: Pi-hole primary on octopi (RPi 3B #2, wired) + secondary on a Zero 2W ----
    dns:
      vars:
        ingress_vip: 192.168.1.160       # H4 — *.apps.lab.home.arpa resolves here
        dns_upstream: ["1.1.1.1", "9.9.9.9"]
        dns_records:
          h4-core:      192.168.1.160
          rpi5:         192.168.1.128
          octopi:       192.168.1.148    # wired; 5G=.152
          opi-zero2w-1: 192.168.1.184
          opi-zero2w-2: 192.168.1.188
          opi-zero2w-4: 192.168.1.99
          n150-3:       192.168.1.176
          n150-1:       192.168.1.10
          n150-2:       192.168.1.171
          xu3-1:        192.168.1.64
          opi5pro-1:    192.168.1.168
          opi5pro-2:    192.168.1.172
          # TBD when online:
          # rpi4b:      192.168.1.???
          # opi-zero2w-3: 192.168.1.???
        dns_unfiltered_clients:
          - { ip: 192.168.1.160, name: h4-core }
          - { ip: 192.168.1.128, name: rpi5 }
          - { ip: 192.168.1.184, name: opi-zero2w-1 }
          - { ip: 192.168.1.188, name: opi-zero2w-2 }
          - { ip: 192.168.1.99,  name: opi-zero2w-4 }
          - { ip: 192.168.1.176, name: n150-3 }
          - { ip: 192.168.1.168, name: opi5pro-1 }
          - { ip: 192.168.1.10,  name: n150-1 }
          - { ip: 192.168.1.171, name: n150-2 }
          - { ip: 192.168.1.64,  name: xu3-1 }
      hosts:
        dns-1:
          ansible_host: 192.168.1.148    # octopi — RPi 3B #2, wired MAC B8-27-EB-E7-43-73; 5G=.152 (B8-27-EB-B2-16-26, avoid)
          dns_role: primary
          dns_engine: dnsmasq            # Raspbian Buster (EOL) — Pi-hole v6 requires Bullseye+; upgrade OS to enable Pi-hole
        dns-2:
          ansible_host: 192.168.1.184    # opi-zero2w-1 — secondary DNS
          dns_role: secondary

    # ---- AI escalation orchestrator (Tier 3) ----
    orchestrator:
      hosts:
        opi5pro-1:
          ansible_host: 192.168.1.168    # MAC C0-74-2B-FB-46-B9, confirmed 2026-06-25
          orchestrator_workdir: /srv/lab-workdir
          orchestrator_port: 8443

    # ---- k3s servers: H4 (primary) + OPi 5 Pro ARM pair (Phase 2) ----
    k3s_server:
      hosts:
        h4-core:          # vars inherited from microshift group above
        opi5pro-1:
          ansible_host: 192.168.1.168    # MAC C0-74-2B-FB-46-B9, RK3588S NPU, 8C/16GB
        opi5pro-2:
          ansible_host: 192.168.1.172    # MAC C0-74-2B-FB-46-AB, OPi 5 Pro #2, 8C/16GB, RK3588S NPU, wired

    k3s_agents:
      hosts:
        rpi5:
          ansible_host: 192.168.1.128    # RPi 5, 4C/8GB, wired MAC 2C-CF-67-EF-E2-B3 — Vault (5G=.124, avoid)
        rpi4b:
          ansible_host: 192.168.1.???    # TODO: RPi 4B — OpenLDAP
        xu3-1:
          ansible_host: 192.168.1.64     # odroid-xu3-01, MAC 00-1E-06-61-7A-39, wired ⚠ flagged unstable

    # ---- x86 mini PCs ----
    x86_nodes:
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_scheme: http
        ansible_port: 5985
        ansible_shell_type: powershell
        ansible_become: false
        ansible_user: ansible              # local account created on each n150
      hosts:
        n150-1:
          ansible_host: 192.168.1.10     # WIN-JP2L83B3A35, MAC 68-1D-EF-4D-C8-30, wired
        n150-2:
          ansible_host: 192.168.1.171    # WIN-42SQLQ00S1R, MAC 68-1D-EF-4D-DA-2F, wired
        n150-3:
          ansible_host: 192.168.1.176    # N150 HTPC (TV/living room), MAC 98-BD-80-5C-4C-D4, Windows
          vm_image: /mnt/cold-8t/VMs/YIKW.VHDX  # cold-tier backup image of this host

    # ---- Foundation service hosts ----
    vault:
      hosts:
        rpi5:
          ansible_host: 192.168.1.128    # RPi 5 — HashiCorp Vault (wired)

    ldap:
      hosts:
        rpi4b:
          ansible_host: 192.168.1.???    # TODO: RPi 4B — OpenLDAP

    mqtt:
      hosts:
        opi-zero2w-2:
          ansible_host: 192.168.1.188    # OPi Zero 2W #2, MAC E0-22-90-6E-5E-3A — Mosquitto

    # ---- Orange Pi Zero 2W pool ----
    opi_zero2w:
      hosts:
        opi-zero2w-1:
          ansible_host: 192.168.1.184    # MAC 20-1A-F8-6B-D8-CB — DNS secondary
        opi-zero2w-2:
          ansible_host: 192.168.1.188    # MAC E0-22-90-6E-5E-3A — MQTT broker
        opi-zero2w-3:
          ansible_host: 192.168.1.???    # TODO
        opi-zero2w-4:
          ansible_host: 192.168.1.99     # MAC 38-BD-01-3B-8A-30

    # ---- Single-purpose ----
    services:
      hosts:
        spare-pi:
          ansible_host: 192.168.1.???    # RPi 3B #1 — ⚠ power fault, not load-bearing; IP unknown
