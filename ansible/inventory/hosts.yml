---
# Home lab inventory — updated to Hardware2 map (real 10.136.151.0/24 addressing).
#
# SECURITY: the source mindmap contained plaintext USER/PASS values. They are deliberately
# NOT reproduced here. Rotate those credentials and use SSH keys + Ansible Vault instead.
#
# The H4 (x86) remains the MicroShift core. The two Orange Pi 5 Pro boards (8C/16GB/NPU) are
# now the strongest ARM nodes and the natural k3s control plane for the optional Phase-2
# cluster. Observed services per node are noted in comments for context — this repo does not
# manage them yet (see ARCHITECTURE/HARDWARE docs and the note on the OpenNebula direction).
all:
  vars:
    ansible_user: swares                 # rotate the map's shared password; use SSH keys
    lab_domain: lab.home.arpa            # RFC 8375 reserved domain for home networks
    lab_subnet: 10.136.151.0/24
    lab_gateway: 10.136.151.1            # confirm — not specified in the map

  children:
    # ---- Core: x86 NAS + MicroShift cluster ----
    microshift:
      hosts:
        h4-core:
          ansible_host: 10.136.151.64    # Odroid-H4 Ultra, 2.5GbE (Intel I226-V), MAC 00:1E:06:45:99:E5
          node_ip: 10.136.151.64
          # Storage CHANGED vs first map: NVMe 4TB + eMMC 256GB + SATA 6TB + SATA 8TB.
          # The SATA pair is MISMATCHED (6+8) — no clean 2x4TB RAID1. See storage.yml.
          boot_device: /dev/mmcblk0              # 256GB eMMC can hold the OS, freeing the NVMe
          microshift_pv_device: /dev/nvme0n1p4  # free partition reserved for LVMS VG
          microshift_vg: vg_microshift
          nas_lv: lv_nas
          nas_mount: /srv/nas
          cold_primary_device: /dev/md1         # 8 TB RAID 1 (2x8TB, sdb+sdd) — primary restic + Immich library
          cold_primary_mount: /mnt/cold-8t
          cold_secondary_device: /dev/md0       # ~5.45 TB RAID 1 (2x6TB) — REBUILD clean from ex-Synology sda+sdc after migration; set to the array you create
          cold_secondary_mount: /mnt/cold-sec
          # observed: Ansible✓, Docker✓, OpenNebula✓, OneAI, on-die GPU (32 EU)

    # ---- DNS: host UNASSIGNED in the updated map (was Pi-hole on a Zero W) ----
    # DNS is load-bearing for MicroShift (api + *.apps records). Pick a stable always-on
    # host — a Zero 2 W, an OPi 5 Pro, or dnsmasq on the H4 — and set it here.
    # ---- DNS: Pi-hole on the freed OctoPi box (RPi 3B #2, WIRED) + secondary on a Zero 2W ----
    # Load-bearing (k8s API + *.apps records) — primary runs on copper, not WiFi.
    dns:
      vars:
        ingress_vip: 10.136.151.40           # k8s ingress VIP — *.apps.lab.home.arpa resolves here
        dns_upstream: ["1.1.1.1", "9.9.9.9"] # forwarders for everything non-lab
        dns_records:                         # node A-records (PTRs auto-generated)
          h4-core: 10.136.151.64
          opi5pro-1: 10.136.151.83
          opi5pro-2: 10.136.151.97
          rpi5: 10.136.151.67
          rpi4b: 10.136.151.99
        # Lab/infra hosts that must resolve UNFILTERED (ad-block is for household clients only).
        dns_unfiltered_clients:
          - { ip: 10.136.151.64, name: h4-core }
          - { ip: 10.136.151.83, name: opi5pro-1 }
          - { ip: 10.136.151.97, name: opi5pro-2 }
          - { ip: 10.136.151.67, name: rpi5 }
          - { ip: 10.136.151.99, name: rpi4b }
          - { ip: 10.136.151.71, name: n150-1 }
          - { ip: 10.136.151.72, name: n150-2 }
      hosts:
        dns-1:
          ansible_host: 10.136.151.59        # RPi 3B #2 (WIRED) — repurposed from OctoPi (3D printer offline)
          dns_role: primary
        dns-2:
          ansible_host: 10.136.151.0         # secondary — an OPi Zero 2W (TBD IP); same Git-managed config
          dns_role: secondary

    # ---- AI escalation orchestrator (Tier 3: Claude Code) ----
    # Runs scripts/orchestrator.py --serve from the M5Stack framework: the endpoint the
    # device router escalates HARD turns to. It spawns Claude Code (shell/fs/git) in a scoped
    # WORKDIR and streams SSE back. Holds the Anthropic key; needs Node.js + Claude Code CLI.
    # An Orange Pi 5 Pro is the natural host (it's already the RKLLama "brain").
    orchestrator:
      hosts:
        opi5pro-1:
          ansible_host: 10.136.151.83
          orchestrator_workdir: /srv/lab-workdir   # repo Claude Code may operate in (scope tightly)
          orchestrator_port: 8443
          # IP allowlist + bearer are the real controls; set bearer via Ansible Vault, not here.

    # ---- Phase 2 (optional): ARM k3s cluster + ARM infra services ----
    k3s_server:
      hosts:
        opi5pro-1:
          ansible_host: 10.136.151.83    # Orange Pi 5 Pro, 8C/16GB, RK3588S NPU 6 TOPS — RKLLama LLM serving (see ai-nodes.yml)
        opi5pro-2:
          ansible_host: 10.136.151.97    # Orange Pi 5 Pro, 8C/16GB, RK3588S NPU 6 TOPS — RKLLama + OpenTelemetry (GitLab moved to a Proxmox VM; provisioning = cloud-init+Ansible)
    k3s_agents:
      hosts:
        rpi5:
          ansible_host: 10.136.151.67    # RPi 5, 4C/8GB — observed: Vault✓, AI GPU
        rpi4b:
          ansible_host: 10.136.151.99    # RPi 4B, 4C/8GB — observed: OpenLDAP✓
        xu3-1:
          ansible_host: 10.136.151.51    # Odroid-XU3, 8C/2GB (flagged ⚠ in map) — observed: Containers

    # ---- x86 mini PCs (NEW — not in the Hardware2 map) ----
    # 3x Intel N150 (Twin Lake): 4C/4T, 16GB DDR4, 512GB M.2. NO NPU — 24-EU UHD iGPU.
    # Two lab boxes + the living-room HTPC (#3) which runs its TV/browse function as a VM.
    # AI path is OpenVINO on the iGPU (embeddings / STT / vision), not a neural engine.
    # Also good as general x86 k3s nodes or service hosts.
    x86_nodes:
      hosts:
        n150-1:
          ansible_host: 10.136.151.71   # lab box — TODO: confirm IP
        n150-2:
          ansible_host: 10.136.151.72   # lab box — TODO: confirm IP
        n150-3:
          ansible_host: 10.136.151.0    # living-room HTPC — Proxmox node running the TV/browse VM; TODO: IP

    # ---- Single-purpose / micro nodes (not cluster members) ----
    services:
      hosts:
        # octopi (RPi 3B #2, .59) REPURPOSED → DNS (3D printer offline). See the `dns` group.
        spare-pi:
          ansible_host: 10.136.151.73    # RPi 3B #1 — ⚠ ON-BOARD POWER FAULT: low-voltage warnings persist
                                         # even on a 5V/5A PSU → suspected regulator/jack fault. Retire/RMA;
                                         # do NOT use for load-bearing roles (was DNS/QDevice candidate).
    # ---- Foundation service hosts (dedicated groups for the L0 playbooks) ----
    vault:
      hosts:
        rpi5:
          ansible_host: 10.136.151.67    # RPi 5, 8 GB — HashiCorp Vault (secrets / PKI)
    ldap:
      hosts:
        rpi4b:
          ansible_host: 10.136.151.99    # RPi 4B, 8 GB — OpenLDAP (directory)
    # MQTT relocated off dad's laptop onto an always-on lab Zero 2W (Mosquitto is tiny).
    mqtt:
      hosts:
        opi-zero2w-2:
          ansible_host: 10.136.151.0     # OPi Zero 2W — Mosquitto broker (TBD IP)

    # ---- Orange Pi Zero 2W pool (4 GB, standalone WiFi — ClusterHAT FAILED) ----
    # Allwinner H618, quad A53 64-bit, 4 GB, Mali-G31 (NO NPU). Real lightweight nodes:
    # viable k3s AGENTS (~16 C/16 GB across 4) or single-service hosts. Constraint: microSD
    # + SPI only, USB2, WiFi5 — keep them STATELESS (agents, not etcd/DB). One = DNS host.
    opi_zero2w:
      hosts:
        opi-zero2w-1: { ansible_host: 10.136.151.0 }   # TBD — candidate DNS / dnsmasq
        opi-zero2w-2: { ansible_host: 10.136.151.0 }   # TBD
        opi-zero2w-3: { ansible_host: 10.136.151.0 }   # TBD
        opi-zero2w-4: { ansible_host: 10.136.151.0 }   # TBD
    # ---- RPi Zero W (512 MB, 32-bit ARMv6) — weak; ultra-light tasks or retire ----
    # NOTE: confirm whether these are actually RPi Zero W or Orange Pi Zero (different board).
    zero_w:
      hosts:
        zerow-1:  { ansible_host: 10.136.151.0 }   # TBD — 32-bit, ultra-light only
        zerow-2:  { ansible_host: 10.136.151.0 }   # TBD
        zerow-3:  { ansible_host: 10.136.151.0 }   # TBD (1 unit DOA — confirm count)
