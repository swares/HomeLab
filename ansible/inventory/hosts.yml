---
# Home lab inventory — 192.168.1.0/24 (confirmed live IPs updated 2026-06-29)
#
# SECURITY: rotate all plaintext credentials from the original mindmap.
# Use SSH keys + Ansible Vault for secrets.
#
all:
  vars:
    ansible_user: swares
    lab_domain: lab.home.arpa
    lab_subnet: 192.168.1.0/24
    lab_gateway: 192.168.1.1

  children:
    # ---- Core: x86 NAS + k3s cluster ----
    microshift:          # group name kept for playbook compatibility; runs k3s now
      hosts:
        h4-core:
          ansible_host: 192.168.1.160    # Odroid-H4 Ultra, MAC 00:1E:06:45:99:E5, wired; k3s node name: odroid-nas
          ansible_connection: local
          node_ip: 192.168.1.160
          boot_device: /dev/mmcblk0
          microshift_lvm_file: /mnt/nvme0n1p2/microshift-lvm.img
          microshift_lvm_size: 2000G
          microshift_loop_dev: /dev/loop100
          microshift_pv_device: /dev/loop100
          microshift_vg: vg_microshift
          nas_lv: lv_nas
          nas_mount: /srv/nas
          cold_primary_device: /dev/md1
          cold_primary_mount: /mnt/cold-8t
          cold_secondary_device: /dev/md0
          cold_secondary_mount: /mnt/cold-sec

    # ---- DNS: Pi-hole primary on octopi (RPi 3B #2, wired) + secondary on a Zero 2W ----
    dns:
      vars:
        ingress_vip: 192.168.1.160       # H4 — *.apps.lab.home.arpa resolves here
        dns_upstream: ["1.1.1.1", "9.9.9.9"]
        dns_records:
          h4-core:      192.168.1.160
          api:          192.168.1.200    # kube-vip VIP — k3s control-plane HA endpoint
          rpi5:         192.168.1.128
          rpi4b:        192.168.1.116
          octopi:       192.168.1.148
          opi-zero2w-1: 192.168.1.184
          opi-zero2w-2: 192.168.1.188
          opi-zero2w-4: 192.168.1.99
          n150-1:       192.168.1.42
          n150-2:       192.168.1.21
          n150-3:       192.168.1.176
          xu3-1:        192.168.1.64
          opi5pro-1:    192.168.1.168
          opi5pro-2:    192.168.1.172
          hostmon:      192.168.1.82
          m5stack:      192.168.1.71
        dns_unfiltered_clients:
          - { ip: 192.168.1.160, name: h4-core }
          - { ip: 192.168.1.128, name: rpi5 }
          - { ip: 192.168.1.184, name: opi-zero2w-1 }
          - { ip: 192.168.1.188, name: opi-zero2w-2 }
          - { ip: 192.168.1.99,  name: opi-zero2w-4 }
          - { ip: 192.168.1.176, name: n150-3 }
          - { ip: 192.168.1.168, name: opi5pro-1 }
          - { ip: 192.168.1.42,  name: n150-1 }
          - { ip: 192.168.1.21,  name: n150-2 }
          - { ip: 192.168.1.64,  name: xu3-1 }
      hosts:
        dns-1:
          ansible_host: 192.168.1.148    # octopi — RPi 3B #2, wired; upgrade OS for Pi-hole v6
          dns_role: primary
          dns_engine: dnsmasq
        dns-2:
          ansible_host: 192.168.1.184    # opi-zero2w-1 — secondary DNS (dnsmasq fallback)
          dns_role: secondary
        dns-3:
          ansible_host: 192.168.1.116    # rpi4b — RPi 4B 8GB, wired; secondary DNS (Pi-hole v6)
          dns_role: secondary
          dns_engine: pihole

    # ---- AI escalation orchestrator (Tier 3) ----
    orchestrator:
      hosts:
        opi5pro-1:
          ansible_host: 192.168.1.168
          orchestrator_workdir: /srv/lab-workdir
          orchestrator_port: 8443

    # ---- k3s cluster ----
    k3s_server:
      hosts:
        h4-core:
        n150-1:
          ansible_host: 192.168.1.42
          node_ip: 192.168.1.42
        n150-2:
          ansible_host: 192.168.1.21
          node_ip: 192.168.1.21

    # Hosts pending promotion to k3s server (run k3s-ha-join.yml one at a time)
    k3s_new_servers:
      hosts:
        n150-1:
          ansible_host: 192.168.1.42
          node_ip: 192.168.1.42
        n150-2:
          ansible_host: 192.168.1.21
          node_ip: 192.168.1.21

    k3s_agents:
      hosts:
        opi5pro-1:
          ansible_host: 192.168.1.168    # arm64 inference agent
        opi5pro-2:
          ansible_host: 192.168.1.172    # arm64 inference agent

    # ---- KVM hypervisors (Ubuntu 24.04, SSH) ----
    kvm_hosts:
      vars:
        ansible_become: true
      hosts:
        n150-1:
          ansible_host: 192.168.1.42     # MAC 4A-6D-B5-BC-56-98, wired; hosts ldap-1 VM
        n150-2:
          ansible_host: 192.168.1.21     # MAC 16-3C-00-47-C0-6E, wired

    # ---- Windows HTPC ----
    x86_nodes:
      vars:
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_scheme: http
        ansible_port: 5985
        ansible_shell_type: powershell
        ansible_become: false
        ansible_user: ansible
      hosts:
        n150-3:
          ansible_host: 192.168.1.176    # HTPC (TV/living room), MAC 98-BD-80-5C-4C-D4

    # ---- Foundation service hosts ----
    vault:
      hosts:
        rpi5:
          ansible_host: 192.168.1.128

    mqtt:
      hosts:
        opi-zero2w-2:
          ansible_host: 192.168.1.188

    # ---- Orange Pi Zero 2W pool ----
    opi_zero2w:
      hosts:
        opi-zero2w-1:
          ansible_host: 192.168.1.184
        opi-zero2w-2:
          ansible_host: 192.168.1.188
        opi-zero2w-3:
          ansible_host: 192.168.1.???    # TODO
        opi-zero2w-4:
          ansible_host: 192.168.1.99

    lldap:
      hosts:
        ldap-1:
          ansible_host: 192.168.1.70     # KVM VM on n150-1 — lldap identity provider
          lldap_data_dir: /var/lib/lldap

    standalone_vms:
      hosts:
        ldap-1:
          ansible_host:    192.168.1.70
          kvm_host:        n150-1
          libvirt_vm_name: ldap-1
          health_check_url: "http://192.168.1.70:17170"

    # ---- node_exporter — non-cluster Linux hosts (cluster nodes get it via DaemonSet) ----
    # n150-1 and n150-2 removed: now k3s server nodes, covered by the DaemonSet.
    node_exporter:
      hosts:
        ldap-1:
          ansible_host: 192.168.1.70
        octopi-dns:
          ansible_host: 192.168.1.148
        rpi4b:
          ansible_host: 192.168.1.116
        opi-zero2w-1:
          ansible_host: 192.168.1.184
        opi-zero2w-2:
          ansible_host: 192.168.1.188
        opi-zero2w-4:
          ansible_host: 192.168.1.99

    # ---- Embedded / firmware devices (not Ansible-managed; inventory for DNS only) ----
    embedded:
      vars:
        ansible_connection: local   # placeholder — these are not SSH targets
      hosts:
        hostmon:
          ansible_host: 192.168.1.82    # Waveshare 4.3" ESP32-S3, MAC DC:DA:0C:48:AB:D0, wired
        m5stack:
          ansible_host: 192.168.1.71    # M5Stack LLM ESP32-S3, MAC 48:27:E2:79:0D:98, wired (station mode)

    # ---- Standalone Linux hosts ----
    standalone:
      hosts:
        rpi5:
          ansible_host: 192.168.1.128
        octopi-dns:
          ansible_host: 192.168.1.148
        opi-zero2w-2:
          ansible_host: 192.168.1.188
        xu3-1:
          ansible_host: 192.168.1.64
        ldap-1:
          ansible_host: 192.168.1.70     # lldap VM on n150-1
