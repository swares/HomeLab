[defaults]
roles_path = /home/swares/lab/homelab/homelab/ansible/roles
collections_path = /opt/ansible/collections:~/.ansible/collections:/usr/share/ansible/collections
inventory = inventory/hosts.yml
host_key_checking = True
retry_files_enabled = False
stdout_callback = ansible.builtin.default
result_format = yaml
interpreter_python = auto_silent
# vault_password_file is gitignored — create ansible/.vault_pass locally before running playbooks
vault_password_file = .vault_pass

[privilege_escalation]
become = True
become_method = sudo

[galaxy]
server_list = release_galaxy

[galaxy_server.release_galaxy]
url = https://galaxy.ansible.com/
api_version = v2

