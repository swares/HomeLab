---
# update-hosts.yml — OS package updates for bare-metal lab hosts.
#
# Strategy by role:
#   k3s nodes (opi5pro-1/2)  → drain → apt upgrade → reboot if needed → uncordon
#   k3s server (H4/odroid-nas) → apt upgrade, NO auto-reboot (NAS is co-located;
#                                 flag reboot-required so you can schedule it manually)
#   standalone Linux hosts    → apt upgrade → reboot if needed
#
# Usage:
#   ansible-playbook playbooks/update-hosts.yml                  # all hosts
#   ansible-playbook playbooks/update-hosts.yml -l k3s_agents    # opi5pro nodes only
#   ansible-playbook playbooks/update-hosts.yml -l k3s_server    # H4 only (no reboot)
#   ansible-playbook playbooks/update-hosts.yml -l standalone    # rpi5, octopi, etc.
#   ansible-playbook playbooks/update-hosts.yml --check          # dry-run
#
#   # Maintenance window reboot of h4-core (drain → reboot → uncordon):
#   ansible-playbook playbooks/update-hosts.yml --tags reboot_h4
#   # Force reboot even if /var/run/reboot-required is absent:
#   ansible-playbook playbooks/update-hosts.yml --tags reboot_h4 -e force_reboot=true
#
# NOTE: this playbook requires LAN SSH access. Run from H4 or a self-hosted runner.
#   On H4: ansible-playbook -i inventory/hosts.yml playbooks/update-hosts.yml \
#             --vault-password-file .vault_pass


# ──────────────────────────────────────────────────────────────────────────────
# 1. k3s SERVER (H4 / odroid-nas) — patch without auto-reboot.
#    NAS services (smbd, nfs) are co-located here. Rebooting disrupts NAS.
#    This play upgrades packages and flags if a reboot is needed; you schedule
#    the reboot manually during a maintenance window.
# ──────────────────────────────────────────────────────────────────────────────
- name: Patch k3s server — apt upgrade, no auto-reboot
  hosts: h4-core
  become: true
  gather_facts: true
  tags: [k3s_server, k3s]

  tasks:
    - name: Update apt cache and apply all upgrades
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true
        autoremove: true
        autoclean: true
      register: apt_result

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_flag

    - name: NOTICE — reboot required on {{ inventory_hostname }}
      ansible.builtin.debug:
        msg: >
          ⚠  {{ inventory_hostname }} needs a reboot (kernel or libc updated).
          Schedule a maintenance window and run:
            kubectl drain {{ inventory_hostname }} --ignore-daemonsets --delete-emptydir-data
            sudo reboot
            kubectl uncordon {{ inventory_hostname }}
          NAS services (smbd/nfs) will be briefly unavailable during reboot.
      when: reboot_flag.stat.exists

    - name: Report — {{ inventory_hostname }}
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }}: packages changed={{ apt_result.changed }},
          reboot_required={{ reboot_flag.stat.exists }}.


# ──────────────────────────────────────────────────────────────────────────────
# 1b. h4-core MAINTENANCE REBOOT — drain → reboot → uncordon.
#     Tagged 'never' so it is skipped in normal runs.
#     Invoke explicitly: --tags reboot_h4
#     NAS services (smbd/nfs) unavailable during reboot (~2 min).
#     Pods with local-path PVCs on h4-core (e.g. immich-postgres) will restart
#     automatically after uncordon.
# ──────────────────────────────────────────────────────────────────────────────
- name: Reboot h4-core — drain/reboot/uncordon
  hosts: h4-core
  become: true
  gather_facts: false
  tags: [reboot_h4, never]   # 'never' skips this play unless --tags reboot_h4

  vars:
    node_name: odroid-nas
    reboot_timeout: 300

  tasks:
    - name: Check reboot-required flag
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_flag

    - name: ABORT — reboot not required (use -e force_reboot=true to override)
      ansible.builtin.fail:
        msg: >
          /var/run/reboot-required not present — kernel/libc not updated.
          Re-run with -e force_reboot=true to reboot anyway.
      when:
        - not reboot_flag.stat.exists
        - not (force_reboot | default(false) | bool)

    - name: Drain {{ node_name }} — evict workloads, cordon node
      ansible.builtin.command: >
        kubectl drain {{ node_name }}
          --ignore-daemonsets
          --delete-emptydir-data
          --timeout=120s
      changed_when: true

    - name: Reboot h4-core
      ansible.builtin.reboot:
        reboot_timeout: "{{ reboot_timeout }}"
        msg: "Maintenance reboot of h4-core (odroid-nas)"

    - name: Wait for {{ node_name }} to rejoin as Ready
      ansible.builtin.command: >
        kubectl wait node/{{ node_name }}
          --for=condition=Ready
          --timeout=300s
      changed_when: false
      retries: 5
      delay: 15
      register: wait_result
      until: wait_result.rc == 0

    - name: Uncordon {{ node_name }}
      ansible.builtin.command: kubectl uncordon {{ node_name }}
      changed_when: true

    - name: Report
      ansible.builtin.debug:
        msg: >
          h4-core ({{ node_name }}) rebooted successfully and is back in service.
          Check NAS mounts: smbstatus, showmount -e localhost.


# ──────────────────────────────────────────────────────────────────────────────
# 2. k3s AGENTS (opi5pro-1, opi5pro-2) — drain → patch → reboot → uncordon.
#    Serial=1 keeps at least one agent available throughout.
# ──────────────────────────────────────────────────────────────────────────────
- name: Patch k3s agents — drain/upgrade/uncordon
  hosts: opi5pro-1,opi5pro-2
  serial: 1
  become: true
  gather_facts: true
  ignore_unreachable: true
  tags: [k3s_agents, k3s]

  vars:
    k3s_control_host: "{{ groups['k3s_server'][0] }}"
    reboot_timeout: 300

  tasks:
    - name: Drain {{ inventory_hostname }} from the cluster
      ansible.builtin.command: >
        kubectl drain {{ inventory_hostname }}
          --ignore-daemonsets
          --delete-emptydir-data
          --timeout=120s
      delegate_to: "{{ k3s_control_host }}"
      changed_when: true

    - name: Apply all package updates (Debian/Ubuntu)
      ansible.builtin.shell: |
        export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        export DEBIAN_FRONTEND=noninteractive
        dpkg --configure -a
        apt-get update -qq && apt-get dist-upgrade -y -o Dpkg::Options::="--force-confold" && apt-get autoremove -y && apt-get autoclean -y
      register: apt_result
      changed_when: "'0 upgraded' not in apt_result.stdout"
      when: ansible_os_family == "Debian"

    - name: Apply all package updates (Arch Linux ARM)
      ansible.builtin.shell: |
        export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        pacman -Rdd --noconfirm geocode-glib-common 2>/dev/null || true
        pacman -Syu --noconfirm --noprogressbar --ignore libcamera,libcamera-ipa 2>&1
      register: apt_result
      changed_when: "'there is nothing to do' not in (apt_result.stdout | lower)"
      when: ansible_os_family == "Archlinux"

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_flag

    - name: Reboot if kernel or libc was updated
      ansible.builtin.reboot:
        reboot_timeout: "{{ reboot_timeout }}"
        msg: "Rebooting {{ inventory_hostname }} after package update"
      when: reboot_flag.stat.exists or (apt_result.changed | default(false)) or (pacman_result.changed | default(false))

    - name: Wait for node to rejoin as Ready
      ansible.builtin.command: >
        kubectl wait node/{{ inventory_hostname }}
          --for=condition=Ready
          --timeout=180s
      delegate_to: "{{ k3s_control_host }}"
      changed_when: false
      retries: 5
      delay: 15
      register: wait_result
      until: wait_result.rc == 0

    - name: Uncordon {{ inventory_hostname }}
      ansible.builtin.command: kubectl uncordon {{ inventory_hostname }}
      delegate_to: "{{ k3s_control_host }}"
      changed_when: true

    - name: Report — {{ inventory_hostname }}
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }}: packages changed={{ apt_result.changed }},
          rebooted={{ reboot_flag.stat.exists or (apt_result.changed | default(false)) or (pacman_result.changed | default(false)) }}.


# ──────────────────────────────────────────────────────────────────────────────
# 3. Standalone Linux hosts — apt upgrade + reboot if needed.
#    Covers: rpi5 (Vault), octopi (Pi-hole), opi-zero2w-2 (MQTT), xu3-1 (build)
#    Pi-hole is handled separately by update-non-apt.yml; this just patches the OS.
# ──────────────────────────────────────────────────────────────────────────────
- name: Patch standalone Linux hosts
  hosts: standalone
  serial: 1
  become: true
  gather_facts: true
  tags: [standalone]

  vars:
    reboot_timeout: 180

  tasks:
    - name: Apply all package updates (Debian/Ubuntu)
      ansible.builtin.shell: |
        export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        export DEBIAN_FRONTEND=noninteractive
        dpkg --configure -a
        apt-get update -qq && apt-get dist-upgrade -y -o Dpkg::Options::="--force-confold" && apt-get autoremove -y && apt-get autoclean -y
      register: apt_result
      changed_when: "'0 upgraded' not in apt_result.stdout"
      when: ansible_os_family == "Debian"

    - name: Apply all package updates (Arch Linux ARM)
      ansible.builtin.shell: |
        export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        pacman -Rdd --noconfirm geocode-glib-common 2>/dev/null || true
        pacman -Syu --noconfirm --noprogressbar --ignore libcamera,libcamera-ipa 2>&1
      register: pacman_result
      changed_when: "'there is nothing to do' not in (pacman_result.stdout | lower)"
      when: ansible_os_family == "Archlinux"

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_flag

    - name: Reboot if needed
      ansible.builtin.reboot:
        reboot_timeout: "{{ reboot_timeout }}"
        msg: "Rebooting {{ inventory_hostname }} after package update"
      when: reboot_flag.stat.exists or (apt_result.changed | default(false)) or (pacman_result.changed | default(false))

    - name: Report — {{ inventory_hostname }}
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }}: packages changed={{ apt_result.changed }},
          rebooted={{ reboot_flag.stat.exists or (apt_result.changed | default(false)) or (pacman_result.changed | default(false)) }}.
