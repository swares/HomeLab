---
# sandbox-vm-update.yml — Test OS updates in an isolated sandbox clone before touching production.
#
# Workflow:
#   1. Suspend production VM briefly (< 1s) for a consistent CoW snapshot point
#   2. Create a CoW overlay disk — production disk untouched, sandbox writes here
#   3. Resume production VM immediately
#   4. Boot sandbox clone on an isolated NAT network (internet via NAT, invisible to LAN)
#   5. Apply apt dist-upgrade + reboot in sandbox
#   6. Health check: HTTP + LDAP bind
#   7. Promote (default: false) — flatten overlay → versioned standalone disk → swap production
#   8. Always: destroy sandbox VM, delete overlay, clean up snapshot metadata
#
# State note: sandbox captures disk state at suspend time. LDAP writes after resume are in
#   production only. For OS-level package updates this is acceptable — we're validating
#   that packages don't break the service, not testing data changes.
#
# Usage:
#   # Validate only (default — does not promote):
#   ansible-playbook -i inventory/hosts.yml playbooks/sandbox-vm-update.yml \
#     -e target_vm=ldap-1 \
#     --vault-password-file .vault_pass --ask-become-pass
#
#   # Validate + promote production on pass:
#   ansible-playbook -i inventory/hosts.yml playbooks/sandbox-vm-update.yml \
#     -e "target_vm=ldap-1 promote_on_pass=true" \
#     --vault-password-file .vault_pass --ask-become-pass
#
# Required extra vars (-e):
#   target_vm:  inventory name of the VM to update (e.g. ldap-1)
#
# Required inventory vars on target_vm (standalone_vms group in hosts.yml):
#   kvm_host:         inventory name of its KVM hypervisor (e.g. n150-1)
#   libvirt_vm_name:  VM domain name as known to virsh (e.g. ldap-1)
#   health_check_url: HTTP URL to probe after update (e.g. http://192.168.1.70:17170)
#
# Optional inventory vars:
#   ldap_bind_dn:  DN for LDAP base search (default: uid=admin,ou=people,dc=lab,dc=home,dc=arpa)
#
# How host resolution works:
#   Ansible cannot interpolate inventory vars in hosts: at parse time. A Phase 0
#   localhost play reads hostvars[target_vm].kvm_host and calls add_host to
#   register that host into the dynamic group kvm_runner. Phases 1 and 3 then
#   target kvm_runner by its literal name — no variable interpolation needed.


# ─────────────────────────────────────────────────────────────────────────────
# Phase 0 — Resolve KVM host (Ansible cannot interpolate vars in hosts: at parse
#            time, so we use add_host on localhost to build a named dynamic group)
# ─────────────────────────────────────────────────────────────────────────────
- name: "Phase 0 — Resolve KVM host for {{ target_vm }}"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Register KVM hypervisor in dynamic group
      ansible.builtin.add_host:
        name: "{{ hostvars[target_vm]['kvm_host'] }}"
        groups: kvm_runner

# ─────────────────────────────────────────────────────────────────────────────
# Phase 1 — Clone production VM into sandbox
# ─────────────────────────────────────────────────────────────────────────────
- name: "Phase 1 — Clone {{ target_vm }} into sandbox"
  hosts: kvm_runner
  become: true
  gather_facts: true

  vars:
    vm_name:            "{{ hostvars[target_vm]['libvirt_vm_name'] }}"
    sandbox_vm_name:    "{{ vm_name }}-sandbox"
    sandbox_net_name:   "sandbox-nat"
    sandbox_net_gw:     "10.99.0.1"
    sandbox_net_mask:   "255.255.255.0"
    sandbox_dhcp_start: "10.99.0.10"
    sandbox_dhcp_end:   "10.99.0.50"
    images_dir:         "/var/lib/libvirt/images"
    prod_disk:          "{{ images_dir }}/{{ vm_name }}.qcow2"
    sandbox_disk:       "{{ images_dir }}/{{ sandbox_vm_name }}.qcow2"

  tasks:
    # ── Dependencies ──────────────────────────────────────────────────────────
    - name: Install KVM host tools
      ansible.builtin.apt:
        name: [qemu-utils, ldap-utils, python3-lxml]
        state: present
        update_cache: true

    # ── Sandbox NAT network (idempotent) ─────────────────────────────────────
    - name: Check if sandbox network exists
      ansible.builtin.command: virsh net-info {{ sandbox_net_name }}
      register: net_check
      changed_when: false
      failed_when: false

    - name: Define sandbox NAT network
      ansible.builtin.command:
        cmd: virsh net-define /dev/stdin
        stdin: |
          <network>
            <name>{{ sandbox_net_name }}</name>
            <forward mode='nat'/>
            <bridge name='virbr-sandbox' stp='on' delay='0'/>
            <ip address='{{ sandbox_net_gw }}' netmask='{{ sandbox_net_mask }}'>
              <dhcp>
                <range start='{{ sandbox_dhcp_start }}' end='{{ sandbox_dhcp_end }}'/>
              </dhcp>
            </ip>
          </network>
      when: net_check.rc != 0
      register: net_define

    - name: Start sandbox network
      ansible.builtin.command: virsh net-start {{ sandbox_net_name }}
      when: net_define is changed
      failed_when: false

    - name: Autostart sandbox network
      ansible.builtin.command: virsh net-autostart {{ sandbox_net_name }}
      when: net_define is changed

    # ── Sandbox disk ─────────────────────────────────────────────────────────
    # Strategy: suspend the VM, convert its disk to a fully standalone qcow2,
    # resume immediately. The standalone image has no backing-file reference, so
    # qemu-nbd can open it freely while the production VM is running.
    #
    # CoW overlay (qemu-img create -b) is faster but qemu-nbd can't open an
    # overlay whose backing file is locked by a running QEMU, and --force-share
    # (-U) is not available in the Ubuntu 24.04 packaged qemu-utils version.
    # Full convert avoids the locking problem entirely. Typical lldap VM disk
    # usage is < 5 GB; at NVMe speeds this suspends production for ~10–30 s.
    - name: Remove stale sandbox disk
      ansible.builtin.file:
        path: "{{ sandbox_disk }}"
        state: absent

    - name: Suspend production VM for consistent disk copy
      ansible.builtin.command: virsh suspend {{ vm_name }}
      changed_when: true

    - name: Copy production disk to standalone sandbox image
      # qemu-img convert and qemu-nbd both honour QEMU's advisory flock() and
      # refuse to open a disk locked by a running VM — even when the VM is
      # suspended (SIGSTOP pauses execution but does not release the fd lock).
      # Plain cp bypasses advisory locking entirely; the VM is suspended so no
      # writes are in flight, giving us a consistent point-in-time copy.
      ansible.builtin.command: cp {{ prod_disk }} {{ sandbox_disk }}

    - name: Resume production VM (conversion complete — no backing-file dependency)
      ansible.builtin.command: virsh resume {{ vm_name }}
      changed_when: true

    # ── Inject DHCP netplan into sandbox disk ────────────────────────────────
    # Production disk has static IP 192.168.1.70 in netplan. The sandbox clone
    # inherits that config and never requests DHCP, so virsh domifaddr returns
    # nothing. Mount the standalone sandbox disk via qemu-nbd and replace all
    # netplan configs with a DHCP-only file so the sandbox-nat dnsmasq assigns
    # a 10.99.0.x address. No lock conflict — standalone image, no backing file.
    - name: Patch sandbox disk — replace static netplan with DHCP (qemu-nbd mount)
      ansible.builtin.shell: |
        set -euo pipefail

        # Load NBD kernel module if not already loaded
        modprobe nbd max_part=8 2>/dev/null || true
        sleep 1

        # Disconnect any stale NBD connection on nbd0
        qemu-nbd --disconnect /dev/nbd0 2>/dev/null || true
        sleep 1

        # Connect standalone sandbox disk (no backing file — no lock conflict)
        qemu-nbd --connect=/dev/nbd0 {{ sandbox_disk }}
        sleep 2

        # Find the ext4 root partition (skip EFI/vfat partitions)
        ROOT_PART=""
        for part in /dev/nbd0p1 /dev/nbd0p2 /dev/nbd0p3; do
          if [ -b "$part" ] && blkid "$part" 2>/dev/null | grep -q 'TYPE="ext4"'; then
            ROOT_PART="$part"
            break
          fi
        done

        if [ -z "$ROOT_PART" ]; then
          qemu-nbd --disconnect /dev/nbd0
          echo "ERROR: no ext4 partition found on sandbox disk" >&2
          exit 1
        fi

        mkdir -p /mnt/sandbox-edit
        mount "$ROOT_PART" /mnt/sandbox-edit

        # Replace all netplan configs with a single DHCP-only file
        rm -f /mnt/sandbox-edit/etc/netplan/*.yaml /mnt/sandbox-edit/etc/netplan/*.yml
        cat > /mnt/sandbox-edit/etc/netplan/01-sandbox-dhcp.yaml << 'NETPLAN'
        network:
          version: 2
          ethernets:
            sandbox:
              match:
                name: "en*"
              dhcp4: true
              dhcp6: false
        NETPLAN
        chmod 600 /mnt/sandbox-edit/etc/netplan/01-sandbox-dhcp.yaml

        # Clean up
        umount /mnt/sandbox-edit
        qemu-nbd --disconnect /dev/nbd0
        echo "Netplan patched on $ROOT_PART — sandbox will request DHCP on boot"
      args:
        executable: /bin/bash

    # ── Sandbox VM definition ─────────────────────────────────────────────────
    - name: Dump production VM XML
      ansible.builtin.command: virsh dumpxml {{ vm_name }}
      register: prod_xml_raw
      changed_when: false

    - name: Write production VM XML to temp file
      ansible.builtin.copy:
        dest: /tmp/{{ vm_name }}-prod.xml
        content: "{{ prod_xml_raw.stdout }}"
        mode: "0600"

    - name: Transform XML into sandbox definition
      ansible.builtin.shell: |
        python3 << 'PYEOF'
        import xml.etree.ElementTree as ET

        ET.register_namespace('', '')
        tree = ET.parse('/tmp/{{ vm_name }}-prod.xml')
        root = tree.getroot()

        # New name
        root.find('name').text = '{{ sandbox_vm_name }}'

        # Remove UUID so libvirt generates a fresh one
        uuid_el = root.find('uuid')
        if uuid_el is not None:
            root.remove(uuid_el)

        # Swap disk path to sandbox overlay
        for disk in root.findall('.//disk[@device="disk"]'):
            src = disk.find('source')
            if src is not None and '{{ vm_name }}' in src.get('file', ''):
                src.set('file', '{{ sandbox_disk }}')

        # Remove cloud-init cdrom (not needed in sandbox)
        devices = root.find('devices')
        for disk in list(devices.findall('disk')):
            if disk.get('device') == 'cdrom':
                devices.remove(disk)

        # Change network interface: bridge br0 → NAT network sandbox-nat
        for iface in root.findall('.//interface'):
            src = iface.find('source')
            if src is not None and src.get('bridge') == 'br0':
                iface.set('type', 'network')
                src.attrib.clear()
                src.set('network', '{{ sandbox_net_name }}')
            # Remove MAC so libvirt assigns a new one (avoid conflict with production)
            mac = iface.find('mac')
            if mac is not None:
                iface.remove(mac)

        # No autostart in sandbox
        os_el = root.find('os')

        tree.write('/tmp/{{ sandbox_vm_name }}.xml', encoding='unicode', xml_declaration=False)
        print("Sandbox XML written.")
        PYEOF
      args:
        executable: /bin/bash

    - name: Destroy stale sandbox VM if it exists
      ansible.builtin.command: virsh destroy {{ sandbox_vm_name }}
      failed_when: false
      changed_when: false

    - name: Undefine stale sandbox VM
      ansible.builtin.command: virsh undefine {{ sandbox_vm_name }}
      failed_when: false
      changed_when: false

    - name: Define sandbox VM
      ansible.builtin.command: virsh define /tmp/{{ sandbox_vm_name }}.xml

    - name: Start sandbox VM
      ansible.builtin.command: virsh start {{ sandbox_vm_name }}

    # ── Discover sandbox VM IP ────────────────────────────────────────────────
    - name: Wait for sandbox VM to obtain DHCP lease
      ansible.builtin.command: virsh domifaddr {{ sandbox_vm_name }} --source lease
      register: sandbox_ip_raw
      retries: 30
      delay: 10
      until: sandbox_ip_raw.rc == 0 and '10.99.0.' in sandbox_ip_raw.stdout
      changed_when: false

    - name: Parse sandbox IP
      ansible.builtin.set_fact:
        sandbox_ip: "{{ sandbox_ip_raw.stdout | regex_search('10\\.99\\.0\\.\\d+') }}"

    - name: Show sandbox VM details
      ansible.builtin.debug:
        msg: "Sandbox '{{ sandbox_vm_name }}' running at {{ sandbox_ip }} on {{ sandbox_net_name }}"

    - name: Add sandbox VM to dynamic inventory
      ansible.builtin.add_host:
        name: sandbox-clone
        ansible_host: "{{ sandbox_ip }}"
        ansible_user: "{{ ansible_user }}"
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no
          -o UserKnownHostsFile=/dev/null
          -o ProxyJump={{ ansible_user }}@{{ ansible_host }}
        # Pass context forward to phase 2 and 3
        p_kvm_host:       "{{ inventory_hostname }}"
        p_vm_name:        "{{ vm_name }}"
        p_sandbox_vm:     "{{ sandbox_vm_name }}"
        p_sandbox_disk:   "{{ sandbox_disk }}"
        p_prod_disk:      "{{ prod_disk }}"
        p_images_dir:     "{{ images_dir }}"
        p_health_url:     "{{ hostvars[target_vm]['health_check_url'] }}"
        p_kvm_host_ip:    "{{ ansible_host }}"

    - name: Wait for SSH on sandbox VM
      ansible.builtin.wait_for:
        host: "{{ sandbox_ip }}"
        port: 22
        timeout: 120
        delay: 5

# ─────────────────────────────────────────────────────────────────────────────
# Phase 2 — Apply updates and validate in sandbox
# ─────────────────────────────────────────────────────────────────────────────
- name: "Phase 2 — Update and validate sandbox"
  hosts: sandbox-clone
  become: true
  gather_facts: true

  vars:
    sandbox_ip:      "{{ ansible_host }}"
    health_url:      "{{ hostvars['sandbox-clone']['p_health_url'] }}"
    # Derive sandbox service URLs from sandbox IP (not production IP)
    sandbox_http:    "http://{{ sandbox_ip }}:17170"
    sandbox_ldap:    "ldap://{{ sandbox_ip }}:3890"
    ldap_bind_dn:    "uid=admin,ou=people,dc=lab,dc=home,dc=arpa"

  tasks:
    - name: Apply all package updates
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true
        autoremove: true
        autoclean: true
      register: apt_result

    - name: Check if reboot required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_flag

    - name: Reboot sandbox if kernel/libc updated
      ansible.builtin.reboot:
        reboot_timeout: 180
        msg: "Sandbox reboot after package update"
      when: reboot_flag.stat.exists or apt_result.changed

    - name: Wait for services to settle after reboot
      ansible.builtin.wait_for:
        timeout: 15
      when: reboot_flag.stat.exists or apt_result.changed

    # ── Health checks ─────────────────────────────────────────────────────────
    - name: HTTP health check — web UI responds
      ansible.builtin.uri:
        url: "{{ sandbox_http }}"
        method: GET
        status_code: [200, 302]
        validate_certs: false
        timeout: 10
      register: http_check
      retries: 18
      delay: 5
      until: http_check.status in [200, 302]

    - name: LDAP connectivity check — port 3890 open
      ansible.builtin.wait_for:
        host: "{{ sandbox_ip }}"
        port: 3890
        timeout: 30

    - name: LDAP application check — anonymous base search
      ansible.builtin.command: >
        ldapsearch
          -H {{ sandbox_ldap }}
          -x
          -b "dc=lab,dc=home,dc=arpa"
          -s base
          "(objectClass=*)"
      register: ldap_check
      changed_when: false
      # Anonymous base search confirms the directory is up and serving the base DN.
      # A bind check with credentials can be added once lldap_admin_pass is in scope here.

    - name: Mark sandbox healthy
      ansible.builtin.set_fact:
        sandbox_healthy: true

    - name: Validation report
      ansible.builtin.debug:
        msg:
          - "✅ Packages updated: {{ apt_result.changed }}"
          - "✅ Rebooted:         {{ reboot_flag.stat.exists | bool }}"
          - "✅ HTTP status:      {{ http_check.status }}"
          - "✅ LDAP base search: {{ 'pass' if ldap_check.rc == 0 else 'FAIL' }}"

# ─────────────────────────────────────────────────────────────────────────────
# Phase 3 — Promote or discard
# ─────────────────────────────────────────────────────────────────────────────
- name: "Phase 3 — Promote or discard sandbox"
  hosts: kvm_runner
  become: true
  gather_facts: true

  vars:
    promote_on_pass:  false    # override with -e promote_on_pass=true
    vm_name:          "{{ hostvars['sandbox-clone']['p_vm_name'] }}"
    sandbox_vm_name:  "{{ hostvars['sandbox-clone']['p_sandbox_vm'] }}"
    sandbox_disk:     "{{ hostvars['sandbox-clone']['p_sandbox_disk'] }}"
    prod_disk:        "{{ hostvars['sandbox-clone']['p_prod_disk'] }}"
    images_dir:       "{{ hostvars['sandbox-clone']['p_images_dir'] }}"
    version_date:     "{{ ansible_date_time.date }}"
    versioned_disk:   "{{ images_dir }}/{{ vm_name }}-v{{ version_date }}.qcow2"
    backup_disk:      "{{ images_dir }}/{{ vm_name }}-pre-{{ version_date }}.qcow2"
    sandbox_healthy:  "{{ hostvars['sandbox-clone'].get('sandbox_healthy', false) | bool }}"

  tasks:
    # ── Shut down and remove sandbox VM ──────────────────────────────────────
    - name: Gracefully shut down sandbox VM
      ansible.builtin.command: virsh shutdown {{ sandbox_vm_name }}
      failed_when: false
      changed_when: true

    - name: Wait for sandbox VM to stop
      ansible.builtin.command: virsh domstate {{ sandbox_vm_name }}
      register: sandbox_state
      retries: 12
      delay: 5
      until: "'shut off' in sandbox_state.stdout or sandbox_state.rc != 0"
      changed_when: false
      failed_when: false

    - name: Force destroy sandbox VM if still running
      ansible.builtin.command: virsh destroy {{ sandbox_vm_name }}
      failed_when: false
      changed_when: false

    - name: Undefine sandbox VM
      ansible.builtin.command: virsh undefine {{ sandbox_vm_name }}
      failed_when: false
      changed_when: true

    # ── Promote path ──────────────────────────────────────────────────────────
    # The sandbox disk is already a standalone qcow2 (converted in Phase 1).
    # qemu-img convert compacts it (reclaims freed blocks from apt cleanup),
    # then we swap it into production during a brief planned shutdown (< 1 min).
    - name: "PROMOTE — Compact sandbox disk to versioned image"
      ansible.builtin.command: >
        qemu-img convert -O qcow2
          {{ sandbox_disk }}
          {{ versioned_disk }}
      when:
        - promote_on_pass | bool
        - sandbox_healthy | bool
      register: flatten_result

    - name: "PROMOTE — Shut down production VM for disk swap"
      ansible.builtin.command: virsh shutdown {{ vm_name }}
      when:
        - promote_on_pass | bool
        - sandbox_healthy | bool

    - name: "PROMOTE — Wait for production VM to stop"
      ansible.builtin.command: virsh domstate {{ vm_name }}
      register: prod_state
      retries: 12
      delay: 5
      until: "'shut off' in prod_state.stdout"
      changed_when: false
      when:
        - promote_on_pass | bool
        - sandbox_healthy | bool

    - name: "PROMOTE — Back up original production disk"
      ansible.builtin.command: >
        mv {{ prod_disk }} {{ backup_disk }}
      when:
        - promote_on_pass | bool
        - sandbox_healthy | bool

    - name: "PROMOTE — Swap versioned image to production disk path"
      ansible.builtin.command: >
        mv {{ versioned_disk }} {{ prod_disk }}
      when:
        - promote_on_pass | bool
        - sandbox_healthy | bool

    - name: "PROMOTE — Start production VM on updated disk"
      ansible.builtin.command: virsh start {{ vm_name }}
      when:
        - promote_on_pass | bool
        - sandbox_healthy | bool

    - name: "PROMOTE — Verify production VM is running"
      ansible.builtin.command: virsh domstate {{ vm_name }}
      register: final_state
      changed_when: false
      when:
        - promote_on_pass | bool
        - sandbox_healthy | bool

    # ── Cleanup ───────────────────────────────────────────────────────────────
    - name: Remove sandbox overlay disk
      ansible.builtin.file:
        path: "{{ sandbox_disk }}"
        state: absent

    # ── Summary ───────────────────────────────────────────────────────────────
    - name: Summary
      ansible.builtin.debug:
        msg: "{{ summary_lines }}"
      vars:
        summary_lines: >-
          {{
            ['✅ Sandbox validation PASSED' if sandbox_healthy else '❌ Sandbox validation FAILED — production untouched']
            + (['✅ Production promoted — old disk saved as ' + backup_disk,
                '✅ Production VM state: ' + (final_state.stdout | default('unknown'))]
               if (promote_on_pass | bool and sandbox_healthy | bool) else
               ['⏸  Promotion skipped — re-run with -e promote_on_pass=true to promote'])
            + ['🧹 Sandbox VM removed, overlay disk deleted']
          }}
