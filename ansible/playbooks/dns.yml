---
# DNS for the lab.
# Primary (dns-1, octopi, Raspbian Buster): dnsmasq — lab zone + upstream forwarding
# Secondary (dns-2, opi-zero2w-1, Arch ARM): dnsmasq — same config, redundancy
#
# Pi-hole path preserved for future use once octopi is upgraded to Bookworm.
# dns_engine auto-selects to 'dnsmasq' for non-apt hosts; override per-host in inventory.
- name: DNS — lab resolver
  hosts: dns
  become: true
  vars:
    pihole_web_password_hash: ""     # double-sha256; source from Vault, NOT plaintext here

  pre_tasks:
    # Auto-select engine based on OS package manager if not set in inventory
    - name: Set dns_engine from OS family if not already set
      ansible.builtin.set_fact:
        dns_engine: "{{ 'dnsmasq' if ansible_pkg_mgr in ['pacman', 'portage', 'zypper'] else 'pihole' }}"
      when: dns_engine is not defined

    # ---- Fix broken apt sources on EOL Raspbian/Debian Buster ----
    # Use distribution_release (not distribution name) — Ansible may report 'Debian' for Raspbian
    - name: (buster) remove dead raspbian.raspberrypi.org source from sources.list
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list
        regexp: 'raspbian\.raspberrypi\.org'
        state: absent
      when:
        - ansible_os_family == 'Debian'
        - ansible_distribution_release == 'buster'

    - name: (buster) point Debian packages at archive.debian.org (trusted — keys not in old keyring)
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/debian-buster-archive.list
        content: |
          # Buster is EOL — use Debian archive mirror
          # [trusted=yes] required: old Raspbian keyring lacks the Debian archive signing keys
          deb [trusted=yes] http://archive.debian.org/debian buster main contrib non-free
          deb [trusted=yes] http://archive.debian.org/debian-security buster/updates main contrib non-free
        mode: "0644"
      when:
        - ansible_os_family == 'Debian'
        - ansible_distribution_release == 'buster'

    - name: (buster) suppress valid-until errors for archived repo
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/99ignore-valid-until
        content: |
          Acquire::Check-Valid-Until "false";
          Acquire::AllowInsecureRepositories "true";
        mode: "0644"
      when:
        - ansible_os_family == 'Debian'
        - ansible_distribution_release == 'buster'

    - name: apt update (apt-based hosts only)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0
      when: ansible_pkg_mgr == 'apt'

    # ---- Arch: ensure dnsmasq is installed via pacman ----
    - name: (arch) install dnsmasq
      community.general.pacman:
        name: dnsmasq
        state: present
        update_cache: true
      when: ansible_pkg_mgr == 'pacman'

    # ---- Free port 53: disable systemd-resolved stub listener if active ----
    - name: Check if systemd-resolved is active
      ansible.builtin.command: systemctl is-active systemd-resolved
      register: resolved_status
      changed_when: false
      failed_when: false

    - name: Disable systemd-resolved stub listener (frees port 53 for dnsmasq)
      ansible.builtin.ini_file:
        path: /etc/systemd/resolved.conf
        section: Resolve
        option: DNSStubListener
        value: "no"
        mode: "0644"
      when: resolved_status.stdout == 'active'
      notify: restart systemd-resolved

    - name: Flush handlers before starting dnsmasq (ensure port 53 is free)
      ansible.builtin.meta: flush_handlers

  tasks:
    # ================================================================
    # Pi-hole path (Debian Bullseye+ / Ubuntu / Raspberry Pi OS Bookworm)
    # ================================================================
    - name: (pihole) ensure group
      ansible.builtin.group:
        name: pihole
        state: present
      when: dns_engine == 'pihole'

    - name: (pihole) ensure user
      ansible.builtin.user:
        name: pihole
        group: pihole
        shell: /usr/sbin/nologin
        home: /var/lib/pihole
        system: true
      when: dns_engine == 'pihole'

    - name: (pihole) config dir
      ansible.builtin.file:
        path: /etc/pihole
        state: directory
        owner: pihole
        group: pihole
        mode: "0775"
      when: dns_engine == 'pihole'

    - name: (pihole) pre-seed pihole.toml (REQUIRED before --unattended on a fresh host)
      ansible.builtin.template:
        src: ../templates/pihole.toml.j2
        dest: /etc/pihole/pihole.toml
        owner: pihole
        group: pihole
        mode: "0644"
      when: dns_engine == 'pihole'
      notify: restart pihole

    - name: (pihole) unattended install (idempotent — skipped once FTL exists)
      ansible.builtin.shell:
        cmd: "curl -sSL https://install.pi-hole.net | bash /dev/stdin --unattended"
        creates: /etc/systemd/system/pihole-FTL.service
      when: dns_engine == 'pihole'
      register: pihole_install

    - name: (pihole) refresh gravity (blocklists)
      ansible.builtin.command: pihole -g
      when: dns_engine == 'pihole'
      changed_when: false

    - name: (pihole) stage client-scoping SQL
      ansible.builtin.template:
        src: ../templates/pihole-clients.sql.j2
        dest: /etc/pihole/lab-clients.sql
        owner: pihole
        group: pihole
        mode: "0644"
      when: dns_engine == 'pihole'
      register: lab_clients_sql

    - name: (pihole) apply client scoping to gravity.db
      ansible.builtin.shell: 'pihole-FTL sqlite3 /etc/pihole/gravity.db ".read /etc/pihole/lab-clients.sql"'
      when:
        - dns_engine == 'pihole'
        - lab_clients_sql.changed or pihole_install.changed
      notify: restart pihole

    # ================================================================
    # Bare dnsmasq path (Arch, Raspbian Buster, any non-apt host)
    # ================================================================
    - name: (dnsmasq) install dnsmasq on apt-based hosts
      ansible.builtin.apt:
        name: dnsmasq
        state: present
      when:
        - dns_engine == 'dnsmasq'
        - ansible_pkg_mgr == 'apt'

    - name: (dnsmasq) ensure /etc/dnsmasq.d exists
      ansible.builtin.file:
        path: /etc/dnsmasq.d
        state: directory
        mode: "0755"
      when: dns_engine == 'dnsmasq'

    - name: (dnsmasq/arch) enable conf-dir in dnsmasq.conf (commented out by default on Arch)
      ansible.builtin.lineinfile:
        path: /etc/dnsmasq.conf
        regexp: '^#?conf-dir=/etc/dnsmasq\.d'
        line: 'conf-dir=/etc/dnsmasq.d/,*.conf'
      when:
        - dns_engine == 'dnsmasq'
        - ansible_pkg_mgr == 'pacman'
      notify: restart dnsmasq

    - name: (dnsmasq) deploy lab zone drop-in
      ansible.builtin.template:
        src: ../templates/lab-zone.conf.j2
        dest: /etc/dnsmasq.d/10-lab-zone.conf
        mode: "0644"
      when: dns_engine == 'dnsmasq'
      notify: restart dnsmasq

    - name: (dnsmasq) enable and start dnsmasq
      ansible.builtin.service:
        name: dnsmasq
        enabled: true
        state: started
      when: dns_engine == 'dnsmasq'

  handlers:
    - name: restart systemd-resolved
      ansible.builtin.service:
        name: systemd-resolved
        state: restarted

    - name: restart pihole
      ansible.builtin.service:
        name: pihole-FTL
        state: restarted

    - name: restart dnsmasq
      ansible.builtin.service:
        name: dnsmasq
        state: restarted
