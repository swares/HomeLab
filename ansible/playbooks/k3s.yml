---
# Install k3s on the Proxmox VMs created by OpenTofu. Generate the inventory first:
#   terraform/inventory-from-tofu.sh > ansible/inventory/tofu-vms.yml
#   ansible-playbook -i inventory/tofu-vms.yml playbooks/k3s.yml
- name: k3s server (VM)
  hosts: vm_k3s_server
  become: true
  tasks:
    - name: Install k3s server
      ansible.builtin.shell:
        cmd: "curl -sfL https://get.k3s.io | sh -s - server --write-kubeconfig-mode 644"
        creates: /usr/local/bin/k3s
    - name: Read node token
      ansible.builtin.slurp: { src: /var/lib/rancher/k3s/server/node-token }
      register: k3s_token
    - name: Fetch kubeconfig to the control node
      ansible.builtin.fetch: { src: /etc/rancher/k3s/k3s.yaml, dest: kubeconfig-vm-k3s.yaml, flat: true }

- name: k3s agents (VM)
  hosts: vm_k3s_agents
  become: true
  vars:
    k3s_url: "https://{{ hostvars[groups['vm_k3s_server'][0]].ansible_host }}:6443"
    k3s_token: "{{ hostvars[groups['vm_k3s_server'][0]].k3s_token.content | b64decode | trim }}"
  tasks:
    - name: Install k3s agent
      ansible.builtin.shell:
        cmd: "curl -sfL https://get.k3s.io | K3S_URL={{ k3s_url }} K3S_TOKEN={{ k3s_token }} sh -"
        creates: /usr/local/bin/k3s
