---
# Configure all k3s nodes to pull from the lab registry at registry.apps.lab.home.arpa.
# The registry uses a cert-manager lab-ca TLS cert (self-signed root); rather than
# distributing the CA to every host, we set insecure_skip_verify which is fine on a
# trusted LAN. Run this after the registry workload is healthy in ArgoCD.
#
# Also configures Docker on the xu3-1 build agent so images can be pushed.
#
# Usage: make k3s-registry

- name: Configure k3s nodes to trust lab registry
  hosts: k3s_server:k3s_agents
  become: true
  vars:
    registry_host: registry.apps.lab.home.arpa
    k3s_config_dir: /etc/rancher/k3s

  tasks:
    - name: Ensure k3s config directory exists
      ansible.builtin.file:
        path: "{{ k3s_config_dir }}"
        state: directory
        mode: "0755"

    - name: Write registries.yaml
      ansible.builtin.copy:
        dest: "{{ k3s_config_dir }}/registries.yaml"
        mode: "0600"
        content: |
          # Ansible-managed — lab OCI registry (Zot) as pull-through cache
          # docker.io and ghcr.io are mirrored via Zot's on-demand sync extension.
          # Zot pulls upstream on first request and caches locally — OPi nodes never
          # need direct internet access for image pulls.
          mirrors:
            "{{ registry_host }}":
              endpoint:
                - "https://{{ registry_host }}"
            docker.io:
              endpoint:
                - "https://{{ registry_host }}"
            ghcr.io:
              endpoint:
                - "https://{{ registry_host }}"
          configs:
            "{{ registry_host }}":
              auth:
                username: "{{ zot_admin_user | default('admin') }}"
                password: "{{ zot_admin_password }}"
              tls:
                insecure_skip_verify: true
      notify: restart k3s

  handlers:
    - name: restart k3s
      ansible.builtin.systemd:
        # Server nodes run 'k3s', agent nodes run 'k3s-agent'
        name: "{{ 'k3s' if inventory_hostname in groups['k3s_server'] else 'k3s-agent' }}"
        state: restarted

- name: Configure Docker on build nodes to push to lab registry
  hosts: xu3-1:h4-core
  become: true
  any_errors_fatal: false
  ignore_unreachable: true   # xu3-1 may have Python < 3.6; non-blocking for registry config
  vars:
    registry_host: registry.apps.lab.home.arpa

  tasks:
    - name: Ensure Docker is installed
      ansible.builtin.apt:
        name: docker.io
        state: present
        update_cache: true

    - name: Read existing daemon.json (if present)
      ansible.builtin.slurp:
        src: /etc/docker/daemon.json
      register: _daemon_json
      ignore_errors: true

    - name: Write daemon.json with insecure-registries
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        mode: "0644"
        content: |
          {
            "insecure-registries": ["{{ registry_host }}"]
          }
      notify: restart docker

    - name: Add ansible user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

  handlers:
    - name: restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
