---
# update-non-apt.yml — Update applications that live outside the OS package manager.
#
# Covers:
#   1. Pi-hole   (dns group)   — pihole -up, secondary first to preserve DNS
#   2. k3s       (k3s_server + k3s_agents) — reinstall-in-place to pinned k3s_version
#   3. Vault     (vault group) — apt-managed but needs seal-status check after restart
#
# Usage:
#   ansible-playbook playbooks/update-non-apt.yml              # all
#   ansible-playbook playbooks/update-non-apt.yml -t pihole    # Pi-hole only
#   ansible-playbook playbooks/update-non-apt.yml -t k3s       # k3s only
#   ansible-playbook playbooks/update-non-apt.yml -t vault     # Vault only
#   ansible-playbook playbooks/update-non-apt.yml --check      # dry-run
#
# The k3s_version variable lives in inventory/group_vars/all/k3s.yml and is
# bumped automatically by Renovate when a new release is tagged in rancher/k3s.

# ──────────────────────────────────────────────────────────────────────────────
# 1. Pi-hole — update secondary DNS first, then primary
#    This preserves DNS availability throughout: if the update breaks something
#    on dns-2, dns-1 is still serving.
# ──────────────────────────────────────────────────────────────────────────────
- name: Update Pi-hole — secondary first (dns-2 / opi-zero2w-1)
  hosts: dns-2
  become: true
  tags: [pihole]
  tasks:
    - name: Run pihole -up (secondary)
      ansible.builtin.command: pihole -up
      register: pihole_up
      changed_when: "'Everything is up to date' not in pihole_up.stdout"

    - name: Confirm pihole is responding after update (secondary)
      ansible.builtin.command: pihole status
      register: pihole_status
      changed_when: false
      failed_when: "'Active' not in pihole_status.stdout"

    - name: Show Pi-hole update output
      ansible.builtin.debug:
        msg: "{{ pihole_up.stdout_lines }}"

- name: Update Pi-hole — primary (dns-1 / octopi)
  hosts: dns-1
  become: true
  tags: [pihole]
  tasks:
    - name: Run pihole -up (primary)
      ansible.builtin.command: pihole -up
      register: pihole_up
      changed_when: "'Everything is up to date' not in pihole_up.stdout"

    - name: Confirm pihole is responding after update (primary)
      ansible.builtin.command: pihole status
      register: pihole_status
      changed_when: false
      failed_when: "'Active' not in pihole_status.stdout"

    - name: Show Pi-hole update output
      ansible.builtin.debug:
        msg: "{{ pihole_up.stdout_lines }}"


# ──────────────────────────────────────────────────────────────────────────────
# 2. k3s — upgrade bare-metal ARM nodes to k3s_version (from group_vars/all/k3s.yml)
#
#    The k3s installer is idempotent: if the node is already at k3s_version it
#    does nothing.  Servers must run before agents — the two plays enforce that.
#    For Proxmox k3s VMs, OS patching (update-vms.yml) handles the drain cycle;
#    the k3s binary there is also upgraded here if the VM hosts are in k3s_server
#    or k3s_agents groups.
# ──────────────────────────────────────────────────────────────────────────────
- name: Upgrade k3s — servers
  hosts: k3s_server
  serial: 1          # one server at a time
  become: true
  tags: [k3s]

  pre_tasks:
    - name: Show target version
      ansible.builtin.debug:
        msg: "Upgrading k3s on {{ inventory_hostname }} to {{ k3s_version }}"

    - name: Record current k3s version
      ansible.builtin.command: k3s --version
      register: k3s_current
      changed_when: false
      failed_when: false

  tasks:
    - name: Skip if already at target version
      ansible.builtin.meta: end_host
      when: k3s_version in (k3s_current.stdout | default(''))

    - name: Drain server node before upgrade
      ansible.builtin.command: >
        kubectl drain {{ inventory_hostname }}
          --ignore-daemonsets
          --delete-emptydir-data
          --timeout=120s
      changed_when: true
      # k3s server can drain itself (kubectl is available locally)

    - name: Run k3s installer — server
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION="{{ k3s_version }}" \
          INSTALL_K3S_SKIP_START=false \
          sh -
      args:
        executable: /bin/bash
      register: k3s_install
      changed_when: true

    - name: Wait for k3s to be ready
      ansible.builtin.command: >
        kubectl wait node/{{ inventory_hostname }}
          --for=condition=Ready
          --timeout=180s
      retries: 6
      delay: 15
      register: node_ready
      until: node_ready.rc == 0
      changed_when: false

    - name: Uncordon server node
      ansible.builtin.command: kubectl uncordon {{ inventory_hostname }}
      changed_when: true

  post_tasks:
    - name: Confirm upgraded version
      ansible.builtin.command: k3s --version
      register: k3s_new
      changed_when: false

    - name: Show result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ k3s_current.stdout | default('unknown') }} → {{ k3s_new.stdout }}"


- name: Upgrade k3s — agents
  hosts: k3s_agents
  serial: 1          # one agent at a time
  become: true
  tags: [k3s]

  pre_tasks:
    - name: Record current k3s version
      ansible.builtin.command: k3s --version
      register: k3s_current
      changed_when: false
      failed_when: false

  tasks:
    - name: Skip if already at target version
      ansible.builtin.meta: end_host
      when: k3s_version in (k3s_current.stdout | default(''))

    - name: Drain agent from the server
      ansible.builtin.command: >
        kubectl drain {{ inventory_hostname }}
          --ignore-daemonsets
          --delete-emptydir-data
          --timeout=120s
      delegate_to: "{{ groups['k3s_server'][0] }}"
      changed_when: true

    - name: Run k3s installer — agent
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION="{{ k3s_version }}" \
          K3S_URL="https://{{ hostvars[groups['k3s_server'][0]]['ansible_host'] }}:6443" \
          K3S_TOKEN="{{ k3s_agent_token }}" \
          sh -
      args:
        executable: /bin/bash
      # k3s_agent_token must be in Ansible vault or pulled from Vault at play time
      changed_when: true

    - name: Wait for agent to re-join as Ready
      ansible.builtin.command: >
        kubectl wait node/{{ inventory_hostname }}
          --for=condition=Ready
          --timeout=180s
      delegate_to: "{{ groups['k3s_server'][0] }}"
      retries: 6
      delay: 15
      register: node_ready
      until: node_ready.rc == 0
      changed_when: false

    - name: Uncordon agent
      ansible.builtin.command: kubectl uncordon {{ inventory_hostname }}
      delegate_to: "{{ groups['k3s_server'][0] }}"
      changed_when: true


# ──────────────────────────────────────────────────────────────────────────────
# 3. Vault — apt-managed (HashiCorp repo), but needs a seal-status check.
#
#    Vault's binary is upgraded by the OS update playbook (update-vms.yml).
#    This play only checks the seal state after a restart — it does NOT
#    auto-unseal.  Vault's unseal keys must stay human-controlled.
#    If Vault is sealed, a prominent warning is printed so you can unseal manually.
# ──────────────────────────────────────────────────────────────────────────────
- name: Check Vault seal status post-upgrade
  hosts: vault
  become: true
  tags: [vault]

  vars:
    vault_addr: "https://127.0.0.1:8200"

  tasks:
    - name: Check if Vault binary was upgraded by the OS update
      ansible.builtin.command: vault version
      register: vault_version
      changed_when: false
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_SKIP_VERIFY: "true"

    - name: Check Vault service status
      ansible.builtin.systemd:
        name: vault
      register: vault_svc
      changed_when: false

    - name: Ensure Vault service is running
      ansible.builtin.systemd:
        name: vault
        state: started
      when: vault_svc.status.ActiveState != "active"

    - name: Query Vault seal status
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/seal-status"
        method: GET
        validate_certs: false
        return_content: true
        status_code: [200]
      register: seal_status
      retries: 6
      delay: 10
      until: seal_status.status == 200

    - name: WARN — Vault is SEALED (manual unseal required)
      ansible.builtin.debug:
        msg: |
          ⚠  VAULT IS SEALED on {{ inventory_hostname }}.
          Vault must be manually unsealed before services that depend on it will work.
          Run: vault operator unseal   (with your unseal key shares)
          Vault address: {{ vault_addr }}
      when: seal_status.json.sealed | bool

    - name: Vault is unsealed — confirm
      ansible.builtin.debug:
        msg: "✓ Vault on {{ inventory_hostname }} is unsealed. Version: {{ vault_version.stdout }}"
      when: not (seal_status.json.sealed | bool)
