---
# update-non-apt.yml — Update applications that live outside the OS package manager.
#
# Covers:
#   1. Pi-hole   — pihole -up, secondary first to preserve DNS
#   2. k3s       — reinstall-in-place to pinned k3s_version
#   3. Vault     — apt-managed but needs seal-status check after restart
#
# Usage:
#   ansible-playbook playbooks/update-non-apt.yml              # all
#   ansible-playbook playbooks/update-non-apt.yml -t pihole    # Pi-hole only
#   ansible-playbook playbooks/update-non-apt.yml -t k3s       # k3s only
#   ansible-playbook playbooks/update-non-apt.yml -t vault     # Vault only
#   ansible-playbook playbooks/update-non-apt.yml --check      # dry-run

# ------------------------------------------------------------------------------
# 1. Pi-hole — secondary first, then primary
# ------------------------------------------------------------------------------
# dns-2 (opi-zero2w-1) runs dnsmasq, not pi-hole — no pihole update needed there

- name: Update Pi-hole - primary (dns-1 / octopi)
  hosts: dns-1
  become: true
  tags: [pihole]
  # TODO: remove the stat guard once pihole is installed (pending: flash octopi → Pi-hole v6)
  tasks:
    - name: Check if pihole is installed
      ansible.builtin.stat:
        path: /usr/local/bin/pihole
      register: pihole_bin

    - name: Skip notice
      ansible.builtin.debug:
        msg: "pihole not installed on {{ inventory_hostname }} — skipping update"
      when: not pihole_bin.stat.exists

    - name: Run pihole -up (primary)
      ansible.builtin.command: /usr/local/bin/pihole -up
      register: pihole_up
      changed_when: "'Everything is up to date' not in pihole_up.stdout"
      when: pihole_bin.stat.exists

    - name: Confirm pihole responding (primary)
      ansible.builtin.command: /usr/local/bin/pihole status
      register: pihole_status
      changed_when: false
      failed_when: >-
        pihole_status.rc != 0 or
        ('FTL is listening' not in pihole_status.stdout and 'Active' not in pihole_status.stdout)
      when: pihole_bin.stat.exists

    - name: Show output
      ansible.builtin.debug:
        msg: "{{ pihole_up.stdout_lines }}"
      when: pihole_bin.stat.exists and pihole_up is defined

# ------------------------------------------------------------------------------
# 2. k3s upgrade
# ------------------------------------------------------------------------------
- name: Upgrade k3s - servers
  hosts: k3s_server
  serial: 1
  become: true
  tags: [k3s]

  pre_tasks:
    - name: Record current k3s version
      ansible.builtin.command: k3s --version
      register: k3s_current
      changed_when: false
      failed_when: false

  tasks:
    - name: Skip if already at target version
      ansible.builtin.meta: end_host
      when: k3s_version in (k3s_current.stdout | default(''))

    - name: Drain server node
      ansible.builtin.command: >
        kubectl drain {{ inventory_hostname }}
          --ignore-daemonsets
          --delete-emptydir-data
          --timeout=120s
      changed_when: true

    - name: Run k3s installer - server
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION="{{ k3s_version }}" \
          INSTALL_K3S_SKIP_START=false \
          sh -
      args:
        executable: /bin/bash
      changed_when: true

    - name: Wait for node Ready
      ansible.builtin.command: >
        kubectl wait node/{{ inventory_hostname }}
          --for=condition=Ready
          --timeout=180s
      retries: 6
      delay: 15
      register: node_ready
      until: node_ready.rc == 0
      changed_when: false

    - name: Uncordon server
      ansible.builtin.command: kubectl uncordon {{ inventory_hostname }}
      changed_when: true

  post_tasks:
    - name: Confirm version
      ansible.builtin.command: k3s --version
      register: k3s_new
      changed_when: false

    - name: Show result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ k3s_current.stdout | default('unknown') }} -> {{ k3s_new.stdout }}"


- name: Upgrade k3s - agents
  hosts: k3s_agents
  serial: 1
  become: true
  tags: [k3s]

  pre_tasks:
    - name: Record current k3s version
      ansible.builtin.command: k3s --version
      register: k3s_current
      changed_when: false
      failed_when: false

    - name: Read k3s node token from server
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw
      delegate_to: "{{ groups['k3s_server'][0] }}"
      become: true

    - name: Set k3s_agent_token fact
      ansible.builtin.set_fact:
        k3s_agent_token: "{{ k3s_token_raw.content | b64decode | trim }}"

  tasks:
    - name: Skip if already at target version
      ansible.builtin.meta: end_host
      when: k3s_version in (k3s_current.stdout | default(''))

    - name: Drain agent
      ansible.builtin.command: >
        kubectl drain {{ inventory_hostname }}
          --ignore-daemonsets
          --delete-emptydir-data
          --timeout=120s
      delegate_to: "{{ groups['k3s_server'][0] }}"
      changed_when: true

    - name: Run k3s installer - agent
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_VERSION="{{ k3s_version }}" \
          K3S_URL="https://{{ hostvars[groups['k3s_server'][0]]['ansible_host'] }}:6443" \
          K3S_TOKEN="{{ k3s_agent_token }}" \
          sh -
      args:
        executable: /bin/bash
      changed_when: true

    - name: Wait for agent Ready
      ansible.builtin.command: >
        kubectl wait node/{{ inventory_hostname }}
          --for=condition=Ready
          --timeout=180s
      delegate_to: "{{ groups['k3s_server'][0] }}"
      retries: 6
      delay: 15
      register: node_ready
      until: node_ready.rc == 0
      changed_when: false

    - name: Uncordon agent
      ansible.builtin.command: kubectl uncordon {{ inventory_hostname }}
      delegate_to: "{{ groups['k3s_server'][0] }}"
      changed_when: true

# ------------------------------------------------------------------------------
# 3. Vault seal check (binary upgraded by OS update play)
# ------------------------------------------------------------------------------
- name: Check Vault seal status post-upgrade
  hosts: vault
  become: true
  tags: [vault]

  vars:
    vault_addr: "http://127.0.0.1:8200"

  tasks:
    - name: Check Vault version
      ansible.builtin.command: vault version
      register: vault_version
      changed_when: false
      environment:
        VAULT_ADDR: "{{ vault_addr }}"

    - name: Check Vault service status
      ansible.builtin.systemd:
        name: vault
      register: vault_svc
      changed_when: false

    - name: Ensure Vault service is running
      ansible.builtin.systemd:
        name: vault
        state: started
      when: vault_svc.status.ActiveState != "active"

    - name: Query Vault seal status
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/seal-status"
        method: GET
        validate_certs: false
        return_content: true
        status_code: [200]
      register: seal_status
      retries: 6
      delay: 10
      until: seal_status.status == 200

    - name: WARN - Vault is SEALED
      ansible.builtin.debug:
        msg: |
          WARNING: VAULT IS SEALED on {{ inventory_hostname }}.
          Run: vault operator unseal (3 key shares required)
          Address: {{ vault_addr }}
      when: seal_status.json.sealed | bool

    - name: Vault is unsealed
      ansible.builtin.debug:
        msg: "Vault on {{ inventory_hostname }} is unsealed. Version: {{ vault_version.stdout }}"
      when: not (seal_status.json.sealed | bool)
