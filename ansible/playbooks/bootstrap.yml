---
# Run ONCE per new host to push the Ansible SSH key and grant passwordless sudo.
# Requires -k (SSH password) and -K (become password) on first run only.
# After this, all other playbooks work without password flags.
#
# Usage:
#   make bootstrap                    # all non-local hosts
#   make bootstrap LIMIT=dns          # just the dns group
#   make bootstrap LIMIT=dns-1        # single host
- name: Bootstrap — SSH key + passwordless sudo
  hosts: "{{ target_hosts | default('all:!microshift') }}"
  gather_facts: false
  become: true

  tasks:
    - name: Ensure .ssh dir exists for ansible user
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.ssh"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0700"

    - name: Find available public key on control node
      ansible.builtin.set_fact:
        _pubkey_path: "{{ item }}"
      loop:
        - "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519.pub"
        - "{{ lookup('env', 'HOME') }}/.ssh/id_rsa.pub"
      when: item is file
      run_once: true
      delegate_to: localhost
      become: false

    - name: Push Ansible control-node public key
      ansible.posix.authorized_key:
        user: "{{ ansible_user }}"
        state: present
        key: "{{ lookup('file', _pubkey_path) }}"

    - name: Grant passwordless sudo to ansible user
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/ansible-{{ ansible_user }}"
        content: "{{ ansible_user }} ALL=(ALL) NOPASSWD: ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: visudo -cf %s

    - name: Verify sudo works without password
      ansible.builtin.command: sudo -n true
      become: false
      changed_when: false
