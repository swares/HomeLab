---
# Install and configure MicroShift on the H4 core, co-resident with the NAS services.
# Verify package/repo names against the current MicroShift install guide for your
# distro (CentOS Stream 9 / RHEL 9 / Fedora) before first run -- repo enablement
# differs per distro and per MicroShift release.
- name: Install MicroShift
  hosts: microshift
  become: true
  vars:
    pod_cidr: "10.42.0.0/16"
    service_cidr: "10.43.0.0/16"
  tasks:
    - name: Install MicroShift, release info, and the oc client
      ansible.builtin.dnf:
        name:
          - microshift
          - microshift-release-info
          - openshift-clients
        state: present

    # GOTCHA #1: even community builds pull some images from registry.redhat.io.
    # Place a (free) Red Hat pull secret BEFORE first start or pods ImagePullBackOff.
    # Keep the real file vaulted; never commit it (see .gitignore).
    - name: Install the Red Hat pull secret
      ansible.builtin.copy:
        src: files/pull-secret.json
        dest: /etc/crio/openshift-pull-secret
        owner: root
        group: root
        mode: "0600"

    - name: Render MicroShift config
      ansible.builtin.template:
        src: ../templates/microshift-config.yaml.j2
        dest: /etc/microshift/config.yaml
        mode: "0644"
      notify: Restart microshift

    # LVMS (TopoLVM) storage backend -- points dynamic PVs at the NVMe VG.
    - name: Render LVMS device-class config
      ansible.builtin.template:
        src: ../templates/lvmd.yaml.j2
        dest: /etc/microshift/lvmd.yaml
        mode: "0644"
      notify: Restart microshift

    # GOTCHA #2: firewalld must allow the pod & service CIDRs or DNS/API calls hang.
    - name: Allow pod and service networks through firewalld
      ansible.posix.firewalld:
        source: "{{ item }}"
        zone: trusted
        permanent: true
        immediate: true
        state: enabled
      loop:
        - "{{ pod_cidr }}"
        - "{{ service_cidr }}"

    - name: Open API and ingress ports
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        immediate: true
        state: enabled
      loop:
        - "6443/tcp"     # kube-apiserver
        - "80/tcp"       # router HTTP
        - "443/tcp"      # router HTTPS

    - name: Enable and start MicroShift
      ansible.builtin.systemd:
        name: microshift
        enabled: true
        state: started

    - name: Export kubeconfig to the ansible user
      ansible.builtin.command: >
        cp /var/lib/microshift/resources/kubeadmin/kubeconfig
        /home/{{ ansible_user }}/.kube/config
      args:
        creates: "/home/{{ ansible_user }}/.kube/config"

  handlers:
    - name: Restart microshift
      ansible.builtin.systemd:
        name: microshift
        state: restarted
