---
# OpenLDAP (slapd) on the RPi 4B. Installs slapd + utils, sets the base DN, loads a base DIT.
# Admin password comes from Vault (vault_ldap_admin_password) — never hardcode it.
- name: OpenLDAP directory
  hosts: ldap
  become: true
  vars:
    ldap_base_dn: "dc=lab,dc=home,dc=arpa"
    ldap_admin_password: "{{ vault_ldap_admin_password | default('CHANGEME-set-via-vault') }}"
  tasks:
    - name: Preseed slapd
      ansible.builtin.debconf: { name: slapd, question: "{{ item.q }}", vtype: "{{ item.t }}", value: "{{ item.v }}" }
      loop:
        - { q: slapd/domain, t: string, v: lab.home.arpa }
        - { q: shared/organization, t: string, v: lab }
        - { q: slapd/password1, t: password, v: "{{ ldap_admin_password }}" }
        - { q: slapd/password2, t: password, v: "{{ ldap_admin_password }}" }
      no_log: true
    - name: Install slapd + utils
      ansible.builtin.apt: { name: [slapd, ldap-utils], update_cache: true, state: present }
    - name: Render base DIT
      ansible.builtin.template: { src: ../templates/base-dit.ldif.j2, dest: /etc/ldap/base-dit.ldif, mode: "0640" }
    - name: Load base DIT (idempotent; rc 68 = already exists)
      ansible.builtin.command: "ldapadd -x -D cn=admin,{{ ldap_base_dn }} -w {{ ldap_admin_password }} -f /etc/ldap/base-dit.ldif"
      register: ldapadd
      changed_when: "'adding new entry' in ldapadd.stdout"
      failed_when: ldapadd.rc not in [0, 68]
      no_log: true
