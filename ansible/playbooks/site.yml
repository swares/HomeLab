---
# Top-level orchestration. Run a stage at a time the first time through:
#   ansible-playbook playbooks/storage.yml
#   ansible-playbook playbooks/k3s-h4.yml
#   ansible-playbook playbooks/backup.yml
#   ansible-playbook playbooks/argocd.yml
# ...or everything at once once you trust it:
#   ansible-playbook playbooks/site.yml
#
# Note: additional playbooks are run independently (not imported here):
#   k3s-ha-join.yml   — join agent/server nodes after h4 bootstrap
#   dns.yml           — Pi-hole + dnsmasq on DNS hosts
#   vault.yml         — HashiCorp Vault on RPi 5
#   ldap.yml          — lldap VM provisioning
#   ai-nodes.yml      — RKLLama + OVMS on OPi 5 Pro nodes
#   node-exporter.yml — node-exporter on non-cluster hosts
- import_playbook: storage.yml
- import_playbook: k3s-h4.yml
- import_playbook: backup.yml
- import_playbook: argocd.yml
