---
# bootstrap-kvm.yml — Configure bare-metal KVM host (Ubuntu 24.04).
#
# What this does:
#   1. Install KVM/QEMU/libvirt stack
#   2. Create network bridge br0 on enp1s0 (VMs get LAN IPs)
#   3. Carve 400 GB LV from ubuntu-vg for VM image storage
#   4. Register libvirt storage pool pointing at the LV
#   5. Add ansible user to libvirt/kvm groups
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbooks/bootstrap-kvm.yml \
#     -l n150-2 --vault-password-file .vault_pass

- name: Bootstrap KVM host
  hosts: kvm_hosts
  become: true
  gather_facts: true

  vars:
    bridge_iface: enp1s0
    bridge_name: br0
    vm_vg: ubuntu-vg
    vm_lv: vm-storage
    vm_lv_size: 400G
    vm_mount: /var/lib/libvirt/images
    libvirt_user: "{{ ansible_user }}"

  tasks:
    # ── Packages ──────────────────────────────────────────────────────────────
    - name: Install KVM/QEMU/libvirt stack
      ansible.builtin.apt:
        name:
          - qemu-kvm
          - libvirt-daemon-system
          - libvirt-clients
          - bridge-utils
          - virtinst
          - cloud-image-utils
          - cpu-checker
          - virt-top
          - libguestfs-tools
        state: present
        update_cache: true

    # ── KVM hardware check ────────────────────────────────────────────────────
    - name: Verify KVM acceleration available
      ansible.builtin.command: kvm-ok
      register: kvm_ok
      changed_when: false
      failed_when: "'KVM acceleration can be used' not in kvm_ok.stdout"

    - name: Show KVM status
      ansible.builtin.debug:
        msg: "{{ kvm_ok.stdout_lines }}"

    # ── Network bridge ────────────────────────────────────────────────────────
    - name: Check if bridge already exists
      ansible.builtin.stat:
        path: /sys/class/net/{{ bridge_name }}
      register: bridge_stat

    - name: Deploy netplan bridge config
      ansible.builtin.copy:
        dest: /etc/netplan/10-kvm-bridge.yaml
        mode: '0600'
        content: |
          network:
            version: 2
            ethernets:
              {{ bridge_iface }}:
                dhcp4: no
            bridges:
              {{ bridge_name }}:
                interfaces: [{{ bridge_iface }}]
                dhcp4: yes
                parameters:
                  stp: false
                  forward-delay: 0
      notify: apply netplan
      when: not bridge_stat.stat.exists

    # ── LVM storage ───────────────────────────────────────────────────────────
    - name: Check if VM LV exists
      ansible.builtin.command: lvs /dev/{{ vm_vg }}/{{ vm_lv }}
      register: lv_check
      changed_when: false
      failed_when: false

    - name: Create VM storage LV
      ansible.builtin.command: >
        lvcreate -L {{ vm_lv_size }} -n {{ vm_lv }} {{ vm_vg }}
      when: lv_check.rc != 0

    - name: Format VM storage LV
      ansible.builtin.filesystem:
        fstype: ext4
        dev: /dev/{{ vm_vg }}/{{ vm_lv }}
        state: present

    - name: Mount VM storage
      ansible.posix.mount:
        path: "{{ vm_mount }}"
        src: /dev/{{ vm_vg }}/{{ vm_lv }}
        fstype: ext4
        opts: defaults,noatime
        state: mounted

    - name: Set libvirt images dir permissions
      ansible.builtin.file:
        path: "{{ vm_mount }}"
        owner: root
        group: libvirt
        mode: '0775'

    # ── libvirt ───────────────────────────────────────────────────────────────
    - name: Enable and start libvirtd
      ansible.builtin.systemd:
        name: libvirtd
        enabled: true
        state: started

    - name: Add user to libvirt and kvm groups
      ansible.builtin.user:
        name: "{{ libvirt_user }}"
        groups: libvirt,kvm
        append: true

    - name: Define libvirt storage pool
      ansible.builtin.command: >
        virsh pool-define-as --name vms --type dir --target {{ vm_mount }}
      register: pool_define
      changed_when: pool_define.rc == 0
      failed_when: pool_define.rc != 0 and 'already exists' not in pool_define.stderr

    - name: Start and autostart storage pool
      ansible.builtin.command: "virsh pool-{{ item }} vms"
      loop: [start, autostart]
      register: pool_cmd
      changed_when: pool_cmd.rc == 0
      failed_when: pool_cmd.rc != 0 and 'already active' not in pool_cmd.stderr

    # ── QEMU bridge helper ────────────────────────────────────────────────────
    - name: Ensure /etc/qemu directory exists
      ansible.builtin.file:
        path: /etc/qemu
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Allow br0 in QEMU bridge ACL
      ansible.builtin.copy:
        dest: /etc/qemu/bridge.conf
        content: "allow {{ bridge_name }}\n"
        owner: root
        group: root
        mode: '0644'

    - name: Set setuid bit on qemu-bridge-helper
      ansible.builtin.file:
        path: /usr/lib/qemu/qemu-bridge-helper
        mode: 'u+s'

    # ── AppArmor: allow QEMU bridge-helper to read NUMA node info ─────────────
    - name: Ensure /etc/apparmor.d/local exists
      ansible.builtin.file:
        path: /etc/apparmor.d/local
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Allow qemu-bridge-helper to read NUMA node paths
      ansible.builtin.copy:
        dest: /etc/apparmor.d/local/usr.sbin.libvirtd
        content: |
          # Allow qemu-bridge-helper to enumerate NUMA nodes (required on multi-node hosts)
          /sys/devices/system/node/ r,
          /sys/devices/system/node/** r,
        owner: root
        group: root
        mode: '0644'
      notify: reload libvirtd apparmor profile

    # ── Report ────────────────────────────────────────────────────────────────
    - name: Report
      ansible.builtin.debug:
        msg:
          - "KVM host {{ inventory_hostname }} ready"
          - "Bridge: {{ bridge_name }} on {{ bridge_iface }}"
          - "VM storage: {{ vm_mount }} ({{ vm_lv_size }})"

  handlers:
    - name: apply netplan
      ansible.builtin.command: netplan apply

    - name: reload libvirtd apparmor profile
      ansible.builtin.command: apparmor_parser -r /etc/apparmor.d/usr.sbin.libvirtd
      failed_when: false
