---
- name: Bootstrap lldap on ldap-1
  hosts: ldap
  become: true
  vars:
    lldap_version: "v0.6.3"
    lldap_install_dir: /opt/lldap
    lldap_data_dir: /var/lib/lldap
    lldap_user: lldap

  tasks:
    - name: Create lldap system user
      ansible.builtin.user:
        name: "{{ lldap_user }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ lldap_data_dir }}"
        create_home: true

    - name: Create install directory
      ansible.builtin.file:
        path: "{{ lldap_install_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download lldap release
      ansible.builtin.get_url:
        url: "https://github.com/lldap/lldap/releases/download/{{ lldap_version }}/amd64-lldap.tar.gz"
        dest: /tmp/lldap.tar.gz
        mode: "0644"

    - name: Extract lldap
      ansible.builtin.unarchive:
        src: /tmp/lldap.tar.gz
        dest: "{{ lldap_install_dir }}"
        remote_src: true

    - name: Write lldap config
      ansible.builtin.copy:
        dest: "{{ lldap_install_dir }}/lldap_config.toml"
        owner: root
        group: "{{ lldap_user }}"
        mode: "0640"
        content: |
          verbose = false
          ldap_host = "0.0.0.0"
          ldap_port = 3890
          http_host = "0.0.0.0"
          http_port = 17170
          http_url = "http://ldap.lab.home.arpa:17170"
          ldap_base_dn = "dc=lab,dc=home,dc=arpa"
          ldap_user_dn = "admin"
          ldap_user_pass = "{{ lldap_admin_pass }}"
          jwt_secret = "{{ lldap_jwt_secret }}"
          database_url = "sqlite://{{ lldap_data_dir }}/users.db?mode=rwc"
          assets_path = "{{ lldap_install_dir }}/amd64-lldap/app"

    - name: Create systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/lldap.service
        mode: "0644"
        content: |
          [Unit]
          Description=LLDAP lightweight LDAP server
          After=network.target

          [Service]
          Type=simple
          User={{ lldap_user }}
          WorkingDirectory={{ lldap_data_dir }}
          ExecStart={{ lldap_install_dir }}/amd64-lldap/lldap run --config-file {{ lldap_install_dir }}/lldap_config.toml
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start lldap
      ansible.builtin.systemd:
        name: lldap
        enabled: true
        state: started
        daemon_reload: true
