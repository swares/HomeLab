---
# Rotate the lab user password on all managed Linux hosts.
# The plaintext password is NEVER stored here — only the SHA-512 hash in Ansible Vault.
#
# Prereqs:
#   1. Generate a hash and store it in Ansible Vault:
#        cd ansible/
#        python3 -c "import crypt,getpass; print(crypt.crypt(getpass.getpass(), crypt.mksalt(crypt.METHOD_SHA512)))" | \
#          ansible-vault encrypt_string --vault-password-file .vault_pass \
#          --encrypt-vault-id default --stdin-name lab_user_password_hash \
#          >> inventory/group_vars/all/secrets.yml
#
#   2. Run the playbook:
#        ansible-playbook -i inventory/hosts.yml playbooks/rotate-passwords.yml \
#          --vault-password-file .vault_pass
#
#   3. To target a single host:
#        ansible-playbook ... -l h4-core
#
# Windows hosts are excluded — they use WinRM + NTLM and are managed separately.
- name: Rotate lab user password (Linux hosts)
  hosts: all:!x86_nodes
  become: true
  gather_facts: true

  pre_tasks:
    - name: Verify lab_user_password_hash is set
      ansible.builtin.assert:
        that: lab_user_password_hash is defined and lab_user_password_hash | length > 0
        fail_msg: >
          lab_user_password_hash is not set in Ansible Vault.
          See the prereqs section in this playbook.

  tasks:
    - name: Set password for {{ ansible_user }}
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        password: "{{ lab_user_password_hash | trim }}"
        update_password: always
      no_log: true

    - name: Lock root account (disable direct root login)
      ansible.builtin.user:
        name: root
        password: "!"    # locked — sudo only
        update_password: always
      no_log: true

    - name: Ensure SSH password authentication is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
      notify: restart sshd

    - name: Ensure PubkeyAuthentication is enabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PubkeyAuthentication'
        line: 'PubkeyAuthentication yes'
        state: present
      notify: restart sshd

  handlers:
    - name: restart sshd
      ansible.builtin.service:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: restarted
