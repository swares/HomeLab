---
# Rotate the lab user (swares) password on all managed Linux hosts.
#
# Two-phase design:
#   Phase 1 — Bootstrap (HashiCorp Vault not yet up):
#     Requires lab_user_password_hash to be set in Ansible Vault:
#       cd ansible/
#       python3 -c "import crypt,getpass; print(crypt.crypt(getpass.getpass(), \
#         crypt.mksalt(crypt.METHOD_SHA512)))" | \
#         ansible-vault encrypt_string --vault-password-file .vault_pass \
#         --encrypt-vault-id default --stdin-name lab_user_password_hash \
#         >> inventory/group_vars/all/secrets.yml
#
#   Phase 2 — Post-Vault (HashiCorp Vault is up):
#     Fetches plaintext from secret/lab/hosts.swares_password, hashes it,
#     and applies. Requires VAULT_TOKEN env var on the control node.
#     Falls back to Ansible Vault hash if Vault is unreachable.
#
# Run:
#   ansible-playbook -i inventory/hosts.yml playbooks/rotate-passwords.yml \
#     --vault-password-file .vault_pass
#
# Windows hosts are excluded — managed separately via WinRM.

- name: Resolve password source
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Check if HashiCorp Vault is reachable
      ansible.builtin.uri:
        url: "http://192.168.1.128:8200/v1/sys/health"
        status_code: [200, 429, 472, 473, 501, 503]
        timeout: 5
      register: vault_health
      failed_when: false

    - name: Fetch password plaintext from HashiCorp Vault
      community.hashi_vault.vault_kv2_get:
        url: "http://192.168.1.128:8200"
        path: "lab/hosts"
        token: "{{ lookup('env', 'VAULT_TOKEN') }}"
      register: vault_hosts
      when:
        - vault_health.status is defined
        - vault_health.status in [200, 429]
        - lookup('env', 'VAULT_TOKEN') != ''
      no_log: true
      failed_when: false

    - name: Hash password from HashiCorp Vault
      ansible.builtin.set_fact:
        resolved_password_hash: "{{ vault_hosts.secret.swares_password | password_hash('sha512') }}"
      when:
        - vault_hosts is not skipped
        - vault_hosts.secret is defined
        - vault_hosts.secret.swares_password is defined
      no_log: true

    - name: Fall back to Ansible Vault hash
      ansible.builtin.set_fact:
        resolved_password_hash: "{{ lab_user_password_hash }}"
      when: resolved_password_hash is not defined
      no_log: true

    - name: Confirm password source
      ansible.builtin.debug:
        msg: >-
          Password source:
          {{ 'HashiCorp Vault' if (vault_hosts is not skipped and vault_hosts.secret is defined)
             else 'Ansible Vault (fallback)' }}

- name: Rotate lab user password (Linux hosts)
  hosts: all:!x86_nodes
  become: true
  gather_facts: true

  pre_tasks:
    - name: Verify resolved_password_hash is set
      ansible.builtin.assert:
        that: hostvars['localhost']['resolved_password_hash'] is defined
        fail_msg: >
          resolved_password_hash could not be resolved from HashiCorp Vault or Ansible Vault.
          Ensure either VAULT_TOKEN is set and Vault is reachable, or
          lab_user_password_hash is set in Ansible Vault secrets.yml.

  tasks:
    - name: Set password for {{ ansible_user }}
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        password: "{{ hostvars['localhost']['resolved_password_hash'] | trim }}"
        update_password: always
      no_log: true

    - name: Lock root account (disable direct root login)
      ansible.builtin.user:
        name: root
        password: "!"
        update_password: always
      no_log: true

    - name: Ensure SSH password authentication is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
      notify: restart sshd

    - name: Ensure PubkeyAuthentication is enabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PubkeyAuthentication'
        line: 'PubkeyAuthentication yes'
        state: present
      notify: restart sshd

  handlers:
    - name: restart sshd
      ansible.builtin.service:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: restarted
