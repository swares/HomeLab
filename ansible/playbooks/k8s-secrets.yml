---
# Recreate cluster secrets from Ansible Vault after a cluster rebuild.
# Run this immediately after ArgoCD is back up and before starting workloads.
#
# Usage:
#   cd ansible/
#   ansible-playbook -i inventory/hosts.yml playbooks/k8s-secrets.yml \
#     --vault-password-file .vault_pass
#
# Prereqs:
#   - inventory/group_vars/all/secrets.yml must have immich_db_password populated
#   - kubectl must be configured on h4-core (ansible_connection: local)
- name: Recreate k8s secrets from Ansible Vault
  hosts: h4-core
  become: false
  gather_facts: false

  tasks:

    # ── Immich ────────────────────────────────────────────────────────────────
    - name: Create immich namespace (idempotent)
      ansible.builtin.command:
        cmd: kubectl create namespace immich --dry-run=client -o yaml
      register: immich_ns_yaml
      changed_when: false

    - name: Apply immich namespace
      ansible.builtin.shell:
        cmd: >
          kubectl create namespace immich
          --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true

    # immich-secrets is now owned by external-secrets (ExternalSecret pulls from Vault).
    # Manual creation here would conflict with the ExternalSecret field manager.
    # To seed/update the value: vault kv put secret/lab/immich DB_PASSWORD=<value>
    # - name: Create immich-secrets (DEPRECATED — managed by ExternalSecret)

    # ── Authelia ──────────────────────────────────────────────────────────────
    # Only patches the storage_pg_password key; all other authelia-secrets keys
    # (jwt_secret, session_secret, etc.) are managed separately / at bootstrap.
    - name: Create authelia namespace (idempotent)
      ansible.builtin.shell:
        cmd: >
          kubectl create namespace authelia
          --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true

    - name: Patch storage_pg_password into authelia-secrets
      ansible.builtin.shell:
        cmd: >
          kubectl patch secret authelia-secrets -n authelia
          --type=json
          -p='[{"op":"add","path":"/data/storage_pg_password",
               "value":"{{ authelia_storage_pg_password | b64encode }}"}]'
      no_log: true
      changed_when: true
      failed_when: false   # no-op if secret doesn't exist yet (bootstrapped separately)
