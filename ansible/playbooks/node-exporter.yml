---
# Deploy prometheus-node-exporter on non-cluster Linux hosts.
# Cluster nodes (h4-core, opi5pro-1/2, rpi5, xu3-1) get node_exporter
# via the kube-prometheus-stack DaemonSet — exclude them from this playbook.
#
# Run:
#   ansible-playbook -i inventory/hosts.yml playbooks/node-exporter.yml
#
- name: Install and enable node_exporter on non-cluster hosts
  hosts: node_exporter
  become: true

  pre_tasks:
    # Minimal Armbian images (opi-zero2w) ship without python3-apt, which the
    # apt module requires. Bootstrap it via raw (works without python3-apt).
    - name: Bootstrap python3-apt (required by apt module)
      ansible.builtin.raw: |
        dpkg -s python3-apt &>/dev/null || apt-get install -y python3-apt
      changed_when: false

  tasks:
    - name: Install prometheus-node-exporter
      ansible.builtin.apt:
        name: prometheus-node-exporter
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Enable and start node_exporter
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        enabled: true
        state: started

    - name: Allow node_exporter port through ufw (if active)
      community.general.ufw:
        rule: allow
        port: "9100"
        proto: tcp
        src: 192.168.1.0/24
        comment: Prometheus node_exporter
      ignore_errors: true   # ufw may not be installed on all hosts
