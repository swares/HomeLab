---
- name: Install lz4 compressor (Debian/Ubuntu)
  ansible.builtin.apt:
    name: liblz4-tool
    state: present
  when: ansible_os_family == "Debian"

- name: Install lz4 compressor (Arch)
  ansible.builtin.pacman:
    name: lz4
    state: present
  when: ansible_os_family == "Archlinux"

- name: Check if zswap kernel module is available
  ansible.builtin.stat:
    path: /sys/module/zswap
  register: zswap_module

- name: Disable zram swap unit (if requested and zswap available)
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - zram-generator
    - systemd-zram-setup@zram0
  failed_when: false
  when: zswap_disable_zram and zswap_module.stat.exists

- name: Remove zram swap device (if requested and zswap available)
  ansible.builtin.command: swapoff /dev/zram0
  failed_when: false
  changed_when: false
  when: zswap_disable_zram and zswap_module.stat.exists

- name: Create swapfile
  ansible.builtin.command:
    cmd: dd if=/dev/zero of={{ zswap_swapfile_path }} bs=1M count={{ zswap_swapfile_size_mb }}
    creates: "{{ zswap_swapfile_path }}"

- name: Set swapfile permissions
  ansible.builtin.file:
    path: "{{ zswap_swapfile_path }}"
    mode: '0600'
    owner: root
    group: root

- name: Check if swapfile is already formatted
  ansible.builtin.command: blkid -o value -s TYPE {{ zswap_swapfile_path }}
  register: swapfile_type
  changed_when: false
  failed_when: false

- name: Format swapfile
  ansible.builtin.command: mkswap {{ zswap_swapfile_path }}
  register: mkswap_result
  changed_when: mkswap_result.rc == 0
  failed_when: mkswap_result.rc != 0
  when: swapfile_type.stdout.strip() != 'swap'

- name: Enable swapfile
  ansible.builtin.command: swapon {{ zswap_swapfile_path }}
  register: swapon_result
  changed_when: swapon_result.rc == 0
  failed_when: false

- name: Add swapfile to fstab
  ansible.posix.mount:
    path: none
    src: "{{ zswap_swapfile_path }}"
    fstype: swap
    opts: sw
    state: present

- name: Deploy zswap config systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/zswap-config.service
    mode: '0644'
    content: |
      [Unit]
      Description=Configure zswap parameters
      After=local-fs.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/bin/sh -c '\
        echo 1 > /sys/module/zswap/parameters/enabled && \
        echo {{ zswap_compressor }} > /sys/module/zswap/parameters/compressor && \
        echo {{ zswap_max_pool_percent }} > /sys/module/zswap/parameters/max_pool_percent'

      [Install]
      WantedBy=multi-user.target
  notify: reload systemd
  when: zswap_module.stat.exists

- name: Enable and start zswap-config service
  ansible.builtin.systemd:
    name: zswap-config
    enabled: true
    state: started
    daemon_reload: true
  when: zswap_module.stat.exists

- name: Apply zswap settings immediately via sysfs
  ansible.builtin.shell: |
    echo 1 > /sys/module/zswap/parameters/enabled
    echo {{ zswap_compressor }} > /sys/module/zswap/parameters/compressor
    echo {{ zswap_max_pool_percent }} > /sys/module/zswap/parameters/max_pool_percent
  changed_when: false
  when: zswap_module.stat.exists

- name: Notice — zswap not available on {{ inventory_hostname }}
  ansible.builtin.debug:
    msg: >
      zswap kernel module not found on {{ inventory_hostname }} (kernel {{ ansible_kernel }}).
      Swapfile created at {{ zswap_swapfile_path }} for OOM overflow. zram remains active for compression.
  when: not zswap_module.stat.exists

- name: Report swap status
  ansible.builtin.shell: swapon --show
  register: swap_status
  changed_when: false

- name: Show swap status
  ansible.builtin.debug:
    msg: "{{ swap_status.stdout_lines }}"
