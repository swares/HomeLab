apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: registry
  namespace: registry
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: lab-ca
    # Registries send large blobs; raise the body-size limit.
    traefik.ingress.kubernetes.io/router.middlewares: registry-bodylimit@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - registry.apps.lab.home.arpa
      secretName: registry-tls
  rules:
    - host: registry.apps.lab.home.arpa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zot
                port:
                  number: 5000
---
# Raise the default 1 MB Traefik body limit for image layer pushes.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: bodylimit
  namespace: registry
spec:
  buffering:
    maxRequestBodyBytes: 536870912    # 512 MB
    memRequestBodyBytes:  10485760    # buffer up to 10 MB in memory, rest to disk
