# Belt-and-suspenders DB dump into the library volume (restic on md0 then captures it).
# Immich also has a built-in DB backup (admin settings) writing to UPLOAD_LOCATION/backups;
# this CronJob makes the dump explicit and GitOps-managed.
apiVersion: batch/v1
kind: CronJob
metadata: { name: immich-db-backup, namespace: immich }
spec:
  schedule: "30 1 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: odroid-nas
          containers:
            - name: dump
              image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
              env:
                - name: PGPASSWORD
                  valueFrom: { secretKeyRef: { name: immich-secrets, key: DB_PASSWORD } }
              command: ["/bin/sh","-c"]
              args:
                - >
                  mkdir -p /usr/src/app/upload/backups &&
                  pg_dump -h immich-postgres -U immich -d immich --clean --if-exists
                  | gzip > /usr/src/app/upload/backups/immich-$(date +%F).sql.gz
              volumeMounts: [{ name: library, mountPath: /usr/src/app/upload }]
          volumes:
            - { name: library, persistentVolumeClaim: { claimName: immich-library } }
