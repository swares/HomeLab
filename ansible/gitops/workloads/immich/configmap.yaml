# Non-secret env shared by the Immich pods. DB_PASSWORD/POSTGRES_PASSWORD live in the
# `immich-secrets` Secret (NOT in git) — create it out-of-band or via External Secrets:
#   kubectl create secret generic immich-secrets --from-literal=DB_PASSWORD="$(openssl rand -base64 32)" -n immich
apiVersion: v1
kind: ConfigMap
metadata: { name: immich-env, namespace: immich }
data:
  DB_HOSTNAME: immich-postgres
  DB_USERNAME: immich
  DB_DATABASE_NAME: immich
  REDIS_HOSTNAME: immich-redis
  IMMICH_MACHINE_LEARNING_URL: http://immich-ml:3003
