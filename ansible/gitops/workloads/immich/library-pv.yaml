apiVersion: v1
kind: PersistentVolume
metadata: { name: immich-library }
spec:
  capacity: { storage: 6Ti }                 # cap as you like; it's the bulk photo/video store
  accessModes: ["ReadWriteMany"]             # NFS supports RWX; allows multi-replica immich-server if needed
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""                        # statically bound, not provisioned
  mountOptions:
    - hard                                   # retry forever on NFS outage (safe for bulk storage)
    - timeo=60
    - retrans=5
    - rsize=1048576
    - wsize=1048576
  nfs:
    server: 192.168.1.160                    # odroid-nas — exports /mnt/cold-8t/immich
    path: /mnt/cold-8t/immich               # the 8 TB RAID 1 mirror; data stays on cold storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: immich-library, namespace: immich }
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: ""
  resources: { requests: { storage: 6Ti } }
  volumeName: immich-library
