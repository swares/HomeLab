apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip-ds
  namespace: kube-system
  labels:
    app.kubernetes.io/name: kube-vip-ds
spec:
  selector:
    matchLabels:
      app: kube-vip-ds
  template:
    metadata:
      labels:
        app: kube-vip-ds
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
      tolerations:
        - effect: NoSchedule
          operator: Exists
      hostNetwork: true
      serviceAccountName: kube-vip
      containers:
        - name: kube-vip
          # Check https://github.com/kube-vip/kube-vip/releases for latest version
          image: ghcr.io/kube-vip/kube-vip:v0.8.9
          imagePullPolicy: IfNotPresent
          args:
            - manager
          env:
            # ARP mode — works on a flat L2 LAN (192.168.1.0/24)
            - name: vip_arp
              value: "true"
            - name: port
              value: "6443"
            # Empty interface = auto-detect from routing table (requires kube-vip ≥ v0.5.12)
            # Works across H4 (direct NIC) and n150s (br0 bridge) without per-node config
            - name: vip_interface
              value: ""
            - name: vip_cidr
              value: "32"
            # Control-plane VIP only — k3s servicelb handles LoadBalancer services
            - name: cp_enable
              value: "true"
            - name: cp_namespace
              value: kube-system
            - name: svc_enable
              value: "false"
            # Leader election — only one node owns the VIP at a time
            - name: vip_leaderelection
              value: "true"
            - name: vip_leaseduration
              value: "5"
            - name: vip_renewdeadline
              value: "3"
            - name: vip_retryperiod
              value: "1"
            - name: address
              value: "192.168.1.200"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_TIME
