---
# Grafana datasource for Loki — auto-imported by the Grafana sidecar.
# The sidecar watches for ConfigMaps with grafana_datasource: "1".
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        # loki-gateway service within the monitoring namespace
        url: http://loki-gateway.monitoring.svc.cluster.local
        isDefault: false
        jsonData:
          maxLines: 5000
          # Link Loki log lines to Prometheus traces via the instance label
          derivedFields:
            - name: TraceID
              matcherRegex: "traceID=(\\w+)"
              url: "$${__value.raw}"
