apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: sample-app
spec:
  replicas: 1
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      # OpenShift/MicroShift SCC: run non-root. NEVER loosen the SCC to "fix" a pod
      # that wants root -- fix the image/securityContext instead (see CLAUDE.md).
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: web
          image: registry.access.redhat.com/ubi9/httpd-24:latest
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: data
              mountPath: /var/www/html
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sample-data
