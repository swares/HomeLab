# Self-signed CA for lab.home.arpa
# Flow: SelfSigned bootstrap issuer → root CA cert → CA ClusterIssuer → all ingress certs
#
# One-time setup for clients: trust the CA cert exported from the lab-root-ca Secret.
# Export it:
#   kubectl get secret lab-root-ca -n cert-manager -o jsonpath='{.data.tls\.crt}' | base64 -d > lab-ca.crt
# Then install lab-ca.crt as a trusted CA on each device/browser.
---
# Step 1: bootstrap issuer (self-signs the root CA cert only)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
# Step 2: root CA certificate (10-year validity, CA:true)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: "Lab Home Arpa Root CA"
  subject:
    organizations: ["lab.home.arpa"]
  secretName: lab-root-ca
  duration: 87600h   # 10 years
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
# Step 3: CA ClusterIssuer — used by all Ingress resources
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab-ca
spec:
  ca:
    secretName: lab-root-ca
