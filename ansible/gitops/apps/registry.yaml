apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: registry, namespace: argocd }
spec:
  project: default
  source:
    repoURL: git@github.com:swares/HomeLab.git
    targetRevision: main
    path: gitops/workloads/registry
  destination: { server: https://kubernetes.default.svc, namespace: registry }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["CreateNamespace=true"]
