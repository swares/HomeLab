# Runs on every PR and push to main.
# Lints YAML, validates schemas, and enforces OPA policies.
#
# CI authority: GitLab CI is the authoritative pipeline (full validate/sync-check/rollback).
# This GitHub Actions workflow runs yaml-lint, schema validation, policy checks, and
# client-side manifest dry-runs — no cluster access required; runs on GitHub-hosted runners.
#
# No secrets required for these jobs.

name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Lint all YAML under gitops/
        run: |
          FAILED=0
          find gitops/ -name '*.yaml' -o -name '*.yml' | while read f; do
            yq e 'true' "$f" > /dev/null || { echo "FAIL: $f"; FAILED=1; }
          done
          [ "$FAILED" -eq 0 ] || exit 1
          echo "All YAML valid."

  kubeconform:
    name: Schema validation (kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform

      - name: Validate manifests against k8s 1.36 schema
        # --ignore-missing-schemas silently skips CRDs we don't have schemas for
        # (ArgoCD Application, ExternalSecret, Certificate, PrometheusRule, etc.).
        # Native k8s kinds (Deployment, Service, CronJob, NetworkPolicy, …) are checked strictly.
        # Helm values files (values.yaml, kustomization.yaml) are excluded — not k8s manifests.
        run: |
          find gitops/workloads -name '*.yaml' \
            ! -name 'values.yaml' \
            ! -name 'kustomization.yaml' \
            -print0 | \
            xargs -0 kubeconform \
              -kubernetes-version 1.36.0 \
              -ignore-missing-schemas \
              -summary \
              -output text

  policy-check:
    name: OPA policy check (conftest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install conftest
        run: |
          # renovate: datasource=github-releases depName=open-policy-agent/conftest
          VER=0.57.0
          curl -sSfLo /tmp/conftest.tar.gz \
            "https://github.com/open-policy-agent/conftest/releases/download/v${VER}/conftest_${VER}_Linux_x86_64.tar.gz"
          tar -xzf /tmp/conftest.tar.gz -C /usr/local/bin conftest

      - name: Run OPA policies against workload manifests
        # Policies: no floating :latest tags, no privileged containers, resource limits required.
        # Exceptions for known deferred items are in ci/data/exceptions.yaml.
        run: |
          find gitops/workloads -name '*.yaml' -print0 | \
            xargs -0 conftest test \
              --policy ci/policies \
              --data ci/data/exceptions.yaml

  dry-run-apply:
    name: kubectl dry-run (client-side)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Client-side dry-run all workload manifests
        # --dry-run=client validates manifest structure without a live cluster.
        # Server-side validation (schema + admission) runs in GitLab CI on a self-hosted runner.
        run: |
          FAILED=0
          find gitops/workloads -name '*.yaml' | while read f; do
            echo "  checking $f"
            kubectl apply --dry-run=client -f "$f" 2>&1 || FAILED=1
          done
          [ "$FAILED" -eq 0 ] || { echo "Dry-run failed."; exit 1; }
