# Runs on every PR and push to main.
# Lints YAML and client-side dry-runs kubectl apply.
#
# CI authority: GitLab CI is the authoritative pipeline (full validate/sync-check/rollback).
# This GitHub Actions workflow runs yaml-lint and client-side manifest validation only —
# it does NOT require cluster access and runs entirely on GitHub-hosted runners.
#
# No secrets required for these jobs.

name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Lint all YAML under gitops/
        run: |
          FAILED=0
          find gitops/ -name '*.yaml' -o -name '*.yml' | while read f; do
            yq e 'true' "$f" > /dev/null || { echo "FAIL: $f"; FAILED=1; }
          done
          [ "$FAILED" -eq 0 ] || exit 1
          echo "All YAML valid."

  dry-run-apply:
    name: kubectl dry-run (client-side)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Client-side dry-run all workload manifests
        # --dry-run=client validates manifest structure without a live cluster.
        # Server-side validation (schema + admission) runs in GitLab CI on a self-hosted runner.
        run: |
          FAILED=0
          find gitops/workloads -name '*.yaml' | while read f; do
            echo "  checking $f"
            kubectl apply --dry-run=client -f "$f" 2>&1 || FAILED=1
          done
          [ "$FAILED" -eq 0 ] || { echo "Dry-run failed."; exit 1; }
