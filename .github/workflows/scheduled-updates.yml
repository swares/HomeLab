# Scheduled maintenance jobs — runs weekly.
# Each job is independent; failures don't block others.
#
# Runner strategy:
#   - Ansible jobs (check-vault, update-pihole, apt-upgrade) run on the self-hosted
#     runner on H4 so they have LAN access to reach 192.168.1.x hosts.
#     Register H4: ansible-playbook playbooks/github-runner.yml -e runner_token=<token>
#   - lab-health-check also runs on self-hosted (needs kubectl + LAN DNS)
#
# Required repository secrets:
#   ANSIBLE_VAULT_PASS  contents of ansible/.vault_pass
#   KUBECONFIG_B64      base64-encoded kubeconfig (used by lab-health-check)
#
# Optional repository variable:
#   SKIP_VM_UPDATES=true  skip the apt-upgrade job

name: Scheduled updates

on:
  schedule:
    # Every Sunday at 03:00 Central (09:00 UTC)
    - cron: '0 9 * * 0'
  workflow_dispatch:    # allow manual trigger from Actions tab

jobs:
  check-vault:
    name: Vault seal check
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Show checked-out commit
        run: git log --oneline -3

      - name: Write Ansible vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASS }}" > ansible/.vault_pass && chmod 600 ansible/.vault_pass

      - name: Check Vault seal status
        run: |
          # Use curl directly — avoids VAULT_ADDR env propagation issues with vault CLI
          ansible -i ansible/inventory/hosts.yml rpi5 \
            -m shell \
            -a "curl -sf http://127.0.0.1:8200/v1/sys/seal-status" \
            --vault-password-file ansible/.vault_pass

      - name: Clean up vault pass
        if: always()
        run: rm -f ansible/.vault_pass

  update-pihole:
    name: Update Pi-hole
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Show checked-out commit
        run: git log --oneline -3

      - name: Write Ansible vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASS }}" > ansible/.vault_pass && chmod 600 ansible/.vault_pass

      - name: Run Pi-hole update (secondary first, then primary)
        run: |
          ansible-playbook -i ansible/inventory/hosts.yml \
            ansible/playbooks/update-non-apt.yml \
            --tags pihole \
            --vault-password-file ansible/.vault_pass

      - name: Clean up vault pass
        if: always()
        run: rm -f ansible/.vault_pass

  apt-upgrade:
    name: OS package updates (bare-metal Linux)
    runs-on: [self-hosted, Linux, X64]
    if: vars.SKIP_VM_UPDATES != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Show checked-out commit
        run: git log --oneline -3

      - name: Write Ansible vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASS }}" > ansible/.vault_pass && chmod 600 ansible/.vault_pass

      - name: Patch standalone hosts (rpi5, octopi, zero2w, xu3)
        run: |
          ansible-playbook -i ansible/inventory/hosts.yml \
            ansible/playbooks/update-hosts.yml \
            --tags standalone \
            --vault-password-file ansible/.vault_pass

      - name: Patch k3s agents (opi5pro-1, opi5pro-2)
        run: |
          ansible-playbook -i ansible/inventory/hosts.yml \
            ansible/playbooks/update-hosts.yml \
            --tags k3s_agents \
            --vault-password-file ansible/.vault_pass

      - name: Patch k3s server (H4 — flags reboot if needed, no auto-reboot)
        run: |
          ansible-playbook -i ansible/inventory/hosts.yml \
            ansible/playbooks/update-hosts.yml \
            --tags k3s_server \
            --vault-password-file ansible/.vault_pass

      - name: Clean up vault pass
        if: always()
        run: rm -f ansible/.vault_pass

  lab-health-check:
    name: Lab health check
    runs-on: [self-hosted, Linux, X64]
    needs: [apt-upgrade]
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > /tmp/lab-kubeconfig
          chmod 600 /tmp/lab-kubeconfig

      - name: Run lab-check.sh
        run: KUBECONFIG=/tmp/lab-kubeconfig bash scripts/lab-check.sh || true   # informational — don't fail the workflow

      - name: Clean up kubeconfig
        if: always()
        run: rm -f /tmp/lab-kubeconfig
