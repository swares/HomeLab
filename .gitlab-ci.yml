# ──────────────────────────────────────────────────────────────────────────────
# HomeLab CI — AUTHORITATIVE pipeline (GitLab is primary CI)
#
# GitHub Actions (.github/workflows/validate.yml) runs yaml-lint and
# client-side kubectl dry-run only. This pipeline is the source of truth
# for server-side validation, ArgoCD sync-check, and rollback.
#
# Stages:
#   validate   : run on every MR — lint YAML, dry-run kubectl apply (server-side)
#   sync-check : run on merge to main — wait for ArgoCD sync, probe Ingresses
#   rollback   : auto-triggered on sync-check failure; manual gate for safety
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   ARGOCD_SERVER       ArgoCD server address, e.g. argocd.apps.lab.home.arpa
#   ARGOCD_AUTH_TOKEN   ArgoCD API token (mark Protected + Masked)
#   KUBECONFIG_B64      base64-encoded kubeconfig for the k3s cluster
#                       (source: /etc/rancher/k3s/k3s.yaml on h4-core, base64 -w0)
#   GIT_PUSH_TOKEN      GitLab project token with write_repository scope (for rollback push)
# ──────────────────────────────────────────────────────────────────────────────

default:
  # Lab registry image — built from Dockerfile in tools/homelab-ci/ (has kubectl, argocd, yq, curl).
  # Falls back to bitnami/kubectl until the lab image is published.
  image: registry.apps.lab.home.arpa/tools/homelab-ci:latest
  tags: [k8s]
  before_script:
    - echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig

stages:
  - validate
  - sync-check
  - rollback

# ── Variables ──────────────────────────────────────────────────────────────────
variables:
  APPS_DOMAIN: "apps.lab.home.arpa"
  ARGOCD_OPTS: "--server $ARGOCD_SERVER --auth-token $ARGOCD_AUTH_TOKEN --grpc-web"
  ROLLOUT_TIMEOUT: "300"    # seconds to wait for ArgoCD sync + pod readiness
  HEALTH_TIMEOUT:  "60"     # seconds for HTTP health probes per Ingress

# ── STAGE: validate ────────────────────────────────────────────────────────────
yaml-lint:
  stage: validate
  before_script: []   # no kubeconfig needed
  script:
    - |
      echo "==> Linting all YAML under gitops/"
      find gitops/ -name '*.yaml' -o -name '*.yml' | while read f; do
        yq e 'true' "$f" > /dev/null || { echo "FAIL: $f"; exit 1; }
      done
      echo "All YAML files are valid."
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

dry-run-apply:
  stage: validate
  script:
    - |
      echo "==> Dry-run kubectl apply on every workload manifest"
      FAILED=0
      # Skip Helm values files and kustomization overlays — kubectl can't apply them directly
      find gitops/workloads -name '*.yaml' \
        ! -name 'values.yaml' \
        ! -name 'kustomization.yaml' | while read f; do
        echo "  checking $f"
        kubectl apply --dry-run=server -f "$f" || FAILED=1
      done
      [ "$FAILED" -eq 0 ] || { echo "Dry-run failed — check output above."; exit 1; }
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── STAGE: sync-check ─────────────────────────────────────────────────────────
# Runs only after a merge to main. Waits for ArgoCD to reconcile and then
# probes every Ingress host in the cluster.
argocd-sync-wait:
  stage: sync-check
  script:
    - ./scripts/validate-rollout.sh
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "failed" ]; then
        echo "==> Sync/health check FAILED — triggering rollback job"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
  artifacts:
    when: always
    paths:
      - rollout-report.txt
    expire_in: 7 days

# ── STAGE: rollback ───────────────────────────────────────────────────────────
# Auto-triggered when sync-check fails. Reverts HEAD on main and pushes so
# ArgoCD selfHeal restores the previous state. Protected by a manual gate so
# a human can inspect before reverting if preferred — remove `when: manual`
# to make it fully automatic.
auto-rollback:
  stage: rollback
  before_script:
    - git config user.email "ci@lab.home.arpa"
    - git config user.name  "HomeLab CI"
    - git remote set-url origin "https://ci-bot:${GIT_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - ./scripts/rollback-app.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_failure
  environment:
    name: production
    action: rollback
