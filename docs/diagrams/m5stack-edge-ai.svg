<svg viewBox="0 0 1240 720" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .bg{fill:#0d1117;} .panel{fill:#161b22;stroke:#2b3440;stroke-width:1.2;}
      .opt{fill:#161b22;stroke:#3a4555;stroke-width:1.2;stroke-dasharray:5 4;}
      .core{fill:#102a1c;stroke:#34d399;stroke-width:2;}
      .title{fill:#e6edf3;font-size:27px;font-weight:700;letter-spacing:1px;}
      .sub{fill:#8b949e;font-size:13px;} .name{fill:#e6edf3;font-size:14px;font-weight:700;}
      .spec{fill:#8b949e;font-size:11px;} .tag{fill:#6e7681;font-size:10px;letter-spacing:1px;}
      .hub{fill:#15111f;stroke:#a78bfa;stroke-width:1.6;}
      .ha{fill:#0c1a2e;stroke:#3b82f6;stroke-width:1.6;}
      .flow{stroke:#8b949e;stroke-width:1.6;fill:none;} .flbl{fill:#c9d1d9;font-size:10px;font-weight:700;}
      .warn{fill:#ff8a8a;font-size:10px;}
    </style>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b949e"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1240" height="720"/>
  <text class="title" x="40" y="50">M5Stack Edge-AI — optional framework modules</text>
  <text class="sub" x="42" y="72">Dashed = optional add-ons your framework already supports · solid green = the NPU core</text>

  <!-- INPUTS -->
  <text class="tag" x="40" y="108">INPUTS</text>
  <g transform="translate(40,118)">
    <rect class="opt" x="0" y="0" width="240" height="92" rx="10"/>
    <text class="name" x="14" y="26">Voice in · ASR (CI1302)</text>
    <text class="spec" x="14" y="48">offline wake-word / commands</text>
    <text class="spec" x="14" y="66">UartDevice_ASR → last_cmd</text>
    <text class="warn" x="14" y="84">⚠ shares Port-C UART with the LLM</text>
  </g>
  <g transform="translate(40,224)">
    <rect class="opt" x="0" y="0" width="240" height="150" rx="10"/>
    <text class="name" x="14" y="26">Sensors (grounding)</text>
    <text class="spec" x="14" y="50">• Thermal cam (MLX90640)</text>
    <text class="spec" x="14" y="70">• ToF presence (VL53L1X)</text>
    <text class="spec" x="14" y="90">• CO2 (SCD4x) · PM2.5 (PMSA003)</text>
    <text class="spec" x="14" y="110">• ENV temp/humid/press</text>
    <text class="tag"  x="14" y="134">feed context into prompts</text>
  </g>

  <!-- CORE -->
  <g transform="translate(330,118)">
    <rect class="core" x="0" y="0" width="320" height="256" rx="12"/>
    <text class="name" x="20" y="30" fill="#a7f3d0">M5Stack Core · your framework</text>
    <text class="spec" x="20" y="52">auto-detect · plugin per device</text>
    <rect x="20" y="68" width="280" height="86" rx="9" fill="#0d1117" stroke="#34d399"/>
    <text class="name" x="34" y="92" font-size="13">Module LLM · AX630C NPU</text>
    <text class="spec" x="34" y="112">~6 TOPS · on-device qwen2.5</text>
    <text class="spec" x="34" y="130">/api/llm/set?ask= · /api/llm</text>
    <text class="tag"  x="34" y="146">UART Port-C (StackFlow)</text>
    <text class="spec" x="20" y="180">reasoning core: text in → text out,</text>
    <text class="spec" x="20" y="198">async streamed reply</text>
    <text class="warn" x="20" y="226">One UART device at a time → ASR + LLM</text>
    <text class="warn" x="20" y="242">need two Cores (or networked ASR→LLM).</text>
  </g>

  <!-- OUTPUTS -->
  <text class="tag" x="700" y="108">OUTPUTS / ACTIONS</text>
  <g transform="translate(700,118)">
    <rect class="opt" x="0" y="0" width="240" height="92" rx="10"/>
    <text class="name" x="14" y="26">Display · LCD</text>
    <text class="spec" x="14" y="48">show reply / status ticker</text>
    <text class="spec" x="14" y="66">(+ TTS unit for spoken reply)</text>
  </g>
  <g transform="translate(700,224)">
    <rect class="opt" x="0" y="0" width="240" height="150" rx="10"/>
    <text class="name" x="14" y="26">Actuators (agentic)</text>
    <text class="spec" x="14" y="50">• Relays (4Relay/2Relay)</text>
    <text class="spec" x="14" y="70">• Servo2 · GoPlus2 motors</text>
    <text class="spec" x="14" y="90">• PPS power · Fan · IR send</text>
    <text class="tag"  x="14" y="116">GET /api/{slug}/set?…</text>
    <text class="spec" x="14" y="136">LLM/automation acts on world</text>
  </g>

  <!-- flows in/out -->
  <path class="flow" d="M280 164 L330 200" marker-end="url(#a)"/>
  <path class="flow" d="M280 290 L330 250" marker-end="url(#a)"/>
  <path class="flow" d="M650 200 L700 164" marker-end="url(#a)"/>
  <path class="flow" d="M650 250 L700 290" marker-end="url(#a)"/>

  <!-- INTEGRATION strip -->
  <g transform="translate(40,430)">
    <text class="tag" x="0" y="0">INTEGRATION — how it joins the rest of the lab</text>
  </g>
  <!-- REST -> gateway -->
  <g transform="translate(330,452)">
    <rect class="hub" x="0" y="0" width="380" height="92" rx="10"/>
    <rect x="0" y="0" width="5" height="92" rx="2" fill="#a78bfa"/>
    <text class="name" x="18" y="28" fill="#c4b5fd">HTTPS REST API</text>
    <text class="spec" x="18" y="50">→ LiteLLM gateway as an edge backend</text>
    <text class="spec" x="18" y="70">(or an adapter shim for /api/llm protocol)</text>
    <text class="tag"  x="18" y="86">→ cluster apps / Claude</text>
  </g>
  <!-- MQTT -> HA -->
  <g transform="translate(750,452)">
    <rect class="ha" x="0" y="0" width="380" height="92" rx="10"/>
    <rect x="0" y="0" width="5" height="92" rx="2" fill="#3b82f6"/>
    <text class="name" x="18" y="28" fill="#93c5fd">MQTT + Home Assistant discovery</text>
    <text class="spec" x="18" y="50">every sensor/control auto-registers in HA</text>
    <text class="spec" x="18" y="70">HA orchestrates: sensor → LLM → actuate</text>
    <text class="tag"  x="18" y="86">automation bus for the edge tier</text>
  </g>
  <path class="flow" d="M490 374 L520 452" marker-end="url(#a)"/>
  <path class="flow" d="M520 374 L900 452" marker-end="url(#a)"/>
  <text class="flbl" x="470" y="420">REST</text>
  <text class="flbl" x="690" y="420">MQTT</text>

  <text class="sub" x="40" y="612">Three loops to consider: (1) local voice assistant — ASR → LLM → TTS/LCD; (2) sensor-grounded inference — readings into prompts;</text>
  <text class="sub" x="40" y="634">(3) agentic actuation — LLM/HA drives relays, fans, servos. All already expressible in the framework you wrote.</text>
  <text class="tag" x="40" y="676">Standalone AP mode · self-signed TLS · optional Basic Auth · SD logging — also available for offline/secured edge deployments.</text>
</svg>
