<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Service Map — grouped services &amp; hosts</title>
<style>
  :root{
    --bg:#0d1117; --panel:#11161d; --chip:#161b22; --border:#2b3440; --chipborder:#262d36;
    --fg:#e6edf3; --muted:#8b949e; --dim:#6e7681;
    --x86:#ff6b6b; --ai:#34d399; --agent:#2dd4bf; --infra:#3b82f6;
    --micro:#8b949e; --edge:#a78bfa; --cluster:#f59e0b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
       font-family:ui-monospace,SFMono-Regular,Menlo,monospace;padding:28px}
  h1{font-size:24px;margin:0 0 4px;letter-spacing:.5px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;
           background:var(--panel);border:1px solid var(--border);border-radius:12px;
           padding:12px 14px;margin-bottom:8px}
  .toolbar .lab{color:var(--dim);font-size:11px;letter-spacing:2px;font-weight:700;margin-right:4px}
  .pill{display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none;
        border:1px solid var(--chipborder);background:var(--chip);color:var(--fg);
        border-radius:999px;padding:6px 12px;font-size:12px;transition:.12s}
  .pill .sw{width:12px;height:12px;border-radius:3px}
  .pill.off{opacity:.32;filter:grayscale(.5)}
  .pill:hover{border-color:var(--muted)}
  .btn{cursor:pointer;border:1px solid var(--chipborder);background:#1c2128;color:var(--fg);
       border-radius:8px;padding:6px 12px;font-size:12px}
  .btn:hover{border-color:var(--muted)}
  .count{color:var(--dim);font-size:11px;margin:10px 2px 16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px}
  .card h2{font-size:14px;margin:0 0 12px;font-weight:700}
  .ch{position:relative;background:var(--chip);border:1px solid var(--chipborder);
      border-radius:8px;padding:9px 12px 9px 16px;margin-bottom:8px}
  .ch:last-child{margin-bottom:0}
  .ch .tab{position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:3px}
  .ch .row{display:flex;justify-content:space-between;gap:8px}
  .ch .hn{font-size:11.5px;font-weight:700}
  .ch .ip{color:var(--dim);font-size:10px;white-space:nowrap}
  .ch .sv{color:#9aa5b1;font-size:10.5px;margin-top:2px}
  .card.empty{opacity:.28}
  .none{color:var(--dim);font-size:11px;font-style:italic}
</style>
</head>
<body>
  <h1>Service Map</h1>
  <p class="sub">Grouped services &amp; their hosts. Toggle a class to filter the view; colour = hardware class.</p>

  <div class="toolbar" id="toolbar"><span class="lab">FILTER</span></div>
  <div style="margin:8px 0 0"><span class="btn" id="all">Select all</span>
       <span class="btn" id="clear">Clear</span></div>
  <div class="count" id="count"></div>

  <div class="grid" id="grid"></div>

<script>
const CLASSES = {
  x86:    {label:"x86 (Proxmox)",       color:"var(--x86)"},
  ai:     {label:"ARM AI (OPi 5 Pro)",  color:"var(--ai)"},
  agent:  {label:"ARM agents (Zero 2W)",color:"var(--agent)"},
  infra:  {label:"ARM infra (RPi)",     color:"var(--infra)"},
  edge:   {label:"edge (M5Stack)",      color:"var(--edge)"},
  cluster:{label:"in-cluster / logical",color:"var(--cluster)"},
  micro:  {label:"micro / retire",      color:"var(--micro)"},
};

const GROUPS = [
 ["Identity & Secrets",[
   ["RPi 5","10.136.151.67","Vault — secrets / PKI","infra"],
   ["RPi 4B","10.136.151.99","OpenLDAP — directory","infra"],
   ["(planned)","—","SSO: Keycloak / Authentik","cluster"]]],
 ["Storage & Data",[
   ["Odroid-H4","192.168.1.160","NAS (NFS/SMB) · MinIO S3","x86"],
   ["Odroid-H4","192.168.1.160","restic (md1 → secondary + offsite)","x86"],
   ["Odroid-H4","192.168.1.160","shared NFS → Proxmox VMs","x86"],
   ["offsite","cloud","restic copy (B2/rclone, 3-2-1)","cluster"]]],
 ["DNS · Pi-hole",[
   ["RPi 3B #2","10.136.151.59","Pi-hole — primary (wired)","infra"],
   ["OPi Zero 2W","TBD","secondary — same config","agent"]]],
 ["IaaS · Proxmox cluster",[
   ["N150 #1","10.136.151.71","Proxmox VE node","x86"],
   ["N150 #2","10.136.151.72","Proxmox VE node","x86"],
   ["N150 #3","TBD","Proxmox node + TV/browse VM","x86"]]],
 ["Platform · k8s / GitOps",[
   ["OPi 5 Pro #1","10.136.151.83","bare-metal k3s server","ai"],
   ["OPi 5 Pro #2","10.136.151.97","bare-metal k3s server","ai"],
   ["OPi Zero 2W ×4","TBD","k3s agent pool (stateless)","agent"],
   ["Proxmox VMs","on N150s","platform k3s + Argo CD","cluster"]]],
 ["AI / Inference",[
   ["OPi 5 Pro #1","10.136.151.83","RKLLama NPU + Claude Code orch.","ai"],
   ["OPi 5 Pro #2","10.136.151.97","RKLLama NPU (LLM serving)","ai"],
   ["H4 + N150s","iGPU","OpenVINO — embeddings/STT/vision","x86"],
   ["in-cluster","k3s","LiteLLM gateway + m5stack-adapter","cluster"],
   ["M5Stack","USB/edge","escalation router (front-end)","edge"]]],
 ["Software Dev",[
   ["GitLab VM","Proxmox/n150","GitLab — SCM / CI / registry","x86"],
   ["in-cluster","k3s","CI runners · multi-arch buildx","cluster"]]],
 ["Provisioning (CASC)",[
   ["OpenTofu + cloud-init","CASC","→ Proxmox VMs","cluster"],
   ["rpi-imager / cloud-init","first-boot","→ SD-card SBCs (SSH-ready)","agent"],
   ["Ansible","CASC","host config (everything w/ an OS)","cluster"],
   ["PlatformIO / OTA","firmware","→ microcontrollers (ESPHome opt.)","edge"],
   ["netboot.xyz","optional","x86 PXE menu (if ever needed)","x86"]]],
 ["Applications",[
   ["Immich server","H4 / k8s","self-hosted photos (library → md1)","x86"],
   ["Immich ML","H4 CPU","Smart Search + face (accel optional)","x86"],
   ["Immich Postgres","NVMe","vectorchord (vector ext)","cluster"],
   ["Immich Redis","H4","cache","cluster"]]],
 ["Observability",[
   ["OPi 5 Pro #2","10.136.151.97","OpenTelemetry collector","ai"],
   ["in-cluster","k3s","Prometheus · Grafana · Loki · Tempo","cluster"],
   ["OPi Zero 2W","TBD","node / metric exporters","agent"],
   ["HostMon","ESP32-S3","black-box probes + LCD panel","edge"]]],
 ["Single-purpose & Edge",[
   ["Odroid-XU3 ⚠","10.136.151.51","build agent (flaky)","infra"],
   ["OPi Zero 2W","TBD","Mosquitto MQTT broker","agent"],
   ["RPi 3B #1 ⚠","10.136.151.73","power fault — retire / RMA","micro"],
   ["RPi Zero W ×3","TBD","ultra-light / retire","micro"]]],
];

const active = new Set(Object.keys(CLASSES)); // all on by default

// build filter pills
const toolbar = document.getElementById("toolbar");
for (const [key,meta] of Object.entries(CLASSES)){
  const pill = document.createElement("span");
  pill.className = "pill"; pill.dataset.cls = key;
  pill.innerHTML = `<span class="sw" style="background:${meta.color}"></span>${meta.label}`;
  pill.onclick = () => { active.has(key) ? active.delete(key) : active.add(key); render(); };
  toolbar.appendChild(pill);
}
document.getElementById("all").onclick   = () => { Object.keys(CLASSES).forEach(k=>active.add(k)); render(); };
document.getElementById("clear").onclick = () => { active.clear(); render(); };

// build cards once
const grid = document.getElementById("grid");
GROUPS.forEach(([title,chips])=>{
  const card = document.createElement("div"); card.className="card";
  const h = document.createElement("h2"); h.textContent = title; card.appendChild(h);
  chips.forEach(([hn,ip,sv,cls])=>{
    const ch = document.createElement("div"); ch.className="ch"; ch.dataset.cls=cls;
    ch.innerHTML =
      `<span class="tab" style="background:var(--${cls})"></span>`+
      `<div class="row"><span class="hn"></span><span class="ip"></span></div>`+
      `<div class="sv"></div>`;
    ch.querySelector(".hn").textContent = hn;
    ch.querySelector(".ip").textContent = ip;
    ch.querySelector(".sv").textContent = sv;
    card.appendChild(ch);
  });
  const none = document.createElement("div"); none.className="none"; none.textContent="no matching services";
  none.style.display="none"; card.appendChild(none);
  grid.appendChild(card);
});

function render(){
  // pill states
  document.querySelectorAll(".pill").forEach(p=>{
    p.classList.toggle("off", !active.has(p.dataset.cls));
  });
  let shown=0, total=0;
  document.querySelectorAll(".card").forEach(card=>{
    let vis=0;
    card.querySelectorAll(".ch").forEach(ch=>{
      total++;
      const on = active.has(ch.dataset.cls);
      ch.style.display = on ? "" : "none";
      if(on){ vis++; shown++; }
    });
    card.classList.toggle("empty", vis===0);
    card.querySelector(".none").style.display = vis===0 ? "" : "none";
  });
  document.getElementById("count").textContent = `showing ${shown} of ${total} entries`;
}
render();
</script>
</body>
</html>
