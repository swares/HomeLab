# Seed Vault before ArgoCD syncs:
#   htpasswd_line=$(htpasswd -nbB admin 'yourpassword')
#   vault kv put secret/lab/registry htpasswd="$htpasswd_line"
#
# The 'htpasswd' key must contain a valid htpasswd file line, e.g.:
#   admin:$2y$05$...
# Multiple users: separate with newlines in the Vault value.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-htpasswd
  namespace: registry
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: zot-htpasswd
    creationPolicy: Owner
  data:
    - secretKey: htpasswd
      remoteRef:
        key: secret/lab/registry
        property: htpasswd
