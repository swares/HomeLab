# Renders zot-oidc-config Secret containing the full config.json
# with the OIDC client secret injected from Vault.
#
# htpasswd auth is preserved for Docker CLI clients.
# openID enables web UI SSO via Authelia.
#
# Vault path: secret/lab/registry → oidc-client-secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: zot-oidc-config
  namespace: registry
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: zot-oidc-config
    creationPolicy: Owner
    template:
      data:
        config.json: |
          {
            "distSpecVersion": "1.1.0",
            "storage": {
              "rootDirectory": "/var/lib/registry"
            },
            "http": {
              "address": "0.0.0.0",
              "port": "5000",
              "auth": {
                "htpasswd": {
                  "path": "/etc/zot-auth/htpasswd"
                },
                "openID": {
                  "providers": {
                    "dex": {
                      "issuer": "https://authelia.apps.lab.home.arpa",
                      "clientid": "zot",
                      "clientsecret": "{{ .oidcClientSecret }}",
                      "scopes": ["openid", "profile", "email"]
                    }
                  }
                }
              }
            },
            "log": {
              "level": "info"
            },
            "extensions": {
              "search": {
                "enable": true
              },
              "ui": {
                "enable": true
              },
              "sync": {
                "registries": [
                  {
                    "urls": ["https://registry-1.docker.io"],
                    "onDemand": true,
                    "tlsVerify": true
                  },
                  {
                    "urls": ["https://ghcr.io"],
                    "onDemand": true,
                    "tlsVerify": true
                  }
                ]
              }
            }
          }
  data:
    - secretKey: oidcClientSecret
      remoteRef:
        key: secret/lab/registry
        property: oidc-client-secret
