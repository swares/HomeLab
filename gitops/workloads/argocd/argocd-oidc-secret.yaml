# ExternalSecret: injects OIDC client secret into argocd-secret.
#
# creationPolicy: Merge adds oidc.authelia.clientSecret to the existing
# argocd-secret without taking ownership (ArgoCD continues to manage its
# own keys in that secret).
#
# Vault path: secret/lab/argocd → oidc-client-secret
# Referenced in argocd-cm.yaml as: clientSecret: $oidc.authelia.clientSecret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-oidc-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: oidc.authelia.clientSecret
      remoteRef:
        key: secret/lab/argocd
        property: oidc-client-secret
