# ArgoCD main config — OIDC via Authelia.
#
# rootCA: lab CA cert so argocd-server trusts Authelia's TLS certificate.
# clientSecret: injected into argocd-secret via ExternalSecret (argocd-oidc-secret.yaml).
# RBAC policy is in argocd-rbac-cm.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  url: https://argocd.apps.lab.home.arpa
  oidc.config: |
    name: Authelia
    issuer: https://authelia.apps.lab.home.arpa
    clientID: argocd
    clientSecret: $oidc.authelia.clientSecret
    requestedScopes:
      - openid
      - profile
      - email
      - groups
    rootCA: |
