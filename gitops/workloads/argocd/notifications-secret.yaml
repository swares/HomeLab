# ExternalSecret: argocd-notifications-secret from HashiCorp Vault
#
# Pulls M5Stack credentials from the same Vault path used by the m5stack-adapter.
# No new secrets to create — secret/lab/m5stack already exists.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-notifications-secret
    creationPolicy: Owner
  data:
    - secretKey: m5stack-user
      remoteRef:
        key: secret/lab/m5stack
        property: M5_USER
    - secretKey: m5stack-pass
      remoteRef:
        key: secret/lab/m5stack
        property: M5_PASS
