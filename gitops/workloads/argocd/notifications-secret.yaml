# ExternalSecret: argocd-notifications-secret from HashiCorp Vault
#
# BEFORE DEPLOYING — write the webhook URL to Vault:
#   vault kv patch secret/lab/argocd webhook-url=https://<your-endpoint>
#
# If secret/lab/argocd does not yet exist, use put instead:
#   vault kv put secret/lab/argocd webhook-url=https://<your-endpoint>
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-notifications-secret
    creationPolicy: Owner
  data:
    - secretKey: webhook-url
      remoteRef:
        key: secret/lab/argocd
        property: webhook-url
