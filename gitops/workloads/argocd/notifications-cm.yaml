# ArgoCD Notifications — M5Stack display integration.
#
# Sends alert messages directly to the M5Stack device's HTTP AI API.
# Wire format: POST /api/{slug}/set?ask=<message>
#   - Requires X-Requested-With: XMLHttpRequest (firmware CSRF guard)
#   - Basic auth: M5_USER / M5_PASS from Vault secret/lab/m5stack
#   - Device uses a self-signed cert — insecureSkipVerify: true
#
# Slug used: 'llm' — displays on the LLM pane of the M5Stack UI.
# Change to 'route' or 'claude' if you prefer a different pane.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # ── Triggers ──────────────────────────────────────────────────────────────
  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]
      oncePer: app.status.operationState.syncResult.revision

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]
      oncePer: app.status.health.status

  # ── Templates ─────────────────────────────────────────────────────────────
  template.app-sync-failed: |
    webhook:
      m5stack:
        method: POST
        path: /api/llm/set?ask=ArgoCD%20SYNC%20FAIL%3A%20{{.app.metadata.name}}

  template.app-health-degraded: |
    webhook:
      m5stack:
        method: POST
        path: /api/llm/set?ask=ArgoCD%20DEGRADED%3A%20{{.app.metadata.name}}

  # ── Service ───────────────────────────────────────────────────────────────
  service.webhook.m5stack: |
    url: https://m5stack.lab.home.arpa
    insecureSkipVerify: true
    headers:
      - name: X-Requested-With
        value: XMLHttpRequest
    basicAuth:
      username: $m5stack-user
      password: $m5stack-pass

  # ── Default subscriptions ─────────────────────────────────────────────────
  subscriptions: |
    - recipients:
        - webhook:m5stack
      triggers:
        - on-sync-failed
        - on-health-degraded
