---
# Ollama inference server — runs on opi5pro-1 (RK3588S, 8C/16GB)
# Scheduled via nodeSelector role=inference; kubectl label node opi5pro-1 role=inference
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: ai-gateway
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 200Gi         # NVMe-backed (/mnt/nvme, 469G available)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels: { app: ollama }
  template:
    metadata:
      labels: { app: ollama }
    spec:
      nodeSelector:
        kubernetes.io/hostname: opi5pro-1
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      containers:
        - name: ollama
          image: ollama/ollama:0.21.2
          args: ["serve"]
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_MODELS
              value: /models
            - name: OLLAMA_NUM_PARALLEL
              value: "2"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "2"
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              memory: 4Gi
              cpu: "2"
            limits:
              memory: 12Gi    # leave ~4GB for OS on the 16GB board
              cpu: "7"        # leave 1 core for system
          readinessProbe:
            httpGet: { path: /api/tags, port: 11434 }
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /api/tags, port: 11434 }
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai-gateway
spec:
  selector: { app: ollama }
  ports:
    - port: 11434
      targetPort: 11434
