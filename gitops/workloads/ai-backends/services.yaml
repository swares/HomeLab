# The NPU nodes run outside MicroShift, so expose them to in-cluster workloads by DNS.
# ExternalName maps a cluster Service name -> an external hostname.
apiVersion: v1
kind: Service
metadata: { name: rkllama-opi1, namespace: ai-gateway }
spec: { type: ExternalName, externalName: opi5pro-1.lab.home.arpa }   # RKLLama :8080
---
apiVersion: v1
kind: Service
metadata: { name: rkllama-opi2, namespace: ai-gateway }
spec: { type: ExternalName, externalName: opi5pro-2.lab.home.arpa }
---
apiVersion: v1
kind: Service
metadata: { name: m5stack-llm, namespace: ai-gateway }
spec: { type: ExternalName, externalName: m5stack.lab.home.arpa }     # framework /api/llm (HTTPS)
---
apiVersion: v1
kind: Service
metadata: { name: openvino, namespace: ai-gateway }
spec: { type: ExternalName, externalName: h4-core.lab.home.arpa }     # OVMS :8000 (or an N150)
