# Temporary exceptions to disallow-latest-tag while pinned tags are being validated.
# ollama/ollama: pin blocked until 0.32.0 image is confirmed pulled on all OPi nodes.
# Remove this file once both Deployments reference a versioned tag.
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: allow-ollama-latest
  namespace: ai-gateway
  annotations:
    # Remove when ollama.yaml and ollama-2.yaml pin to a versioned tag.
    policy-exception/reason: "Renovate PR pending; pre-staging 0.32.0 on OPi nodes before approving"
spec:
  exceptions:
    - policyName: disallow-latest-tag
      ruleNames:
        - require-image-tag
        - disallow-latest-tag
        - autogen-require-image-tag
        - autogen-disallow-latest-tag
  match:
    any:
      - resources:
          kinds: [Pod]
          namespaces: [ai-gateway]
          names: ["ollama-*"]
