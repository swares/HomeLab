---
# Pulls Grafana admin credentials from Vault secret/lab/grafana
# Vault path must be seeded before ArgoCD syncs:
#   vault kv put secret/lab/grafana admin-user=admin admin-password=CHANGEME
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: secret/lab/grafana
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: secret/lab/grafana
        property: admin-password
    - secretKey: oidc-client-secret
      remoteRef:
        key: secret/lab/grafana
        property: oidc-client-secret
