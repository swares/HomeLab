# ExternalSecret: minio-credentials from HashiCorp Vault
#
# BEFORE DEPLOYING — write credentials to Vault:
#   vault kv put secret/lab/minio \
#     root-user=minioadmin \
#     root-password=$(openssl rand -hex 24)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: minio
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: root-user
      remoteRef:
        key: secret/lab/minio
        property: root-user
    - secretKey: root-password
      remoteRef:
        key: secret/lab/minio
        property: root-password
