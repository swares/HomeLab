apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio
spec:
  replicas: 1
  selector:
    matchLabels: { app: minio }
  strategy:
    type: Recreate   # RWO PVC — only one pod can mount at a time
  template:
    metadata:
      labels: { app: minio }
    spec:
      hostAliases:
        - ip: "10.43.10.71"
          hostnames:
            - authelia.apps.lab.home.arpa
            - minio-console.apps.lab.home.arpa
      nodeSelector:
        kubernetes.io/hostname: n150-1   # NVMe-backed; keep state close to other PVCs
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: minio
          # renovate: datasource=docker depName=minio/minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-password
            # OIDC SSO via Authelia — users log in once and land in MinIO Console.
            # After first login, run:
            #   mc admin policy attach local consoleAdmin --user "<preferred_username>"
            - name: MINIO_CERTS_DIR
              value: /etc/minio/certs
            - name: MINIO_IDENTITY_OPENID_CONFIG_URL
              value: https://authelia.apps.lab.home.arpa/.well-known/openid-configuration
            - name: MINIO_IDENTITY_OPENID_CLIENT_ID
              value: minio
            - name: MINIO_IDENTITY_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: oidc-client-secret
            - name: MINIO_IDENTITY_OPENID_REDIRECT_URI
              value: https://minio-console.apps.lab.home.arpa/oauth_callback
            - name: MINIO_IDENTITY_OPENID_SCOPES
              value: openid,profile,email
            - name: MINIO_IDENTITY_OPENID_ROLE_POLICY
              value: consoleAdmin
            - name: MINIO_IDENTITY_OPENID_DISPLAY_NAME
              value: Authelia
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
            - name: lab-ca
              mountPath: /etc/ssl/certs/lab-ca.crt
              subPath: lab-ca.crt
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /minio/health/live, port: 9000 }
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
        - name: lab-ca
          configMap:
            name: lab-ca-cert
