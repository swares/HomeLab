apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: litellm-cloud-ai
  namespace: ai-gateway
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: litellm-cloud-ai
    creationPolicy: Owner
  data:
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: secret/lab/cloud-ai
        property: groq-api-key
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: secret/lab/cloud-ai
        property: gemini-api-key
