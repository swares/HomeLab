apiVersion: apps/v1
kind: Deployment
metadata: { name: litellm, namespace: ai-gateway }
spec:
  replicas: 1
  selector: { matchLabels: { app: litellm } }
  template:
    metadata:
      labels: { app: litellm }
      annotations:
        # Stakater Reloader: auto-restart this pod when litellm-config ConfigMap changes.
        reloader.stakater.com/auto: "true"
    spec:
      nodeSelector:
        kubernetes.io/hostname: odroid-nas   # keep litellm on H4; OPi nodes reserve RAM for ollama
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000      # litellm image uses non-numeric "root" — explicit UID satisfies runAsNonRoot
        runAsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:v1.93.0
          args: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
          ports: [{ containerPort: 4000 }]
          readinessProbe:
            httpGet: { path: /health/liveliness, port: 4000 }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health/liveliness, port: 4000 }
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          envFrom:
            - secretRef:
                name: litellm-cloud-ai   # GROQ_API_KEY, GEMINI_API_KEY from Vault
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: cfg, mountPath: /etc/litellm }
      volumes:
        - name: cfg
          configMap: { name: litellm-config }
