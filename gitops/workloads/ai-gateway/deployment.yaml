apiVersion: apps/v1
kind: Deployment
metadata: { name: litellm, namespace: ai-gateway }
spec:
  replicas: 1
  selector: { matchLabels: { app: litellm } }
  template:
    metadata: { labels: { app: litellm } }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000      # litellm image uses non-numeric "root" — explicit UID satisfies runAsNonRoot
        runAsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest   # pin a tag in production
          args: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
          ports: [{ containerPort: 4000 }]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: cfg, mountPath: /etc/litellm }
      volumes:
        - name: cfg
          configMap: { name: litellm-config }
