apiVersion: v1
kind: ConfigMap
metadata: { name: litellm-config, namespace: ai-gateway }
data:
  config.yaml: |
    # Map friendly model names -> backends. Confirm each backend's API path/port against
    # its docs (RKLLama API shape and OVMS OpenAI endpoint vary by version).
    model_list:
      # ── NPU-native path (RKLLama, RK3588S NPU) ──────────────────────────────
      # Prerequisites: run 'make ai-nodes' to install RKLLama on both OPis, then
      # drop converted .rkllm models into /opt/rkllama/models/ on each board.
      # Model name must match the loaded .rkllm filename (check 'rkllama list' on the host).
      # Reaches the OPis via ExternalName services (rkllama-opi1/2 in ai-backends).
      # MIGRATION: once RKLLama is healthy, rename chat-npu → chat and remove the
      # Ollama entries below (or keep them as chat-cpu for CPU-only fallback).
      - model_name: chat-npu
        litellm_params:
          model: ollama/qwen2.5:3b    # confirm name matches loaded model
          api_base: http://rkllama-opi1:8080
      - model_name: chat-npu
        litellm_params:
          model: ollama/qwen2.5:3b
          api_base: http://rkllama-opi2:8080

      # ── CPU fallback (Ollama in-cluster, no NPU) ─────────────────────────────
      # Ollama on opi5pro-1 — pinned via nodeSelector kubernetes.io/hostname=opi5pro-1
      # Pull models: kubectl exec -n ai-gateway deploy/ollama -- ollama pull qwen2.5:3b
      - model_name: chat
        litellm_params:
          model: ollama/qwen2.5:3b
          api_base: http://ollama:11434
      # Ollama on opi5pro-2 — pinned via nodeSelector kubernetes.io/hostname=opi5pro-2
      # Pull models: kubectl exec -n ai-gateway deploy/ollama-2 -- ollama pull qwen2.5:3b
      - model_name: chat
        litellm_params:
          model: ollama/qwen2.5:3b
          api_base: http://ollama-2:11434
      # Intel iGPU embeddings/vision via OpenVINO Model Server (OpenAI-compatible).
      - model_name: embeddings
        litellm_params:
          model: openai/bge-small
          api_base: http://openvino:8000/v3
          api_key: "none"
      # M5Stack tiers via the adapter (OpenAI-compatible shim for /api/{slug}).
      # "m5" = the on-device 3-tier escalation router (local NPU → Claude API → Claude Code);
      # the others expose the Module LLM and the direct Claude client individually.
      - model_name: m5
        litellm_params: { model: openai/m5-route,  api_base: http://m5stack-adapter:8080/v1, api_key: "none" }
      - model_name: m5-llm
        litellm_params: { model: openai/m5-llm,    api_base: http://m5stack-adapter:8080/v1, api_key: "none" }
      - model_name: m5-claude
        litellm_params: { model: openai/m5-claude, api_base: http://m5stack-adapter:8080/v1, api_key: "none" }
      # Optional cloud overflow — supply a key via Secret, then uncomment.
      # - model_name: big
      #   litellm_params: { model: anthropic/claude-sonnet-4-6, api_key: os.environ/ANTHROPIC_API_KEY }
    router_settings:
      routing_strategy: simple-shuffle   # ready for multiple backends when opi5pro-2 joins
      num_retries: 2
    # NOTE: the M5Stack speaks the framework's /api/llm protocol, not OpenAI — front it with a
    # tiny adapter (or call it directly / via MQTT from Home Assistant). See AI-INFERENCE.md.
