apiVersion: v1
kind: ConfigMap
metadata: { name: litellm-config, namespace: ai-gateway }
data:
  config.yaml: |
    # Map friendly model names -> backends. Confirm each backend's API path/port against
    # its docs (RKLLama API shape and OVMS OpenAI endpoint vary by version).
    model_list:
      # ── NPU-native path (RKLLama, RK3588S NPU) ──────────────────────────────
      # Prerequisites: run 'make ai-nodes' to install RKLLama on both OPis, then
      # drop converted .rkllm models into /opt/rkllama/models/ on each board.
      # Model name must match the loaded .rkllm filename (check 'rkllama list' on the host).
      # Reaches the OPis via ExternalName services (rkllama-opi1/2 in ai-backends).
      # Model name confirmed from /api/tags on 2026-07-13 (both boards).
      # Driver upgraded to 0.9.7; Qwen3-4B loads but is too slow for interactive use
      # (thinking mode generates a reasoning chain even for trivial prompts).
      # DeepSeek-1.5B is the right default — fast, responsive.
      # Qwen3-4B available on both OPis for batch/async use if needed.
      - model_name: chat
        litellm_params:
          model: ollama/DeepSeek-R1-Distill-Qwen-1.5B_w8a8_g128_rk3588
          api_base: http://rkllama-opi1:8080
      - model_name: chat
        litellm_params:
          model: ollama/DeepSeek-R1-Distill-Qwen-1.5B_w8a8_g128_rk3588
          api_base: http://rkllama-opi2:8080

      # ── CPU fallback (Ollama in-cluster, ARM CPU) ──
      - model_name: chat-cpu
        litellm_params: { model: ollama/qwen2.5:7b, api_base: "http://ollama:11434" }
      - model_name: chat-cpu
        litellm_params: { model: ollama/qwen2.5:7b, api_base: "http://ollama-2:11434" }
      - model_name: code
        litellm_params: { model: ollama/qwen2.5-coder:7b, api_base: "http://ollama:11434" }
      - model_name: code
        litellm_params: { model: ollama/qwen2.5-coder:7b, api_base: "http://ollama-2:11434" }
      - model_name: vision
        litellm_params: { model: ollama/llava:7b, api_base: "http://ollama:11434" }
      - model_name: vision
        litellm_params: { model: ollama/llava:7b, api_base: "http://ollama-2:11434" }
      - model_name: fast
        litellm_params: { model: ollama/llama3.2:3b, api_base: "http://ollama:11434" }
      - model_name: fast
        litellm_params: { model: ollama/llama3.2:3b, api_base: "http://ollama-2:11434" }
      # Embeddings via nomic-embed-text in Ollama (ARM CPU, OpenAI-compat /v1 path).
      # OVMS/bge-small deferred: /dev/dri missing on h4-core (i915 not loaded on 5.15).
      - model_name: embeddings
        litellm_params: { model: openai/nomic-embed-text, api_base: "http://ollama:11434/v1", api_key: "none" }
      - model_name: embeddings
        litellm_params: { model: openai/nomic-embed-text, api_base: "http://ollama-2:11434/v1", api_key: "none" }
      # ── Whisper STT ──────────────────────────────────────────────────────────
      # LiteLLM does not proxy /v1/audio/transcriptions to custom backends.
      # Whisper is exposed directly via Ingress at https://stt.apps.lab.home.arpa
      # (gitops/workloads/whisper/ingress.yaml). Call it directly, not via this gateway.

      # M5Stack tiers via the adapter (OpenAI-compatible shim for /api/{slug}).
      # "m5" = the on-device 3-tier escalation router (local NPU → Claude API → Claude Code);
      # the others expose the Module LLM and the direct Claude client individually.
      - model_name: m5
        litellm_params: { model: openai/m5-route,  api_base: http://m5stack-adapter:8080/v1, api_key: "none" }
      - model_name: m5-llm
        litellm_params: { model: openai/m5-llm,    api_base: http://m5stack-adapter:8080/v1, api_key: "none" }
      - model_name: m5-claude
        litellm_params: { model: openai/m5-claude, api_base: http://m5stack-adapter:8080/v1, api_key: "none" }
      # Optional cloud overflow — supply a key via Secret, then uncomment.
      # - model_name: big
      #   litellm_params: { model: anthropic/claude-sonnet-4-6, api_key: os.environ/ANTHROPIC_API_KEY }
    router_settings:
      routing_strategy: simple-shuffle   # load-balances across opi1 + opi2
      num_retries: 2
    # NOTE: the M5Stack speaks the framework's /api/llm protocol, not OpenAI — front it with a
    # tiny adapter (or call it directly / via MQTT from Home Assistant). See AI-INFERENCE.md.
