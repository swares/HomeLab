apiVersion: apps/v1
kind: Deployment
metadata: { name: m5stack-adapter, namespace: ai-gateway }
spec:
  replicas: 1
  selector: { matchLabels: { app: m5stack-adapter } }
  template:
    metadata:
      labels: { app: m5stack-adapter }
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      # Pin to odroid-nas: OPi agent nodes don't resolve *.apps.lab.home.arpa
      # (their /etc/resolv.conf doesn't include lab DNS servers).
      nodeSelector:
        kubernetes.io/hostname: odroid-nas
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: adapter
          # Image is BUILT FROM THE FRAMEWORK REPO (scripts/openai_adapter/), not here.
          # Pin the tag you pushed; bump it when the framework's protocol/adapter changes.
          # Push: DOCKER_BUILDKIT=0 docker build --no-cache -f openai_adapter/Dockerfile -t registry.apps.lab.home.arpa/m5stack-adapter:<ver> . && docker save ... | k3s ctr images import -
          image: registry.apps.lab.home.arpa/m5stack-adapter:0.1.1
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: m5stack-adapter-env }
            - secretRef: { name: m5stack-auth }   # M5_USER / M5_PASS — kubectl create secret generic m5stack-auth
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
