apiVersion: apps/v1
kind: Deployment
metadata: { name: m5stack-adapter, namespace: ai-gateway }
spec:
  replicas: 1
  selector: { matchLabels: { app: m5stack-adapter } }
  template:
    metadata: { labels: { app: m5stack-adapter } }
    spec:
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: adapter
          # Image is BUILT FROM THE FRAMEWORK REPO (scripts/openai_adapter/), not here.
          # Pin the tag you pushed; bump it when the framework's protocol/adapter changes.
          image: registry.lab.home.arpa/m5stack-adapter:0.1.0
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          envFrom: [{ configMapRef: { name: m5stack-adapter-env } }]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
