apiVersion: apps/v1
kind: Deployment
metadata: { name: m5stack-adapter, namespace: ai-gateway }
spec:
  replicas: 1
  selector: { matchLabels: { app: m5stack-adapter } }
  template:
    metadata:
      labels: { app: m5stack-adapter }
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      # Pin to odroid-nas: device at 192.168.1.71 is on the same LAN segment.
      # OPi nodes can now resolve *.apps.lab.home.arpa (node-dns.yml applied).
      nodeSelector:
        kubernetes.io/hostname: odroid-nas
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: adapter
          # Image is BUILT FROM THE FRAMEWORK REPO (scripts/openai_adapter/), not here.
          # Pin the tag you pushed; bump it when the framework's protocol/adapter changes.
          # Build+push (Zot registry rejects docker push; use skopeo instead):
          #   DOCKER_BUILDKIT=0 docker build --no-cache -f openai_adapter/Dockerfile \
          #     -t registry.apps.lab.home.arpa/m5stack-adapter:<ver> .
          #   docker save registry.apps.lab.home.arpa/m5stack-adapter:<ver> -o /tmp/adapter.tar
          #   skopeo copy --dest-tls-verify=false docker-archive:/tmp/adapter.tar \
          #     docker://registry.apps.lab.home.arpa/m5stack-adapter:<ver>
          #   k3s ctr images import /tmp/adapter.tar  # cache on h4-core for IfNotPresent pulls
          image: registry.apps.lab.home.arpa/m5stack-adapter:0.1.1
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: m5stack-adapter-env }
            - secretRef: { name: m5stack-auth }   # M5_USER / M5_PASS — managed by ESO (see external-secret.yaml)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
