# ExternalSecret: m5stack-auth from HashiCorp Vault
#
# BEFORE DEPLOYING — write credentials to Vault first:
#
#   vault kv put secret/lab/m5stack \
#     M5_USER=<m5stack web UI username> \
#     M5_PASS=<m5stack web UI password>
#
# To migrate from the hand-created secret:
#   1. Run the vault kv put command above (get values from the existing secret):
#        kubectl get secret m5stack-auth -n ai-gateway -o jsonpath='{.data.M5_USER}' | base64 -d
#        kubectl get secret m5stack-auth -n ai-gateway -o jsonpath='{.data.M5_PASS}' | base64 -d
#   2. Confirm ExternalSecret syncs: kubectl get externalsecret -n ai-gateway
#   3. Delete the hand-created secret (ESO will recreate it):
#        kubectl delete secret m5stack-auth -n ai-gateway
#   4. m5stack-adapter pod will restart and pull from the ESO-managed secret.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: m5stack-auth
  namespace: ai-gateway
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: m5stack-auth
    creationPolicy: Owner
  data:
    - secretKey: M5_USER
      remoteRef:
        key: secret/lab/m5stack
        property: M5_USER

    - secretKey: M5_PASS
      remoteRef:
        key: secret/lab/m5stack
        property: M5_PASS
