# ExternalSecret: semaphore-secrets from HashiCorp Vault
#
# BEFORE DEPLOYING — generate and write secrets to Vault:
#   vault kv put secret/lab/semaphore \
#     admin-password=$(openssl rand -hex 16) \
#     cookie-hash=$(openssl rand -hex 32) \
#     cookie-encryption=$(openssl rand -hex 32) \
#     access-key-encryption=$(openssl rand -hex 32)
#
# admin-password:        Web UI admin account password
# cookie-hash:           HMAC key for session cookie signing (min 32 chars)
# cookie-encryption:     AES key for session cookie encryption (min 32 chars)
# access-key-encryption: AES key for encrypting stored SSH/vault keys (min 32 chars)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: semaphore-secrets
  namespace: semaphore
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: semaphore-secrets
    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: secret/lab/semaphore
        property: admin-password
    - secretKey: cookie-hash
      remoteRef:
        key: secret/lab/semaphore
        property: cookie-hash
    - secretKey: cookie-encryption
      remoteRef:
        key: secret/lab/semaphore
        property: cookie-encryption
    - secretKey: access-key-encryption
      remoteRef:
        key: secret/lab/semaphore
        property: access-key-encryption
