apiVersion: apps/v1
kind: Deployment
metadata:
  name: semaphore
  namespace: semaphore
spec:
  replicas: 1
  selector:
    matchLabels: { app: semaphore }
  strategy:
    type: Recreate
  template:
    metadata:
      labels: { app: semaphore }
    spec:
      # Disable k8s service-env injection — k8s injects SEMAPHORE_PORT=tcp://...
      # which Semaphore reads as its Port field and panics on the tcp:// prefix.
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: n150-1   # x86; ansible runs here
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "Always"   # force kubelet to chown volumes to fsGroup on every mount
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: semaphore
          # renovate: datasource=docker depName=semaphoreui/semaphore
          image: semaphoreui/semaphore:v2.18.27
          ports:
            - containerPort: 3000
          env:
            # Database — PostgreSQL
            # SQLite/BoltDB in v2.18 both use the CGo SQLite VFS which fails with
            # CANTOPEN (14) on this cluster regardless of permissions or seccomp.
            - name: SEMAPHORE_DB_DIALECT
              value: postgres
            - name: SEMAPHORE_DB_HOST
              value: semaphore-postgres
            - name: SEMAPHORE_DB_PORT
              value: "5432"
            - name: SEMAPHORE_DB_USER
              value: semaphore
            - name: SEMAPHORE_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: semaphore-secrets
                  key: db-password
            - name: SEMAPHORE_DB
              value: semaphore

            # Temp path for playbook execution
            - name: SEMAPHORE_PLAYBOOK_PATH
              value: /tmp/semaphore

            # Web root — must match the ingress URL for CSRF to work
            - name: SEMAPHORE_WEB_ROOT
              value: https://semaphore.apps.lab.home.arpa

            # Admin account — bootstrapped on first run only
            - name: SEMAPHORE_ADMIN
              value: admin
            - name: SEMAPHORE_ADMIN_NAME
              value: Admin
            - name: SEMAPHORE_ADMIN_EMAIL
              value: admin@lab.home.arpa
            - name: SEMAPHORE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: semaphore-secrets
                  key: admin-password

            # Encryption keys — must stay stable; changing them invalidates stored keys
            - name: SEMAPHORE_COOKIE_HASH
              valueFrom:
                secretKeyRef:
                  name: semaphore-secrets
                  key: cookie-hash
            - name: SEMAPHORE_COOKIE_ENCRYPTION
              valueFrom:
                secretKeyRef:
                  name: semaphore-secrets
                  key: cookie-encryption
            - name: SEMAPHORE_ACCESS_KEY_ENCRYPTION
              valueFrom:
                secretKeyRef:
                  name: semaphore-secrets
                  key: access-key-encryption

          volumeMounts:
            - name: tmp
              mountPath: /tmp/semaphore
            - name: config
              mountPath: /etc/semaphore/config.json
              subPath: config.json
              readOnly: true

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi

          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            # RuntimeDefault blocks a syscall SQLite needs (likely mmap flags or fallocate).
            # Unconfined here to confirm seccomp is the root cause before writing a custom profile.
            seccompProfile:
              type: Unconfined

          readinessProbe:
            httpGet: { path: /api/ping, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/ping, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 30

      volumes:
        - name: tmp
          emptyDir: {}
        - name: config
          configMap:
            name: semaphore-config
