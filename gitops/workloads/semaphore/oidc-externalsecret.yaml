# Renders semaphore-oidc-config Secret containing the full config.json
# with the OIDC client secret injected from Vault.
#
# Semaphore reads OIDC provider config only from config.json (no env var equivalent),
# so we use ESO template to generate the full config as a Secret and mount it
# instead of the ConfigMap. The ConfigMap (semaphore-config) has been removed.
#
# Vault path: secret/lab/semaphore → oidc-client-secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: semaphore-oidc-config
  namespace: semaphore
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: semaphore-oidc-config
    creationPolicy: Owner
    template:
      data:
        config.json: |
          {
            "dialect": "postgres",
            "postgres": {
              "host": "semaphore-postgres",
              "port": 5432,
              "user": "semaphore",
              "name": "semaphore"
            },
            "tmp_path": "/tmp/semaphore",
            "web_host": "https://semaphore.apps.lab.home.arpa",
            "cookie_hash": "",
            "cookie_encryption": "",
            "access_key_encryption": "",
            "email_alert": false,
            "telegram_alert": false,
            "slack_alert": false,
            "rocketchat_alert": false,
            "microsoft_teams_alert": false,
            "ldap_enable": false,
            "max_parallel_tasks": 0,
            "oidc_providers": {
              "authelia": {
                "display_name": "Sign in with Authelia",
                "provider_url": "https://authelia.apps.lab.home.arpa",
                "client_id": "semaphore",
                "client_secret": "{{ .oidcClientSecret }}",
                "redirect_url": "https://semaphore.apps.lab.home.arpa/api/auth/oidc/authelia/redirect",
                "username_claim": "preferred_username",
                "name_claim": "name",
                "email_claim": "email",
                "scopes": ["openid", "profile", "email"]
              }
            }
          }
  data:
    - secretKey: oidcClientSecret
      remoteRef:
        key: secret/lab/semaphore
        property: oidc-client-secret
