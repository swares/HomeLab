apiVersion: apps/v1
kind: Deployment
metadata:
  name: semaphore-postgres
  namespace: semaphore
spec:
  replicas: 1
  selector:
    matchLabels: { app: semaphore-postgres }
  strategy:
    type: Recreate
  template:
    metadata:
      labels: { app: semaphore-postgres }
    spec:
      nodeSelector:
        kubernetes.io/hostname: n150-1
      securityContext:
        runAsNonRoot: true
        runAsUser: 999    # postgres uid in the official image
        fsGroup: 999
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: postgres
          # renovate: datasource=docker depName=postgres
          image: postgres:16.14
          env:
            - name: POSTGRES_DB
              value: semaphore
            - name: POSTGRES_USER
              value: semaphore
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: semaphore-secrets
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "semaphore", "-d", "semaphore"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "semaphore", "-d", "semaphore"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: semaphore-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: semaphore-postgres
  namespace: semaphore
spec:
  selector: { app: semaphore-postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: semaphore-postgres-data
  namespace: semaphore
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
