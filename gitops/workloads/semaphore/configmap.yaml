# Semaphore static config — secrets come from env vars (SEMAPHORE_COOKIE_HASH, etc.)
# which take precedence over these empty placeholder values.
# Mounted read-only at /etc/semaphore/config.json so the container skips setup.
apiVersion: v1
kind: ConfigMap
metadata:
  name: semaphore-config
  namespace: semaphore
data:
  config.json: |
    {
      "dialect": "sqlite",
      "sqlite": {
        "path": "/data/database.sqlite"
      },
      "tmp_path": "/tmp/semaphore",
      "web_host": "https://semaphore.apps.lab.home.arpa",
      "cookie_hash": "",
      "cookie_encryption": "",
      "access_key_encryption": "",
      "email_alert": false,
      "telegram_alert": false,
      "slack_alert": false,
      "rocketchat_alert": false,
      "microsoft_teams_alert": false,
      "ldap_enable": false,
      "max_parallel_tasks": 0
    }
