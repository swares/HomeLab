# Temporary exception to disallow-latest-tag for faster-whisper-server.
# The image only publishes CPU builds as latest-cpu; no versioned CPU tag exists yet.
# Remove once a pinnable versioned CPU tag is available upstream.
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: allow-whisper-latest-cpu
  namespace: whisper
  annotations:
    policy-exception/reason: "fedirz/faster-whisper-server has no versioned CPU tag — latest-cpu is the only published CPU variant"
spec:
  exceptions:
    - policyName: disallow-latest-tag
      ruleNames:
        - require-image-tag
        - disallow-latest-tag
        - autogen-require-image-tag
        - autogen-disallow-latest-tag
  match:
    any:
      - resources:
          kinds: [Pod]
          namespaces: [whisper]
          names: ["whisper-*"]
