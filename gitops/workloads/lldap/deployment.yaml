apiVersion: apps/v1
kind: Deployment
metadata:
  name: lldap
  namespace: lldap
spec:
  replicas: 1
  strategy:
    type: Recreate             # SQLite is single-writer; never run two replicas concurrently
  selector:
    matchLabels:
      app: lldap
  template:
    metadata:
      labels:
        app: lldap
    spec:
      automountServiceAccountToken: false
      containers:
        - name: lldap
          image: lldap/lldap:stable   # PIN to a vX.Y.Z tag once stable is confirmed working
          ports:
            - name: ldap
              containerPort: 3890
            - name: http
              containerPort: 17170
          env:
            - name: LLDAP_LDAP_BASE_DN
              value: "dc=lab,dc=home,dc=arpa"
            - name: LLDAP_LDAP_USER_DN
              value: "admin"
            - name: LLDAP_LDAP_USER_PASS
              valueFrom:
                secretKeyRef:
                  name: lldap-secrets
                  key: admin_password
            - name: LLDAP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lldap-secrets
                  key: jwt_secret
            - name: LLDAP_DATABASE_URL
              value: "sqlite:///data/users.db?mode=rwc"
            - name: LLDAP_HTTP_URL
              value: "https://lldap.apps.lab.home.arpa"
            - name: LLDAP_LDAP_PORT
              value: "3890"
            - name: LLDAP_HTTP_PORT
              value: "17170"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 17170
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 17170
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lldap-data
