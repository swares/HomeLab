# ExternalSecret: lldap-secrets from HashiCorp Vault
#
# BEFORE DEPLOYING — write secrets to Vault:
#   vault kv put secret/lab/lldap \
#     admin_password=<same password currently in lldap_config.toml on ldap-1> \
#     jwt_secret=<same jwt_secret currently in lldap_config.toml on ldap-1>
#
# Retrieve current values from Ansible Vault:
#   ansible-vault view ansible/inventory/group_vars/all/secrets.yml
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lldap-secrets
  namespace: lldap
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: lldap-secrets
    creationPolicy: Owner
  data:
    - secretKey: admin_password
      remoteRef:
        key: secret/lab/lldap
        property: admin_password
    - secretKey: jwt_secret
      remoteRef:
        key: secret/lab/lldap
        property: jwt_secret
