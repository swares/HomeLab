apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: authelia
data:
  configuration.yml: |
    server:
      address: 'tcp://0.0.0.0:9091'

    log:
      level: info

    authentication_backend:
      ldap:
        implementation: lldap
        address: ldap://lldap.lldap.svc.cluster.local:3890
        base_dn: dc=lab,dc=home,dc=arpa
        user: uid=admin,ou=people,dc=lab,dc=home,dc=arpa

    session:
      cookies:
        - name: authelia_session
          domain: lab.home.arpa
          authelia_url: https://authelia.apps.lab.home.arpa
          default_redirection_url: https://immich.apps.lab.home.arpa
          expiration: 24h
          inactivity: 1h

    storage:
      postgres:
        address: tcp://authelia-postgres:5432
        database: authelia
        username: authelia

    notifier:
      filesystem:
        # /tmp is ephemeral per-pod — fine for a homelab notifier.
        # Notifications (password-reset links etc.) appear here; check pod logs
        # if you need them. Switch to smtp: if you add a mail relay.
        filename: /tmp/notification.txt

    access_control:
      default_policy: one_factor

    identity_providers:
      oidc:
        jwks:
          - key_id: main
            algorithm: RS256
            use: sig
            key: {{ secret "/authelia-secrets/oidc_private_key" | mindent 12 "|" | msquote }}
        clients:
          - client_id: immich
            client_name: Immich
            client_secret: '$argon2id$v=19$m=65536,t=3,p=4$YFWLmwWMeMoqN57B0CfBVw$li61nn0GzHqY9QlyLw26gV3BZGXz8n5Z8gcpcbz2Oi8'
            authorization_policy: one_factor
            redirect_uris:
              - https://immich.apps.lab.home.arpa/auth/login
              - https://immich.apps.lab.home.arpa/user-settings
            scopes: [openid, profile, email]
            response_types: [code]
            grant_types: [authorization_code]
            token_endpoint_auth_method: client_secret_post
            userinfo_signed_response_alg: none
            consent_mode: implicit

          - client_id: minio
            client_name: MinIO Console
            client_secret: '$argon2id$v=19$m=65536,t=3,p=4$J9C9Sm0QwM1KoLrfbizoQg$kmonNhM83QvwSBKdM45am2vVKHeijCYFTVr444AXLgU'
            authorization_policy: one_factor
            redirect_uris:
              - https://minio-console.apps.lab.home.arpa/oauth_callback
            scopes: [openid, profile, email]
            response_types: [code]
            grant_types: [authorization_code]
            token_endpoint_auth_method: client_secret_post
            userinfo_signed_response_alg: none
            consent_mode: implicit
