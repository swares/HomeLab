# PostgreSQL 16 for Authelia.
# Plain postgres:16-alpine — no extensions needed (Authelia uses standard SQL).
# Single replica with Recreate strategy (RWO PVC; Authelia's DB is small).
#
# Password comes from the same authelia-secrets Secret that Authelia mounts,
# so there's only one secret to manage.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authelia-pgdata
  namespace: authelia
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia-postgres
  namespace: authelia
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: authelia-postgres
  template:
    metadata:
      labels:
        app: authelia-postgres
    spec:
      automountServiceAccountToken: false
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: authelia
            - name: POSTGRES_USER
              value: authelia
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authelia-secrets
                  key: storage_pg_password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: [pg_isready, -U, authelia, -d, authelia]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: authelia-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: authelia-postgres
  namespace: authelia
spec:
  selector:
    app: authelia-postgres
  ports:
    - port: 5432
      targetPort: 5432
