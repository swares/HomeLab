# ExternalSecret: authelia-secrets from HashiCorp Vault
#
# BEFORE DEPLOYING — write all secrets to Vault first:
#
#   vault kv put secret/lab/authelia \
#     jwt_secret=$(openssl rand -hex 32) \
#     session_secret=$(openssl rand -hex 32) \
#     storage_encryption_key=$(openssl rand -hex 32) \
#     oidc_hmac_secret=$(openssl rand -hex 32) \
#     ldap_password=<lldap admin password — matches secret/lab/lldap admin_password> \
#     storage_pg_password=$(openssl rand -hex 24) \
#     oidc_private_key="$(openssl genrsa 4096)"
#
# MIGRATION FROM HAND-CREATED SECRET — once the above is done:
#   1. Confirm ExternalSecret syncs: kubectl get externalsecret -n authelia
#   2. Delete the hand-created secret (ESO will recreate it from Vault):
#        kubectl delete secret authelia-secrets -n authelia
#   3. Authelia pods will restart and pull from the ESO-managed secret
#
# NOTE: oidc_private_key is an RSA 4096 PEM block used by Authelia's OIDC JWK.
# If rotating this key, existing OIDC sessions (Immich) will be invalidated —
# users will need to re-authenticate after the restart.
#
# NOTE: immich_client_secret is no longer stored here — the Immich OIDC client
# secret is now committed as an argon2id hash directly in the Authelia configmap.
# The plaintext lives only in Vault at secret/lab/authelia/immich_client_secret
# (informational; Authelia reads the hash from the ConfigMap, not this secret).
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authelia-secrets
  namespace: authelia
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: authelia-secrets
    creationPolicy: Owner
  data:
    # JWT secret for identity validation / password reset tokens
    - secretKey: jwt_secret
      remoteRef:
        key: secret/lab/authelia
        property: jwt_secret

    # Session encryption key (cookie signing)
    - secretKey: session_secret
      remoteRef:
        key: secret/lab/authelia
        property: session_secret

    # Storage encryption key (encrypts sensitive DB columns)
    - secretKey: storage_encryption_key
      remoteRef:
        key: secret/lab/authelia
        property: storage_encryption_key

    # OIDC HMAC secret (signs OIDC tokens)
    - secretKey: oidc_hmac_secret
      remoteRef:
        key: secret/lab/authelia
        property: oidc_hmac_secret

    # LDAP bind password (lldap admin — must match secret/lab/lldap admin_password)
    - secretKey: ldap_password
      remoteRef:
        key: secret/lab/authelia
        property: ldap_password

    # PostgreSQL password (shared by Authelia app + authelia-postgres deployment)
    - secretKey: storage_pg_password
      remoteRef:
        key: secret/lab/authelia
        property: storage_pg_password

    # RSA 4096 private key for OIDC JWK signing (PEM format)
    # Referenced in configmap.yaml via template:
    #   {{ secret "/authelia-secrets/oidc_private_key" | mindent 12 "|" | msquote }}
    - secretKey: oidc_private_key
      remoteRef:
        key: secret/lab/authelia
        property: oidc_private_key
