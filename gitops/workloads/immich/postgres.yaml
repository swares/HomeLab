apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: immich-pgdata, namespace: immich }
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path                # k3s built-in provisioner
  resources: { requests: { storage: 20Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: immich-postgres, namespace: immich }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: immich-postgres } }
  template:
    metadata: { labels: { app: immich-postgres } }
    spec:
      containers:
        - name: postgres
          # MANDATORY: a Postgres image with the vector extension (VectorChord/pgvecto.rs).
          # PIN the current tag from the Immich docs — the extension version moves.
          image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
          envFrom: [{ configMapRef: { name: immich-env } }]
          env:
            - { name: POSTGRES_USER, value: immich }
            - { name: POSTGRES_DB, value: immich }
            - { name: POSTGRES_INITDB_ARGS, value: "--data-checksums" }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: immich-secrets, key: DB_PASSWORD } }
          ports: [{ containerPort: 5432 }]
          volumeMounts: [{ name: pgdata, mountPath: /var/lib/postgresql/data }]
      volumes:
        - { name: pgdata, persistentVolumeClaim: { claimName: immich-pgdata } }
---
apiVersion: v1
kind: Service
metadata: { name: immich-postgres, namespace: immich }
spec:
  selector: { app: immich-postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
