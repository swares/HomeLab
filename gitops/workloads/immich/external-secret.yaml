# ExternalSecret: immich-secrets from HashiCorp Vault
#
# ACTIVATION CHECKLIST — uncomment this file's resources only when ALL are true:
#   [ ] Vault is initialised and unsealed on rpi5 (192.168.1.128)
#   [ ] immich DB_PASSWORD written to Vault:
#         vault kv put secret/lab/immich DB_PASSWORD=<value>
#   [ ] external-secrets operator is Healthy in ArgoCD
#   [ ] The hand-created immich-secrets k8s Secret has been deleted:
#         kubectl delete secret immich-secrets -n immich
#
# The hand-created immich-secrets Secret has been deleted; external-secrets now owns it.
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://192.168.1.128:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: external-secrets
          key: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-secrets
  namespace: immich
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: immich-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: secret/lab/immich
        property: DB_PASSWORD
