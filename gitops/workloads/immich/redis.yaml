apiVersion: apps/v1
kind: Deployment
metadata: { name: immich-redis, namespace: immich }
spec:
  replicas: 1
  selector: { matchLabels: { app: immich-redis } }
  template:
    metadata: { labels: { app: immich-redis } }
    spec:
      containers:
        - name: redis
          image: docker.io/redis:6.2-alpine    # cache; ephemeral is fine
          ports: [{ containerPort: 6379 }]
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata: { name: immich-redis, namespace: immich }
spec:
  selector: { app: immich-redis }
  ports: [{ port: 6379, targetPort: 6379 }]
