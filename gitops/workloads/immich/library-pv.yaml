apiVersion: v1
kind: PersistentVolume
metadata: { name: immich-library }
spec:
  capacity: { storage: 6Ti }                 # cap as you like; it's the bulk photo/video store
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""                        # statically bound, not provisioned
  hostPath: { path: /mnt/cold-8t/immich }     # the 8 TB RAID 1 mirror
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: immich-library, namespace: immich }
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ""
  resources: { requests: { storage: 6Ti } }
  volumeName: immich-library
