# Immich ML — Smart Search (CLIP) + Facial Recognition. DEFAULT = CPU (always works).
# Hardware acceleration for ML is chosen by the IMAGE TAG + device access (there is NO admin
# toggle — that's transcoding, not ML). Two optional upgrades, both documented in README.md:
#
#   A) H4 iGPU via OpenVINO — switch image to `…-openvino`, mount /dev/dri + /dev/bus/usb, and
#      grant device access (privileged, or the Intel GPU device plugin + SCC).
#      CAVEAT: Immich's docs say OpenVINO targets *discrete* Intel GPUs (Iris Xe/Arc) and to
#      "expect issues" on integrated graphics — the N305 UHD is exactly that case, and there's a
#      recent OpenVINO/Intel breakage bug. Treat as best-effort; it silently falls back to CPU.
#   B) OPi 5 Pro NPU via the `rknn` backend (remote ML) — first-class supported on RK3588, uses
#      the AI tier. Run a `…-rknn` ML container on the OPi and point Immich's ML URL at it, with
#      this CPU container listed as the fallback URL. See README.md.
#
# Start CPU-first to get photos flowing, then try A or B and VERIFY it actually engages.
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: immich-model-cache, namespace: immich }
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path                # k3s built-in; keep model downloads on NVMe so they persist
  resources: { requests: { storage: 10Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: immich-ml, namespace: immich }
spec:
  replicas: 1
  selector: { matchLabels: { app: immich-ml } }
  template:
    metadata: { labels: { app: immich-ml } }
    spec:
      containers:
        - name: ml
          image: ghcr.io/immich-app/immich-machine-learning:v2.7.5   # CPU default; see header for accel
          ports: [{ containerPort: 3003 }]
          readinessProbe:
            httpGet: { path: /ping, port: 3003 }
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /ping, port: 3003 }
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - { name: model-cache, mountPath: /cache }
      volumes:
        - { name: model-cache, persistentVolumeClaim: { claimName: immich-model-cache } }
---
apiVersion: v1
kind: Service
metadata: { name: immich-ml, namespace: immich }
spec:
  selector: { app: immich-ml }
  ports: [{ port: 3003, targetPort: 3003 }]
