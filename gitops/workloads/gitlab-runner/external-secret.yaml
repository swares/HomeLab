---
# ExternalSecret — pulls the GitLab runner token from Vault.
# Vault path: secret/lab/gitlab  key: runner_token
# Populate Vault first:
#   vault kv put secret/lab/gitlab runner_token=glrt-<token-from-gitlab-ui>
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab-runner-secret
  namespace: gitlab-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab-runner-secret
    creationPolicy: Owner
  data:
    - secretKey: runner-registration-token
      remoteRef:
        key: secret/lab/gitlab
        property: runner_token
