---
# Lab CA certificate used by the gitlab-runner to verify GitLab's TLS cert.
# The cert is signed by lab-ca (CA:TRUE) — public info, safe to store in git.
#
# To regenerate this file after a lab CA rotation:
#   CA_B64=$(kubectl -n gitlab-runner get secret gitlab-lab-tls \
#              -o jsonpath='{.data.ca\.crt}')
#   # then replace the tls.crt value below with $CA_B64
#
# The file key must be named <hostname>.crt — the runner scans the mount dir
# for files matching the hostname it's connecting to.
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-tls
  namespace: gitlab-runner
type: Opaque
data:
  # base64-encoded lab root CA certificate (PEM)
  # Populated via: kubectl -n gitlab-runner get secret gitlab-lab-tls \
  #                  -o jsonpath='{.data.ca\.crt}'
  gitlab.lab.home.arpa.crt: 
