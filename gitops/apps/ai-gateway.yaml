apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: ai-gateway, namespace: argocd }
spec:
  project: default
  source:
    repoURL: git@github.com:swares/HomeLab.git
    targetRevision: main
    path: gitops/workloads/ai-gateway
    directory:
      recurse: true
  destination: { server: https://kubernetes.default.svc, namespace: ai-gateway }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["CreateNamespace=true"]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: ai-backends, namespace: argocd }
spec:
  project: default
  source:
    repoURL: git@github.com:swares/HomeLab.git
    targetRevision: main
    path: gitops/workloads/ai-backends
  destination: { server: https://kubernetes.default.svc, namespace: ai-gateway }
  syncPolicy: { automated: { prune: true, selfHeal: true } }
