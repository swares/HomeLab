apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: immich, namespace: argocd }
spec:
  project: default
  source:
    repoURL: https://github.com/YOURUSER/homelab.git   # <-- set me
    targetRevision: main
    path: gitops/workloads/immich
  destination: { server: https://kubernetes.default.svc, namespace: immich }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["CreateNamespace=true"]
