apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    # renovate: datasource=helm registryUrl=https://grafana.github.io/helm-charts depName=promtail
    targetRevision: 6.16.0
    helm:
      valuesObject:
        # Push logs to Loki gateway
        config:
          clients:
            - url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push

          snippets:
            # Scrape pod logs from /var/log/pods (standard k8s log location)
            pipelineStages:
              - cri: {}

            scrapeConfigs: |
              # ---- Pod logs ----
              - job_name: kubernetes-pods
                kubernetes_sd_configs:
                  - role: pod
                pipeline_stages:
                  - cri: {}
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_node_name]
                    target_label: __host__
                  - action: labelmap
                    regex: __meta_kubernetes_pod_label_(.+)
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod
                  - source_labels: [__meta_kubernetes_pod_container_name]
                    target_label: container
                  - replacement: /var/log/pods/*$1/*.log
                    separator: /
                    source_labels:
                      - __meta_kubernetes_pod_uid
                      - __meta_kubernetes_pod_container_name
                    target_label: __path__

              # ---- Node systemd journal ----
              - job_name: node-journal
                journal:
                  max_age: 12h
                  labels:
                    job: node-journal
                pipeline_stages:
                  - match:
                      selector: '{job="node-journal"}'
                      stages:
                        - json:
                            expressions:
                              level: PRIORITY
                relabel_configs:
                  - source_labels: [__journal__systemd_unit]
                    target_label: unit
                  - source_labels: [__journal__hostname]
                    target_label: hostname

        # DaemonSet needs access to pod logs and journal on every node
        tolerations:
          - operator: Exists    # run on all nodes including inference nodes

        extraVolumes:
          - name: journal
            hostPath:
              path: /var/log/journal

        extraVolumeMounts:
          - name: journal
            mountPath: /var/log/journal
            readOnly: true

        serviceMonitor:
          enabled: true        # scrape Promtail metrics via existing Prometheus

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
