apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    # renovate: datasource=helm registryUrl=https://grafana.github.io/helm-charts depName=alloy
    targetRevision: 1.10.0
    helm:
      valuesObject:
        # DaemonSet — one pod per node to collect logs and journal
        controller:
          type: daemonset
          tolerations:
            - operator: Exists    # run on all nodes including inference nodes

        alloy:
          configMap:
            content: |
              // ── Kubernetes pod logs ──────────────────────────────────────
              discovery.kubernetes "pods" {
                role = "pod"
              }

              discovery.relabel "pods" {
                targets = discovery.kubernetes.pods.targets

                rule {
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  target_label  = "__host__"
                }
                rule {
                  action = "labelmap"
                  regex  = "__meta_kubernetes_pod_label_(.+)"
                }
                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }
              }

              loki.source.kubernetes "pods" {
                targets    = discovery.relabel.pods.output
                forward_to = [loki.write.gateway.receiver]
              }

              // ── Node systemd journal ─────────────────────────────────────
              // Relabeling extracts unit and hostname from journal metadata so
              // Loki queries can filter by systemd unit or source host — matching
              // the labels Promtail produced before it was removed.
              loki.source.journal "systemd" {
                max_age    = "12h"
                labels     = { job = "node-journal" }
                forward_to = [loki.relabel.journal.receiver]
              }

              loki.relabel "journal" {
                forward_to = [loki.write.gateway.receiver]

                rule {
                  source_labels = ["__journal__systemd_unit"]
                  target_label  = "unit"
                }
                rule {
                  source_labels = ["__journal__hostname"]
                  target_label  = "hostname"
                }
              }

              // ── Forward to Loki gateway ──────────────────────────────────
              loki.write "gateway" {
                endpoint {
                  url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
                }
              }

          # Journal mount for systemd log collection
          extraVolumes:
            - name: journal
              hostPath:
                path: /var/log/journal

          extraVolumeMounts:
            - name: journal
              mountPath: /var/log/journal
              readOnly: true

        serviceMonitor:
          enabled: true    # scrape Alloy metrics via existing Prometheus

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
