apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    # renovate: datasource=helm registryUrl=https://prometheus-community.github.io/helm-charts depName=kube-prometheus-stack
    targetRevision: 72.6.2
    helm:
      valuesObject:
        # ---- Global ----
        fullnameOverride: kps

        # ---- Grafana ----
        grafana:
          enabled: true
          adminUser: admin
          # Password injected from Vault via ExternalSecret (grafana-admin-secret)
          admin:
            existingSecret: grafana-admin-secret
            userKey: admin-user
            passwordKey: admin-password
          persistence:
            enabled: true
            storageClassName: local-path
            size: 5Gi
          nodeSelector:
            kubernetes.io/hostname: odroid-nas
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - grafana.apps.lab.home.arpa
            paths:
              - /
          sidecar:
            dashboards:
              enabled: true          # auto-import dashboards from ConfigMaps
            datasources:
              enabled: true
          grafana.ini:
            server:
              root_url: "http://grafana.apps.lab.home.arpa"

        # ---- Prometheus ----
        prometheus:
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - prometheus.apps.lab.home.arpa
            paths:
              - /
          prometheusSpec:
            retention: 30d
            retentionSize: "40GB"
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 50Gi
            nodeSelector:
              kubernetes.io/hostname: odroid-nas
            # Scrape all namespaces
            podMonitorNamespaceSelector: {}
            serviceMonitorNamespaceSelector: {}
            ruleNamespaceSelector: {}
            # Static scrape targets — non-cluster hosts running apt node_exporter
            additionalScrapeConfigs:
              - job_name: node-exporter-external
                static_configs:
                  - targets:
                      - 192.168.1.70:9100   # ldap-1 (lldap VM)
                      - 192.168.1.42:9100   # n150-1 (KVM host)
                      - 192.168.1.21:9100   # n150-2 (KVM host)
                      - 192.168.1.148:9100  # octopi (DNS primary)
                      - 192.168.1.184:9100  # opi-zero2w-1 (DNS secondary)
                      - 192.168.1.188:9100  # opi-zero2w-2 (MQTT)
                      - 192.168.1.99:9100   # opi-zero2w-4
                relabel_configs:
                  - source_labels: [__address__]
                    regex: '([^:]+):\d+'
                    target_label: instance
              - job_name: libvirt
                static_configs:
                  - targets:
                      - 192.168.1.42:9177   # n150-1 (KVM host)
                      - 192.168.1.21:9177   # n150-2 (KVM host)

        # ---- Alertmanager ----
        alertmanager:
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - alertmanager.apps.lab.home.arpa
            paths:
              - /
          alertmanagerSpec:
            nodeSelector:
              kubernetes.io/hostname: odroid-nas
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: [ReadWriteOnce]
                  resources:
                    requests:
                      storage: 2Gi

        # ---- Node exporter — runs on all nodes ----
        prometheus-node-exporter:
          tolerations:
            - operator: Exists   # scrape inference nodes too
          extraArgs:
            # Enable systemd collector so backup timer metrics are available
            # (used by LabBackupNasSilent / LabBackupEtcdSilent alert rules)
            - --collector.systemd
            - --collector.systemd.unit-whitelist=(backup-nas|backup-etcd)\.(service|timer)

        # ---- kube-state-metrics ----
        kube-state-metrics:
          nodeSelector:
            kubernetes.io/hostname: odroid-nas

        # ---- Admission webhooks — disabled (homelab; TLS secret bootstrap unreliable on k3s) ----
        prometheusOperator:
          admissionWebhooks:
            enabled: false
          tls:
            enabled: false

        # ---- k3s doesn't expose kube-controller-manager / scheduler on standard ports ----
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeProxy:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # required for large CRDs
