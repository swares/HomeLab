apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-route
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOURUSER/homelab.git   # <-- set me
    targetRevision: main
    path: gitops/workloads/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
